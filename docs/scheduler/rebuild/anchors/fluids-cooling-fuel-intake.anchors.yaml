      discriminator_question: "Is it white, or dark/sooty black?"
  safety_flag: advise_immediately
  notes: "Thick persistent white smoke = coolant entering combustion (head gasket / cracked component) [S2] — continuing to drive risks overheating and engine damage, so advise getting it in promptly and watching the temp gauge. The benign twin — wispy cold-morning steam that clears — must be REJECTED, not booked as head gasket. Customers say 'smoke' for both; the persistence question decides."

