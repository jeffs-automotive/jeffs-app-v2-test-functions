  required_slots:
    - fluid_color: "the #1 discriminator across all seven fluids [S1] — ask first"
    - puddle_location: "front/middle/rear, near a wheel — second axis of the fluid decision"
    - smell: "sweet / burnt / rotten-egg / soapy / none — third axis"
    - pedal_feel_and_warning_lights: "safety screen — any brake-pedal change or red light upgrades this to the brake-fluid path immediately"
    - texture_if_known: "slick/oily vs thin/watery, does it stain or evaporate"
  confusables:
    - vs: oil_puddle_brown_black
      discriminator_question: "If you can check: is the spot dark brown/black and greasy?"
    - vs: clear_yellow_light_brown_puddle_brake_fluid
      discriminator_question: "Has the brake pedal felt soft, low, or different at all since you noticed the leak?"
    - vs: coolant_puddle_green_orange_pink
      discriminator_question: "Any color to it — green, orange, or pink — or a sweet smell?"
