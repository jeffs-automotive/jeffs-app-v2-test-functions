  notes: "The most common real-world leak utterance — customers frequently cannot name the fluid. Do NOT force-pick oil; ask color → location → smell in that order. If any brake cue surfaces (pedal, red light, near-wheel drip), escalate to the brake-fluid entry and advise not to drive. A leak that appeared right after service elsewhere is a situational/after-recent-service case, not a color puzzle."

# ---------------------------------------------------------------------------
# OIL (smell, light, consumption) + the oil-change request trap
# ---------------------------------------------------------------------------

- category: smell_smoke
  subcategory: burning_oil_smell
  display: "Burning oil smell"
  customer_voice_anchors:
