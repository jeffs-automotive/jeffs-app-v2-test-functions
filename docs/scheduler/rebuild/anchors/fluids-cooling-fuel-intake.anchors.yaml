    - vs: sweet_antifreeze_smell
      discriminator_question: "Does it smell oily and burnt, or sweet like syrup?"
  safety_flag: none
  notes: "A bare 'burning smell' sets NOTHING — the descriptor question is mandatory before routing (it fans out to oil / electrical / brakes / coolant / exhaust). Classic cause is oil seeping onto the hot exhaust manifold: smell without a ground puddle. If actual under-hood smoke is visible, lead with smoke_or_steam_under_hood instead."

- category: warning_light
