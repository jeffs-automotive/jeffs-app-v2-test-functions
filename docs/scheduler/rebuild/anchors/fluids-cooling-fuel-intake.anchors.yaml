  subcategory: blue_gray_smoke_from_tailpipe
  display: "Blue/gray smoke from the exhaust (burning oil)"
  customer_voice_anchors:
    - "puff of blue smoke when i first start it in the morning"
    - "blueish gray smoke from the exhaust when i accelerate"
    - "smokes when i take off from a light and it smells like burning oil"
    - "blue smoke out the tailpipe and im adding oil every few weeks"
    - "gray smoke that smells oily, not sweet"
    - "smokes at startup then clears up, been adding a quart a month"
    - "big cloud of blue smoke when i floor it onto the highway"
    - "oil smoke out the back on my turbo car"
  required_slots:
    - when_it_smokes: "startup puff that clears = valve seals; constant or under acceleration = rings [S2] — the classic split"
    - smell: "burnt oil confirms it's oil, not coolant [S2]"
    - oil_consumption: "adding quarts corroborates — links to the consumption entry [S7]"
    - color_as_seen: "customer's 'gray' can be oil-blue or steam — smell breaks the tie"
    - check_engine_light: "oil fouling can set codes / damage the cat [S7]"
  confusables:
    - vs: white_smoke_from_tailpipe
      discriminator_question: "Does the smoke smell like burning oil, or sweet like syrup — and is it blue-gray or pure white?"
    - vs: black_smoke_from_tailpipe
      discriminator_question: "Blue-gray, or sooty black with a raw-gas smell?"
    - vs: oil_consumption_burning_oil
      discriminator_question: "Is the visible smoke the main thing, or mostly that the oil level keeps dropping?"
  safety_flag: none
  notes: "Oil being burned in the engine: startup-only puff (valve seals, drivable) vs constant/under-load (rings, more serious) [S2]. Not an emergency, but advise keeping the oil level topped up — running low IS an engine killer, and chronic burning clogs the catalytic converter [S7]. On turbo cars, blue smoke can be turbo seals — capture that the car is turbocharged."

