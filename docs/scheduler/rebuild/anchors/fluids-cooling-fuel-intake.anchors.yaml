    - "burning smell under the hood, kind of greasy"
  required_slots:
    - smell_descriptor: "oily/greasy vs sharp plastic vs rubber vs sweet — the five-way 'burning smell' split routes to five different systems"
    - smoke_visible: "wisps/haze under the hood upgrades urgency"
    - smell_location: "under hood vs one wheel vs inside the cabin — wheel = brakes, cabin+plastic = electrical"
    - oil_level_and_leaks: "low level or known seepage corroborates oil-on-exhaust"
    - recent_oil_change: "a spill on the manifold after service burns off — common benign cause"
