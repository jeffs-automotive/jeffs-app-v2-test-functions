    - "sprayers stopped working and theres blue fluid on the ground"
  required_slots:
    - fluid_color: "blue/light blue, thin and watery"
    - smell: "soapy/alcohol or no smell = washer; sweet = the blue-coolant trap"
    - washer_function: "do the sprayers still work — empty-tank confirmation"
    - puddle_location: "front corner near the washer reservoir/wheel-well"
  confusables:
    - vs: coolant_puddle_green_orange_pink
      discriminator_question: "Does the blue fluid smell sweet like antifreeze, or soapy/like nothing (washer fluid)?"
  safety_flag: none
  notes: "Lowest-stakes leak. The one trap: some vehicles (notably Hondas and some Euro makes) run BLUE coolant — resolve on smell and which reservoir is dropping, never on 'blue' alone. Usually bundled with a visit rather than its own diagnostic."

- category: leak
  subcategory: unknown_fluid_puddle
  display: "Fluid leak — not sure what it is"
  customer_voice_anchors:
