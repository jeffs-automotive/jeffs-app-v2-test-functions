    - "whistle at idle that changes when i rev it"
    - "sucking air sound from the engine bay"
    - "hear a whoosh and hiss when i floor it and then it bogs down"
  required_slots:
    - when_it_happens: "at idle (vacuum leak) vs only under acceleration/boost (charge-air leak) [S8]"
    - idle_quality: "rough idle + hiss = unmetered-air/vacuum-leak pattern"
    - power_loss: "bogging/flat power with the noise = boost leak on turbo cars [S8]"
    - turbo_equipped: "turbo/supercharged changes the suspect list entirely"
    - constant_or_new: "some turbo whistle is normal — NEW or louder/sharper is the concern [S8]"
  confusables:
    - vs: belt_squeal_or_whine
      discriminator_question: "Is it an airy whistle/hiss, or more of a squeal/chirp like a belt (especially on cold start or when turning)?"
    - vs: turbo_low_power_limp_mode
      discriminator_question: "Is the noise the main thing, or has the car also lost noticeable power or gone into reduced-power mode?"
    - vs: smoke_or_steam_under_hood
      discriminator_question: "Is it just the sound, or is there also steam/hissing WITH visible vapor from under the hood (coolant escaping)?"
  safety_flag: none
  notes: "Air-noise entry: vacuum leaks (idle hiss/whistle + rough idle) and boost/charge-air leaks (whoosh under load). NOT belt squeal (noise domain), NOT coolant-pressure hiss with steam (cooling). If power loss dominates, route to turbo_low_power_limp_mode instead — noise-led vs power-led decides between these siblings."

- category: performance
  subcategory: turbo_low_power_limp_mode
  display: "Turbo/boost power loss / limp mode"
  customer_voice_anchors:
    - "car went into limp mode and wont go over 40"
    - "reduced engine power light came on and it barely accelerates"
    - "no power when i step on it, feels like the turbo isnt kicking in"
    - "feels like it lost its turbo, super slow going uphill"
    - "whoosh noise then it bogs down when i floor it"
    - "wont rev past 3000 and a bunch of dash lights came on"
    - "truck has no power all of a sudden, like its choking"
    - "hesitates and has no boost, check engine light is on"
    - "went into limp mode on the highway, lights came on then went off"
  required_slots:
    - limp_mode_or_warning: "reduced-power message / RPM or speed cap / lights — confirms the computer intervened [S8]"
    - accompanying_noise: "whoosh/hiss (boost leak) vs siren/metallic whine (turbo bearing) [S8]"
    - when_it_happens: "under load/uphill/passing vs all the time; intermittent vs constant"
    - forced_induction_equipped: "turbo/supercharged vs naturally aspirated — reframes to general low power if NA"
    - onset_and_recent_service: "sudden after a repair (clamp/hose left loose) vs gradual"
  confusables:
    - vs: general_low_power_hesitation
      discriminator_question: "Is the car turbocharged, and did the power loss come with a whoosh/whistle or a reduced-power message?"
    - vs: whistle_or_hiss_under_hood
      discriminator_question: "Is the power loss the main problem, or mostly the new noise?"
    - vs: multiple_warning_lights
      discriminator_question: "Did the dash lights come with the car physically losing power/capping its speed, or on their own?"
  safety_flag: none
  notes: "Boost-side power loss: split intercooler hose/loose clamp, wastegate/actuator, or failing turbo — ECU limp mode capping RPM/speed is common [S8]. Advise caution about highway merging while down on power, and escalate if joined by smoke or major oil loss (turbo seals → blue smoke entry). On a non-turbo car this collapses into the performance domain's general low-power entry (cross-domain pair)."

# ---------------------------------------------------------------------------
# SMOKE — TAILPIPE & UNDER HOOD
# ---------------------------------------------------------------------------

- category: smell_smoke
  subcategory: white_smoke_from_tailpipe
  display: "White smoke from the exhaust"
  customer_voice_anchors:
    - "thick white smoke pouring out of my exhaust"
