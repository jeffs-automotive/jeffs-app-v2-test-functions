- category: smell_smoke
  subcategory: smoke_or_steam_under_hood
  display: "Smoke or steam from under the hood"
  customer_voice_anchors:
    - "smoke coming from under the hood"
    - "steam pouring out from under the hood and it smells sweet"
    - "SAW SMOKE COMING FROM THE GRILLE"
    - "white steam coming out of the engine bay after i park"
    - "smoke from under the hood and a coolant message came up"
    - "hissing and steam from under my hood but the gauge says its not overheating"
    - "wisps of smoke off the engine and it smells like burning oil"
    - "hood was smoking when i pulled in, freaked me out"
    - "something is smoking under the hood so i pulled over right away"
  required_slots:
    - smell: "sweet = coolant boil-over/spray; greasy burnt = oil on the manifold; sharp plastic = electrical (different domain) — the smell routes it"
    - temperature_gauge_state: "hot gauge or overheat message = the cooling side; normal gauge shifts odds to oil/electrical"
    - still_driving: "visible under-hood smoke warrants pull-over-and-assess advice; tow if it continues [S3]"
    - steam_vs_smoke_as_seen: "billowing white vapor (steam) vs gray/black smoke — customers use the words interchangeably"
    - fluid_loss: "coolant or oil level dropping ties it to the source"
  confusables:
    - vs: engine_overheating_running_hot
      discriminator_question: "Is the temperature gauge reading hot along with the smoke, or is the gauge normal?"
    - vs: burning_electrical_plastic_smell
      discriminator_question: "Does it smell sweet or oily, or like sharp burning plastic/wiring?"
    - vs: burning_oil_smell
      discriminator_question: "Can you actually see smoke or steam, or is it just the smell?"
  safety_flag: advise_immediately
  notes: "Anything visibly smoking/steaming under the hood gets stop-and-assess advice [S3]. The smell is the router: sweet+hot = coolant (this domain), greasy = oil on the exhaust (this domain), acrid plastic = electrical (cross-domain — electrical fires escalate to 'get away from the vehicle if it worsens'). Smoke that appeared right after a repair elsewhere is also a situational/after-recent-service case."
