# ============================================================================
# Anchor knowledge — domain: fluids-cooling-fuel-intake
# Day-one seed for the customer-concern classifier (embedding anchor bank +
# LLM slot/confusable guidance). All anchors are CUSTOMER VOICE (vague, terse,
# misspelled, mixed with booking requests) — never technician shorthand.
#
# Scope: overheating & cooling, oil (leak/smell/consumption/light), the leak
# family by puddle color/location, fuel system & EVAP, air induction & forced
# induction, and smoke from tailpipe / under hood.
#
# Factual grounding (diagnostic claims) — web sources:
#   [S1] Fluid-by-color identification: AutoZone "How to Determine Leaking
#        Fluid by Color" https://www.autozone.com/diy/fluids-chemicals/how-to-determine-leaking-fluid-by-color
#        + RepairPal color-coded leak guide https://repairpal.com/symptoms/car-fluid-leaks-what-to-do
#        (oil = brown/black petroleum-smelling; trans = red thinning to red-brown;
#        coolant = green/orange/pink/blue, sweet, slimy; brake fluid = clear-to-
#        light-brown, slick, DO NOT DRIVE if suspected; PS = red/red-brown thin oily)
#   [S2] Exhaust smoke colors: Jiffy Lube https://www.jiffylube.com/resource-center/exhaust-smoke-colors-guide
#        + AutoZone https://www.autozone.com/diy/exhaust/smoke-from-exhaust
#        + Firestone https://www.firestonecompleteautocare.com/blog/maintenance/what-is-my-exhaust-color-telling-me/
#        (blue/gray = burning oil — startup puff = valve seals, constant/under-load
#        = rings; white thick + persistent + sweet = coolant into combustion /
#        head gasket; thin white vapor that clears on cold mornings = normal
#        condensation; black = rich mixture, gas smell + mpg drop)
#   [S3] Overheating response: Firestone "Car Overheating? Here's Why, What To
#        Do (& Not Do)" https://www.firestonecompleteautocare.com/blog/maintenance/when-car-overheats/
#        (gauge to H / into red + steam from hood = pull over immediately;
#        continuing to drive risks catastrophic engine damage)
#   [S4] Gas cap / EVAP CEL: CarParts.com P0455 guide
#        https://www.carparts.com/blog/p0455-code-evaporative-emission-system-large-leak-detected/
#        (loose/cracked cap sets P0440/P0442/P0455/P0456/P0457, often right
#        after refueling; tighten-and-retest first; light needs drive cycles or
#        a scan tool to clear)
#   [S5] Fuel smell safety: Firestone "Smell of Gas in Car"
#        https://www.firestonecompleteautocare.com/blog/maintenance/smell-of-gas-in-car/
#        + Burt Brothers https://www.burtbrothers.com/blog/gas-smell-inside-your-car-what-it-means-how-to-fix-it
#        (strong persistent raw-gas odor = fire hazard, stop driving / tow)
#   [S6] No-heat causes: Family Handyman https://www.familyhandyman.com/article/if-your-car-has-no-heat/
#        + RepairPal https://repairpal.com/symptoms/car-heater-not-working
#        + Rohnert Park Transmission https://rohnertparktransmission.com/blog/car-heater-not-working-troubleshooting-guide
#        (low coolant is the #1 cause; stuck-open thermostat second; heater-core
#        blockage/leak — sweet smell + fogged windshield film)
#   [S7] Oil consumption norms: Cars.com "How Much Oil Consumption Is Normal?"
#        https://www.cars.com/articles/how-much-oil-consumption-is-normal-1420682864535/
#        + Consumer Reports https://www.consumerreports.org/cro/magazine/2015/06/excessive-oil-consumption/index.htm
#        (a quart per ~1,000–1,500 mi is the worn-rings/valve-seals territory;
#        many OEMs call 1 qt/1,500 mi "acceptable"; burned oil shows as blue smoke
#        and can clog the catalytic converter)
#   [S8] Turbo/boost symptoms: MAHLE MPULSE "The trouble with whistling turbos"
#        https://workshop-heroes.mahle.com/en/article/trouble-with-whistling-turbos
#        + Wisco Automotive https://wiscoautomotive.com/symptoms-of-bad-turbocharger-5-signs/
#        (boost/charge-air leak = whoosh/hiss + flat power + possible limp mode
#        capping RPM ~3k; sudden louder/siren whine = bearing or damage)
#
# Customer-language grounding: real Tekmetric work-order fragments + forum
# paraphrase mined in docs/automotive-knowledge-base/ (router-leaks,
# router-smoke-smells, cooling-system / engine-lubrication-oil /
# fuel-system-evap / air-induction-forced-induction lexicons, 2026-07-18) +
# forum threads surfaced in the searches above (fiestastforum.com overheating,
# mdxers.org / impalaforums.com EVAP codes, crvownersclub.com boost/limp +
# oil-consumption threads).
#
# safety_flag policy: advise_immediately = the assistant should tell the
# customer this can be unsafe to keep driving (brake fluid loss, red temp/oil
# light, active overheating, raw fuel smell, visible smoke/steam under hood,
# thick persistent white exhaust smoke). Blue/black tailpipe smoke are
# drivable-with-caution and stay `none` with an in-notes caution.
# ============================================================================

# ---------------------------------------------------------------------------
# OVERHEATING & COOLING
# ---------------------------------------------------------------------------

- category: overheating
  subcategory: engine_overheating_running_hot
  display: "Engine overheating / running hot"
  customer_voice_anchors:
    - "my car is overheating"
    - "temp gauge went all the way into the red and steam started coming from the hood"
    - "temperature needle keeps creeping up when im sitting in traffic"
    - "car got real hot going up a long hill, had to pull over and let it cool off"
    - "engine running hot, i havent added any coolant"
    - "OVERHEATING. HAD TO GET IT TOWED IN"
    - "the needle jumps to H after like 10 minutes of driving"
    - "car over heated on the highway and now theres a sweet smell"
    - "gauge goes up and down like the thermostat is getting stuck"
    - "running hotter than normal but it hasnt boiled over yet"
    - "heat gauge maxed out and it was steaming when i pulled over"
    - "it only overheats when the AC is on and im stopped"
  required_slots:
    - temperature_gauge_state: "what the gauge/message actually shows (in the red, past halfway, fluctuating, warning message) — confirms an overheat vs a suspicion and sets severity"
    - steam_or_smoke_present: "visible steam/boil-over means stop-driving advice and possible tow, not a normal drop-off"
    - drivable_now: "still being driven vs parked/towed — booking urgency and tow coordination"
    - onset_conditions: "idle/traffic vs highway vs uphill/towing vs AC on — narrows fan/thermostat vs radiator/water-pump side"
    - coolant_level_or_topping_off: "empty reservoir or repeated top-offs points at a leak; links to the coolant-loss path"
  confusables:
    - vs: engine_temperature_light
      discriminator_question: "Is the temperature gauge itself reading hot, or is it a warning light/message on the dash that got your attention?"
    - vs: smoke_or_steam_under_hood
      discriminator_question: "Is the main thing the hot gauge reading, or smoke/steam you can actually see coming from the hood?"
    - vs: coolant_loss_low_coolant
      discriminator_question: "Has it actually read hot on the gauge, or are you just having to keep adding coolant?"
  safety_flag: advise_immediately
  notes: "Includes gauge-confirmed running hot, boil-over, and fluctuating-gauge overheat. Does NOT include a bare temp warning light with a normal gauge (→ engine_temperature_light) or coolant top-offs with no hot reading (→ coolant_loss_low_coolant). Customers say 'smoking' for steam — treat steam+hot gauge as overheating, not an electrical fire. Continuing to drive in the red risks engine damage [S3]."

- category: warning_light
  subcategory: engine_temperature_light
  display: "Temperature / coolant warning light or message"
  customer_voice_anchors:
    - "the red thermometer light came on"
    - "coolant temp warning popped up on the dash"
    - "HIGH ENGINE TEMPERATURE message came up and said stop the vehicle"
    - "little red temperature symbol keeps flashing at me"
    - "coolant light is on but the car seems to drive fine"
    - "temp light comes on after driving a while then goes back off"
    - "dash said engine overheating unsafe to drive so i had it towed here"
    - "the light that looks like a thermometer floating in water lit up"
    - "low coolant light came on this morning"
    - "COOLANT MESSAGE ON DASH. CHECK ENGINE LIGHT ON TOO"
  required_slots:
    - light_symbol_and_color: "red thermometer vs low-coolant level vs blue cold-engine icon — red means stop-drive, blue on cold start is normal"
    - light_behavior: "steady vs flashing vs comes-and-goes — intermittent points at level/sensor, steady at real overheat"
    - gauge_reading_if_any: "does the gauge corroborate the light — separates sensor/level warnings from an actual overheat"
    - coolant_level_checked: "customer already checked/topped the reservoir or not"
    - drivable_now: "still driving it vs parked/towed — urgency"
  confusables:
    - vs: engine_overheating_running_hot
      discriminator_question: "Besides the light, is the temperature gauge actually reading high or is there any steam?"
    - vs: check_engine_light_gas_cap_evap
      discriminator_question: "Is it a thermometer/coolant symbol, or the orange engine-shaped check-engine light?"
  safety_flag: advise_immediately
  notes: "Light-led version of overheating: the customer leads with a dash light/message, not a gauge reading. Includes 'low coolant' level warnings. Does NOT include the blue coolant-cold icon that clears after warm-up (normal — reassure, offer inspection). Customers often call every dash icon 'the engine light' — the symbol question is load-bearing."

- category: fluids
  subcategory: coolant_loss_low_coolant
  display: "Losing coolant / keeps needing top-offs"
  customer_voice_anchors:
    - "i keep having to top off the coolant every couple weeks"
    - "coolant reservoir is bone dry but i dont see any leaks"
    - "low coolant light keeps coming on and i keep adding antifreeze"
    - "car keeps drinking coolant, no puddles anywhere"
    - "have to add water to the radiator every few days"
    - "antifreeze keeps disappearing and i cant find where its going"
    - "coolant low again, thats the third time this month"
    - "topped it off before a road trip and its already low again"
    - "where is my coolant going, theres no drips on the driveway"
    - "coolant level keeps dropping but the garage floor is clean"
  required_slots:
    - loss_rate: "how much how often (topping off weekly vs seasonal) — severity and internal-vs-external leak odds"
    - puddle_present: "any drips/puddle on the ground — if yes this is the coolant-puddle leak path instead"
    - overheating_or_temp_light: "any hot reading or warning light — escalates urgency"
    - white_smoke_or_sweet_smell: "thick white exhaust smoke or sweet smell = coolant burning internally (head gasket cue) [S2]"
    - heater_performance: "weak/no heat can accompany low coolant [S6]"
  confusables:
    - vs: coolant_puddle_green_orange_pink
      discriminator_question: "Do you ever see a puddle or drips under the car, or does the coolant just disappear with nothing on the ground?"
    - vs: white_smoke_from_tailpipe
      discriminator_question: "Any thick white smoke from the exhaust, especially once the engine is warmed up?"
    - vs: engine_overheating_running_hot
      discriminator_question: "Has the temperature gauge actually gone hot, or has it stayed normal while the level drops?"
  safety_flag: none
  notes: "Level-led concern with NO visible puddle. If a puddle is named, route to the coolant-puddle leak entry. Escalate to advise_immediately when paired with a hot gauge or white smoke. Customers say 'water' for coolant ('adding water every few days') — treat as coolant."

- category: hvac
  subcategory: no_heat_from_vents
  display: "Heater blows cold / no heat"
  customer_voice_anchors:
    - "my heater blows cold air"
    - "no heat, the air never gets warm even after driving 20 minutes"
    - "NO HEAT. GAUGE SOMETIMES GOES UP"
    - "heat only works when im driving, goes cold at stoplights"
    - "heater takes forever to warm up, like half an hour"
    - "its freezing out and my car has no heat at all"
    - "heat blows warm for a minute then turns cold"
    - "no heat and i smell something kinda sweet in the car"
    - "heater not working, the fan blows fine its just cold air"
    - "no heat on the drivers side but the passenger side is warm"
  required_slots:
    - airflow_present: "air blows but cold vs no air at all — no airflow is a blower/HVAC problem, not cooling"
    - temperature_gauge_state: "engine never reaching normal temp = stuck-open thermostat; normal temp + cold air = heater core / blend door [S6]"
    - coolant_level_or_loss: "low coolant is the #1 cause of no heat [S6] — ties to the coolant-loss path"
    - pattern: "cold at idle but warm at speed = low coolant/air pocket; one side only = blend door (HVAC)"
    - sweet_smell_or_window_film: "sweet smell / greasy fog film on windshield = leaking heater core [S6]"
  confusables:
    - vs: hvac_blower_no_airflow
      discriminator_question: "Is air coming out of the vents but it's cold, or is no air blowing out at all?"
    - vs: engine_overheating_running_hot
      discriminator_question: "Does the temperature gauge ever read high while the heat is out?"
    - vs: coolant_loss_low_coolant
      discriminator_question: "Have you had to add coolant lately or seen the level drop?"
  safety_flag: none
  notes: "Cooling-side no-heat (low coolant, thermostat, heater core). One-side-only or no-airflow variants belong to the HVAC domain (blend door / blower) — cross-domain pair. 'No heat + gauge goes up' is a combined cooling concern; keep the overheat lead."

- category: smell_smoke
  subcategory: sweet_antifreeze_smell
  display: "Sweet / maple-syrup (antifreeze) smell"
  customer_voice_anchors:
    - "smells like maple syrup around my car after i drive it"
    - "sweet smell coming from the vents when the heat is on"
    - "car smells like pancake syrup when i park it"
    - "sweet chemical smell under the hood, almost like candy"
    - "antifreeze smell inside the car and the windows keep fogging up"
    - "i smell coolant but i cant find a leak anywhere"
    - "sweet smell and a little steam from the hood after long drives"
    - "my wife says the car smells sweet like syrup, mostly after the highway"
    - "smells sweet when the defroster is on and theres a greasy film on the windshield"
  required_slots:
    - smell_location: "from the vents/inside (heater core) vs outside/under hood (external coolant leak) — different services"
    - hvac_running_when_smelled: "heat/defrost on = heater-core cue [S6]"
    - coolant_level: "dropping level corroborates a real leak"
    - window_fogging_or_film: "oily film on the inside of the windshield = heater core leak [S6]"
    - temperature_gauge_state: "running hot escalates to the overheat path"
  confusables:
    - vs: coolant_puddle_green_orange_pink
      discriminator_question: "Is there a colored puddle on the ground, or just the smell with nothing underneath?"
    - vs: no_heat_from_vents
      discriminator_question: "Is the heat still working normally? (A leaking heater core often kills the heat too.)"
    - vs: musty_or_bad_vent_smell
      discriminator_question: "Is it a sweet syrupy smell, or more of a musty/dirty-socks smell when the A/C first comes on?"
  safety_flag: none
  notes: "Smell-led, no-puddle coolant concern. Coolant is the only automotive fluid customers describe as 'sweet/syrup' [S1]. If a puddle leads, it's the leak entry; if a hot gauge leads, it's overheating. Vent-tied sweet smell = heater core (still cooling-system, but flag that in-cabin coolant vapor can cause headaches — get it looked at soon)."

# ---------------------------------------------------------------------------
# THE LEAK FAMILY (by puddle color / location / smell)
# ---------------------------------------------------------------------------

- category: leak
  subcategory: coolant_puddle_green_orange_pink
  display: "Coolant leak (green/orange/pink/yellow puddle)"
  customer_voice_anchors:
    - "bright green puddle under the front of my car"
    - "LARGE PUDDLE OF ANTIFREEZE UNDER THE CAR"
    - "orange fluid leaking under the radiator"
    - "pink stuff dripping under my car, smells kind of sweet"
    - "antifreeze leaking, i can see it dripping off a hose"
    - "green liquid on the garage floor every morning"
    - "coolant pours right back out the bottom when i fill it up"
    - "neon yellow green puddle by the front bumper"
    - "my honda is leaking some blue coolant looking stuff"
    - "leak at the lower radiator hose, losing antifreeze"
    - "sweet smelling wet spot under the engine"
  required_slots:
    - fluid_color: "green/orange/pink/yellow (occasionally blue) — the primary coolant identifier [S1]"
    - puddle_location: "typically front/center under the radiator; elsewhere reopens the color question"
    - smell: "sweet confirms coolant vs oily red ATF or soapy blue washer fluid [S1]"
    - overheating_or_temp_light: "hot gauge or warning light escalates severity"
    - leak_rate_and_drivable: "drips vs pouring out — pouring + hot means tow advice"
  confusables:
    - vs: red_pink_puddle_transmission_power_steering
      discriminator_question: "Is the fluid watery and bright (maybe sweet-smelling), or is it oily and slick red?"
    - vs: blue_puddle_washer_fluid
      discriminator_question: "Does the blue fluid smell sweet like antifreeze, or soapy/like nothing (washer fluid)?"
    - vs: clear_water_puddle_ac_condensation
      discriminator_question: "Does it have a color and a sweet smell, or is it just clear plain water?"
  safety_flag: none
  notes: "Puddle-led coolant loss. Pink coolant vs red ATF and blue coolant vs blue washer fluid are the classic color traps — resolve on texture (watery vs oily) and smell (sweet), never color alone. Escalate to stop-driving advice if paired with an overheat. No puddle + level dropping → coolant_loss_low_coolant."

- category: leak
  subcategory: oil_puddle_brown_black
  display: "Engine oil leak (brown/black puddle)"
  customer_voice_anchors:
    - "black oil spots on my driveway where i park"
    - "oil leaking, might be the drain plug"
    - "dark brown puddle under the engine"
    - "theres oil dripping off the bottom of the motor"
    - "oil leek under my car"
    - "car keeps marking its territory, oil spots everywhere i park"
    - "OIL LEAK. FIND AND FIX"
    - "oil dripping onto a plastic cover under the front, spots are like 3-4 inches"
    - "greasy black stain in my parking spot at work"
    - "came back after a month away and theres a puddle of oil under it"
    - "slow oil drip, i put cardboard down and theres new spots every day"
  required_slots:
    - fluid_color: "dark brown/black, greasy, petroleum smell — the oil identifier [S1]"
    - puddle_location: "under the engine up front vs under the rear axle (gear oil) vs near a wheel (brake fluid — safety)"
    - oil_level_or_light: "low dipstick or oil-pressure light events escalate — a leak that outruns the level is urgent"
    - size_and_rate: "spots/seepage vs a 3-inch-plus puddle — severity triage [S1]"
    - recent_service: "oil change or repair just done → likely loose filter/plug, handle as a comeback/situational"
  confusables:
    - vs: thick_dark_puddle_gear_diff_oil
      discriminator_question: "Is the dark oil under the engine up front, or back by the rear axle (and does it smell like rotten eggs)?"
    - vs: clear_yellow_light_brown_puddle_brake_fluid
      discriminator_question: "Is the drip up front by the engine, or near a wheel — and has the brake pedal felt soft or low at all?"
    - vs: red_pink_puddle_transmission_power_steering
      discriminator_question: "Is it dark brown/black, or does it look red/pink when fresh?"
  safety_flag: none
  notes: "Fresh engine oil can look AMBER — the amber/light-brown color collides with brake fluid. A bare 'amber drips' answer must trigger the location+pedal question before settling on oil (safety). Rear-main leaks get mistaken for 'transmission leaking' — color decides. Burning-oil smell with NO puddle → burning_oil_smell."

- category: leak
  subcategory: red_pink_puddle_transmission_power_steering
  display: "Red fluid leak (transmission / power steering)"
  customer_voice_anchors:
    - "bright red fluid leaking under the middle of my car"
    - "red oily spots where i park"
    - "i think its transmission fluid, its reddish"
    - "power steering fluid everywhere, the pump is leaking bad"
    - "pinkish red puddle under the front"
    - "red fluid on the driveway and my steering whines when i turn"
    - "TRANSMISSION COOLER LINE LEAKING"
    - "looks like cherry kool aid but oily, under the car"
    - "reddish brown drips under the middle of the car"
  required_slots:
    - fluid_color: "red/pink fresh, red-brown when old; thin and oily [S1]"
    - puddle_location: "toward the middle/rear = transmission; up front = power steering (or trans cooler lines at the radiator)"
    - steering_feel: "whining/heavy steering, especially when turning = power-steering side"
    - shifting_behavior: "slipping, hard shifts, delayed engagement = transmission side"
    - fluid_level_checked: "which reservoir is dropping, if the customer knows"
  confusables:
    - vs: coolant_puddle_green_orange_pink
      discriminator_question: "Is the fluid slick and oily red, or watery bright pink with a sweet smell (coolant)?"
    - vs: clear_yellow_light_brown_puddle_brake_fluid
      discriminator_question: "Is it clearly red, or more clear-to-light-brown near a wheel with any change in the brake pedal?"
    - vs: oil_puddle_brown_black
      discriminator_question: "Fresh drips — do they look red/pink or dark brown/black?"
  safety_flag: none
  notes: "One puddle color, two systems: the trans-vs-PS split resolves on location (middle/rear vs front) plus the accompanying symptom (shifting vs steering whine). Old ATF darkens toward brown — 'reddish brown' still belongs here. Many newer cars have electric power steering with no PS fluid at all; red fluid there is trans/cooler-line. Escalate if the trans is slipping badly (drivability)."

- category: leak
  subcategory: clear_yellow_light_brown_puddle_brake_fluid
  display: "Brake fluid leak (clear/yellow/light-brown, slick)"
  customer_voice_anchors:
    - "brake fluid leaking near my front wheel"
    - "clear yellowish fluid dripping by the tire and my pedal feels soft"
    - "amber colored drips near the wheel"
    - "brake pedal goes almost to the floor and theres wet spots by the back wheel"
    - "i added brake fluid and it leaks right back out"
    - "light brown slippery fluid under the car by the driver side wheel"
    - "brake fluid keeps getting low and i see drips on the inside of the tire"
    - "wet oily streak on the inside of my rear wheel and the brakes feel weird"
    - "TOW IN. NO BRAKES. BRAKE FLUID EMPTY"
  required_slots:
    - pedal_feel: "soft/spongy/sinking/goes-to-floor — confirms brake fluid AND triggers stop-driving advice [S1]"
    - puddle_location: "near a wheel or along the firewall/master cylinder — the brake-fluid location signature"
    - fluid_color_texture: "clear to yellow to light brown, very slick/oily feel [S1]"
    - brake_warning_light: "red brake light on = low fluid, corroborates"
    - drivable_now: "if pedal is compromised, advise tow — do not drive"
  confusables:
    - vs: oil_puddle_brown_black
      discriminator_question: "Is the amber/light-brown drip near a wheel with any change in the brake pedal, or up front under the engine with the pedal feeling normal?"
    - vs: clear_water_puddle_ac_condensation
      discriminator_question: "Is the clear fluid slick/oily near a wheel, or thin plain water under the passenger side after running the A/C?"
    - vs: red_pink_puddle_transmission_power_steering
      discriminator_question: "Is it clear-to-light-brown near a wheel, or clearly red toward the middle/front?"
  safety_flag: advise_immediately
  notes: "SAFETY-CRITICAL entry. The two color collisions — amber (vs fresh engine oil) and clear (vs A/C condensation) — must NEVER be settled by color alone; location-near-a-wheel plus pedal_feel decide. Any soft/sinking pedal or brake light with a leak = advise not to drive, offer tow [S1]. A brake-fluid miss is the worst misroute in the leak family."

- category: leak
  subcategory: clear_water_puddle_ac_condensation
  display: "Clear water under car (A/C condensation)"
  customer_voice_anchors:
    - "clear water dripping under my car after running the AC"
    - "puddle of plain water under the passenger side, no smell"
    - "water leaking under the car every time i park, is that normal?"
    - "looks like just water, dries up and doesnt leave a stain"
    - "water dripping under the front passenger area on hot days"
    - "my car leaks water whenever the air conditioning is on"
    - "clear odorless puddle, not slippery, pretty sure its just water"
    - "small water puddle under the car in the summer only"
  required_slots:
    - fluid_color_texture: "clear, thin, odorless, evaporates without a stain — the water signature"
    - ac_recently_running: "A/C or defrost use right before the puddle — condensation is normal operation"
    - puddle_location: "passenger-side front floor area is the classic evaporator-drain spot"
    - pedal_feel: "safety screen — clear + slick + near a wheel is brake fluid, not water"
    - smell: "any sweetness reopens the coolant question"
  confusables:
    - vs: clear_yellow_light_brown_puddle_brake_fluid
      discriminator_question: "Is it slick or oily to the touch and near a wheel, or thin plain water under the passenger side?"
    - vs: coolant_puddle_green_orange_pink
      discriminator_question: "Is it totally clear with no smell, or does it have color or a sweet smell?"
  safety_flag: none
  notes: "Usually NORMAL A/C condensation — reassure, booking optional. The job of this entry is the safety screen: the 'clear fluid' description collides with brake fluid, so the slickness/location/pedal questions must run before reassuring. Water dripping INSIDE the cabin (wet carpet) is a different concern (clogged evap drain / body leak → body/water-leak domain)."

- category: leak
  subcategory: thick_dark_puddle_gear_diff_oil
  display: "Gear / differential oil leak (thick, dark, stinky)"
  customer_voice_anchors:
    - "thick black oil leaking by the rear axle"
    - "gooey dark stuff under the back of my truck, smells awful"
    - "rear differential is leaking"
    - "stinky oil leak at the back, smells like rotten eggs"
    - "heavy dark oil around the rear wheel hub"
    - "axle seal leaking, theres thick oil slung all over the inside of the wheel"
    - "dark sticky oil under the rear end of the car"
    - "REAR DIFF LEAK. INSPECT AND ADVISE"
  required_slots:
    - puddle_location: "under the rear axle/differential (or transfer case) vs under the engine up front — the main split from engine oil"
    - smell: "gear oil's sulfur/rotten-egg stink is distinctive"
    - consistency: "thick, sticky, honey-to-tar consistency vs thinner engine oil"
    - noise_from_rear: "whining/howling from the back — a diff run low makes noise before it fails"
    - vehicle_type: "RWD/4x4/AWD (has a rear diff) vs FWD car (likely not gear oil)"
  confusables:
    - vs: oil_puddle_brown_black
      discriminator_question: "Is the dark oil under the engine up front, or back by the rear axle?"
    - vs: rotten_egg_exhaust_smell
      discriminator_question: "Is the rotten-egg smell coming from a leaking puddle/wet axle, or from the exhaust while driving?"
  safety_flag: none
  notes: "Puddle-led rear-end oil. The rotten-egg descriptor collides with a failing catalytic converter (exhaust domain) — the puddle vs tailpipe question separates them. Wheel-end axle-seal leaks can also contaminate rear BRAKES (slung oil on the inside of the wheel) — capture the location and note for the advisor."

- category: leak
  subcategory: blue_puddle_washer_fluid
  display: "Washer fluid leak (blue puddle)"
  customer_voice_anchors:
