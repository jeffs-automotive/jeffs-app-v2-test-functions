    - vs: oil_consumption_burning_oil
      discriminator_question: "Is the car using oil between changes, or is this just the regular service coming due?"
  safety_flag: none
  notes: "Request, not a diagnostic concern — but it is the highest-volume utterance containing the word 'oil', so it MUST anchor here rather than bleed into oil-leak/oil-light categories. The one safety trap: 'oil light came on so i need an oil change' — always disambiguate the light before booking a routine service."

# ---------------------------------------------------------------------------
# FUEL SYSTEM & EVAP
# ---------------------------------------------------------------------------

- category: smell_smoke
  subcategory: gasoline_fuel_smell
  display: "Gasoline / fuel smell"
  customer_voice_anchors:
    - "i smell gas inside my car when im driving"
    - "strong gas smell in the garage after i park"
    - "smells like gasoline when i start it cold in the morning"
    - "raw gas smell around the back of the car"
    - "gas fumes coming through the vents, its making me lightheaded"
    - "smell gas real strong ever since i filled up"
    - "my car reeks of gas but i dont see anything leaking"
    - "gasoline smell under the hood, im scared to drive it"
    - "gas smell when the heater is running"
  required_slots:
    - smell_strength_persistence: "strong and persistent raw-gas odor = fire hazard, stop driving [S5]; faint whiff at cold start is a softer cue"
    - smell_location: "inside the cabin vs outside/under hood vs rear near the tank — narrows the leak point"
    - when_it_happens: "cold start / right after fueling / all the time — EVAP purge vs filler-neck vs line leak"
    - visible_fuel: "wet spots or drips under the tank or engine — confirms an active leak, tow territory"
    - check_engine_light: "EVAP leaks often set the CEL [S4]"
  confusables:
    - vs: exhaust_fumes_in_cabin
      discriminator_question: "Is it a raw gasoline smell, or a smoky burnt exhaust smell inside the car?"
    - vs: rotten_egg_exhaust_smell
      discriminator_question: "Fresh sharp gas smell, or more like rotten eggs/sulfur?"
    - vs: black_smoke_from_tailpipe
      discriminator_question: "Just the smell, or is there also black smoke from the exhaust when you accelerate?"
  safety_flag: advise_immediately
  notes: "Gasoline vapor is flammable and inhalation causes dizziness/nausea — a strong persistent raw-gas smell means do not keep driving; advise a tow [S5]. Includes cabin, garage, under-hood, and post-fill fuel smells. Does NOT include sulfur/rotten-egg (catalytic converter, exhaust domain) or smoky exhaust-in-cabin (exhaust domain, CO risk)."

- category: warning_light
  subcategory: check_engine_light_gas_cap_evap
  display: "Check engine light after getting gas (gas cap / EVAP)"
  customer_voice_anchors:
    - "check engine light came on right after i got gas"
    - "tightened my gas cap but the light is still on"
    - "light came on after filling up, the cap clicks fine"
    - "check engine light on, autozone said its an evap code"
    - "p0455 code keeps coming back"
    - "check fuel cap message on the dash"
    - "cel on since the gas station but the car runs fine"
    - "replaced the gas cap and the light came back anyway"
    - "engine light popped on the day after i filled up"
  required_slots:
    - recent_fueling_link: "light appeared at/after a fill-up — the defining association for cap/EVAP [S4]"
    - light_steady_or_flashing: "FLASHING CEL = active misfire, a different and more urgent path; steady = emissions/EVAP"
    - cap_already_retightened: "tighten-and-drive is the first fix; light needs several drive cycles or a scan to clear [S4]"
    - code_if_scanned: "P0440/P0442/P0455/P0456/P0457 family confirms EVAP [S4]"
    - driveability_changes: "running fine vs stumbling/stalling — a stuck purge valve adds symptoms [S4]"
  confusables:
    - vs: check_engine_light_general
      discriminator_question: "Did the light come on around a fill-up or gas-cap event, or with no connection to fueling?"
    - vs: gasoline_fuel_smell
      discriminator_question: "Any actual gas smell along with the light? (A smell means a real vapor/fuel leak, not just the cap.)"
  safety_flag: none
  notes: "The fueling-linked CEL sub-case. Steady light + runs fine = book normally; FLASHING light = escalate (misfire — engine domain). Cap tightening often doesn't clear the light for days [S4] — set that expectation. Cross-domain: a generic no-fueling-link CEL belongs to the warning-light domain."

- category: fuel
  subcategory: trouble_fueling_gas_wont_go_in
  display: "Can't fill the tank / pump keeps clicking off"
  customer_voice_anchors:
    - "cant fill my gas tank, the pump keeps clicking off"
    - "gas splashes back out at me when i try to fill up"
    - "takes 10 minutes to put gas in, the nozzle keeps shutting off"
    - "CAN NOT FILL WITH GAS, when refueling it squirts back out"
    - "can only pump a couple bucks at a time before it clicks off"
    - "tank wont take gas unless i barely squeeze the nozzle"
    - "gas comes back up the filler neck when im fueling"
    - "every gas station pump clicks off on my car now"
  required_slots:
    - fill_failure_pattern: "early click-off vs fuel spit-back — both point at EVAP vent/filler-neck blockage"
    - every_station_or_one: "one finicky pump vs every station — rules out the pump itself"
    - check_engine_light: "EVAP vent codes often accompany"
    - recent_service_or_recall: "fuel pump / tank work just done → situational/comeback path"
  confusables:
    - vs: check_engine_light_gas_cap_evap
      discriminator_question: "Is the problem physically getting gas INTO the tank, or a warning light that came on after fueling?"
  safety_flag: none
  notes: "Distinct bookable EVAP-side symptom (vent valve / canister / filler neck) that customers describe entirely in gas-station terms. Not a leak, not a light — keep it from collapsing into the generic CEL entry. Spit-back that soaks the customer in fuel deserves a caution note but is not a stop-driving case."

- category: fuel
  subcategory: hard_start_after_fueling
  display: "Hard to start right after getting gas"
  customer_voice_anchors:
    - "after getting gas i have to crank it a bunch of times to get it started"
    - "car struggles to start right after i fill the tank"
    - "stalls when i leave the gas station then runs fine"
    - "every time i fill up it takes forever to start"
    - "cranks a long time after a fuel stop, fine the rest of the day"
    - "if i stop for gas after driving, it cranks and cranks before it catches"
    - "hard start after fill up, runs rough a minute then smooths out"
    - "wont start good after the gas station unless i hold the gas pedal down"
    - "starts hard and idles funny right after topping off the tank"
  required_slots:
    - only_after_fueling: "the defining pattern — starts fine except right after a fill-up (EVAP purge flooding cue)"
    - starts_eventually: "hard start vs true no-start — a car that never catches is the no-start path"
    - rough_running_after: "stumble/stall right after fueling corroborates purge-valve flooding [S4]"
    - check_engine_light: "purge faults often set codes"
  confusables:
    - vs: cranks_but_wont_start
      discriminator_question: "Does it always start eventually, or has it ever cranked and never started at all?"
    - vs: check_engine_light_gas_cap_evap
      discriminator_question: "Is the main thing the hard starting, or a warning light after fueling?"
  safety_flag: none
  notes: "Fueling-linked hard start (classic stuck-open EVAP purge valve drawing raw vapor after refueling [S4]). General hot-start or cold-start difficulty with NO fueling link belongs to the performance/driveability domain — the only-after-fueling slot is what keeps this entry honest."

- category: no_start
  subcategory: cranks_but_wont_start
  display: "Cranks but won't start (fuel suspected)"
  customer_voice_anchors:
    - "engine cranks and cranks but wont fire up"
    - "turns over fine but never catches"
    - "wont start, sounds like its trying but nothing happens"
    - "cranks strong but wont start, tank is full"
    - "died while i was driving and now it cranks but wont start"
    - "ran out of gas, put gas in, still wont start"
    - "tow in, cranks but will not start"
    - "car just cranks, doesnt even sputter"
    - "INTERMITENT NO START"
    - "got gas sunday and the next day it was chugging, now it wont start at all"
  required_slots:
    - crank_behavior: "engine spins normally vs single click vs nothing — the fundamental fuel-vs-battery/starter split"
    - fuel_level_and_recent_fueling: "ran dry, or symptoms started right after a fill-up (bad-fuel suspicion)"
    - died_while_driving_or_wont_start_parked: "sudden death on the road (pump/crank sensor) vs won't start cold"
    - any_sputter_or_partial_catch: "almost-starts vs dead-silent combustion — narrows fuel vs spark"
    - towed_or_at_home: "logistics — most of these arrive by tow"
  confusables:
    - vs: wont_crank_just_clicks
      discriminator_question: "When you turn the key, does the engine actually spin over and crank, or do you just hear a click or nothing at all?"
    - vs: hard_start_after_fueling
      discriminator_question: "Has it ever started eventually, or does it crank and never catch?"
  safety_flag: none
  notes: "The fuel-side no-start: cranks normally, won't fire (pump, pressure, contaminated fuel, or non-fuel causes — spark/crank signal — the shop sorts that). The crank-behavior question is the single most valuable no-start fact: click/silent no-starts are battery/starter (electrical domain — cross-domain pair). Car is immobile so not a driving hazard; treat as tow-in logistics."

# ---------------------------------------------------------------------------
# AIR INDUCTION & FORCED INDUCTION
# ---------------------------------------------------------------------------

- category: noise
  subcategory: whistle_or_hiss_under_hood
  display: "Whistling / hissing from the engine"
  customer_voice_anchors:
    - "high pitched whistle coming from the engine"
    - "hissing sound under the hood when its idling"
    - "whistling noise when i accelerate that wasnt there before"
    - "sounds like a tea kettle under the hood"
