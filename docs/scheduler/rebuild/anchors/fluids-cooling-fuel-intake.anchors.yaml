  notes: "The single most-confused dash light: customers say 'oil light' for BOTH the red pressure warning and the oil-change/maintenance reminder. The symbol question (red oil can with a drip vs wrench/'oil life %') is load-bearing — a red pressure light means stop driving, a reminder means book an oil change. Warm-idle flicker that clears with RPM is the classic worn-engine/low-pressure pattern; still urgent to inspect."

- category: fluids
  subcategory: oil_consumption_burning_oil
  display: "Burning / losing oil between changes"
  customer_voice_anchors:
    - "i have to add a quart of oil every few weeks"
    - "car burns oil like crazy between oil changes"
    - "oil is always low when i check it but theres no leak on the ground"
    - "goes through a quart every 1000 miles"
    - "dipstick was bone dry at my last oil change"
    - "keep adding oil and theres never a drip in the driveway"
    - "where is my oil going, no puddles and no smoke that i can see"
    - "using oil between changes, is that normal for a car with 150k"
    - "little puff of smoke on startup and it burns oil"
  required_slots:
    - consumption_rate: "quarts per miles/weeks — a quart per ~1,000–1,500 mi is the worn rings/valve-seals threshold [S7]"
    - visible_leak: "any ground spots — routes to the oil-puddle leak entry instead"
    - blue_smoke: "blue/gray exhaust smoke corroborates burning it (startup = valve seals, under load = rings) [S2][S7]"
    - oil_light_events: "any pressure-light flickers — escalates"
    - vehicle_age_miles: "consumption norms differ; some engines are known burners [S7]"
  confusables:
    - vs: oil_puddle_brown_black
      discriminator_question: "Are there oil spots or a puddle where you park, or does the level just drop with a clean driveway?"
    - vs: blue_gray_smoke_from_tailpipe
      discriminator_question: "Is the thing you're noticing the low oil level, or visible blue/gray smoke from the exhaust?"
  safety_flag: none
  notes: "Level-led: leaking vs burning is the first fork (ground spots vs clean driveway). Unburned-oil symptoms can be silent — no smoke visible even when consuming. Chronic burning can clog the catalytic converter [S7]. If the customer leads with smoke, use the blue-smoke entry."

- category: request
  subcategory: oil_change_request
  display: "Oil change / routine service request"
  customer_voice_anchors:
