    - smell: "sweet = coolant burning in the engine [S2]"
    - coolant_loss: "level dropping alongside the smoke = internal coolant leak (head gasket territory) [S2]"
    - temperature_gauge_state: "running hot alongside = escalate, stop-driving advice"
