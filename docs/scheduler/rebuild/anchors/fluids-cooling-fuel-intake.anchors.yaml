    - "oil light blinked a few times on the drive home"
  required_slots:
    - light_behavior: "steady red vs flickering at idle vs momentary — steady red = stop the engine now"
    - when_it_comes_on: "warm idle/low RPM flicker vs on all the time — severity gradient"
    - oil_level_checked: "has the customer checked the dipstick / added oil — low level is the first check"
    - engine_noise: "ticking/knocking with the light = serious, do not drive"
    - still_driving: "driving on a red oil light risks engine failure — tow advice"
