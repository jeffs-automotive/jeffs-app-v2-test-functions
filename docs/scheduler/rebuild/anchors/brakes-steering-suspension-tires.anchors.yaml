    - steering_feel: "any looseness/wander with the clunk — clunk + play raises ball-joint concern (safety-relevant)"
  confusables:
    - vs: squeaking_or_creaking_over_bumps
      discriminator_question: "Is it a deep clunk or knock, or more of a squeak/creak?"
    - vs: rattling_underneath_the_car
      discriminator_question: "Is it a solid clunk from one corner over bumps, or a lighter metallic rattle from underneath (like a loose heat shield)?"
    - vs: clunking_knocking_or_rough_ride_over_bumps
