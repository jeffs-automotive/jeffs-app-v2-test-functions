    - vs: noise_when_turning_the_steering_wheel
      discriminator_question: "Does it squeak over bumps, or when turning the steering wheel?"
  safety_flag: none
  notes: >
    Dry/worn bushings, ball joints, and spring insulators squeak with suspension travel — annoying more
    than dangerous, but persistent creaks deserve inspection since the same joints wear into clunks and
    play [S14]. Customers often ask for "lube" — the booking is an inspection.

