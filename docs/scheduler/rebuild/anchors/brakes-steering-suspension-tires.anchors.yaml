      discriminator_question: "Do you specifically suspect the wheel or lug nuts are loose, or is it a general new symptom since the tire work?"
  safety_flag: advise_immediately
  notes: >
    NEW slug — a suspected loose wheel (missing/loose lugs, rapidly worsening wobble, especially right
    after tire service) is a stop-driving conversation, not a booking; wheel separation causes crashes.
    Distinct from balance shimmy by trajectory: balance shake is steady and speed-banded; a loosening
    wheel gets worse by the mile [S15-adjacent pattern, service-industry standard practice].

