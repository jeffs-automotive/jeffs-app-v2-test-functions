# VIBRATION & WHEEL-AREA NOISE (tire/wheel/bearing causes)
# ---------------------------------------------------------------------------

- category: vibration
  subcategory: steering_wheel_shake_at_highway_speed
  display: "Steering wheel shakes at highway speed"
  customer_voice_anchors:
    - "steering wheel shakes at 65-70"
    - "vibration at highway speed that smooths out when i slow down"
    - "wheel shimmies between 60 and 70 then calms down at 75"
    - "shakes on the freeway ever since i hit a pothole"
    - "SHIMMY AT HIGHWAY SPEEDS"
    - "steering wheel vibrates at speed but not when braking"
    - "car shakes at 60, fine around town"
    - "wheel buzzes in my hands on the interstate"
    - "steering wheel shakes really bad at 65, started after new tires"
  required_slots:
    - speed_band: "the shake's speed window — classic balance shimmy is band-limited (peaks then fades)"
    - onset_timing: "NOT brake-triggered — the single most important routing fact vs brake shudder"
    - started_when: "after a pothole/curb (bent wheel, lost weight) vs gradual"
    - recent_action: "recent tire/wheel work — routes to the after-service entry if causally tied"
  confusables:
    - vs: vibration_or_pulsing_when_braking
      discriminator_question: "Does it shake while just cruising at speed, or only when you press the brakes?"
    - vs: violent_shake_after_bump_death_wobble
      discriminator_question: "Is it a steady shimmy at certain speeds, or a violent shake triggered by hitting a bump that only stops when you slow way down?"
    - vs: constant_vibration_that_doesnt_change_with_speed
      discriminator_question: "Does it come and go with speed (worst around 60-70), or is it constant at every speed?"
    - vs: engine_misfire_or_bucking_feeling
      discriminator_question: "Is the shake tied to road speed no matter the gear, or does it change with engine RPM / feel like the engine stumbling?"
  safety_flag: none
  notes: >
    Band-limited steering shimmy at 55-75 mph = wheel balance, a bent wheel, or lost wheel weight; pothole
    onset is the classic story [S12]. Brake-triggered = rotors (brakes domain); bump-triggered violent
    oscillation = death wobble. CROSS-DOMAIN: RPM-tied shake is engine misfire (performance domain) —
    "does it shake in Park when revved?" separates them.

- category: vibration
  subcategory: constant_vibration_that_doesnt_change_with_speed
  display: "Constant vibration at all speeds"
  customer_voice_anchors:
    - "car vibrates at every speed"
    - "buzzing through the seat no matter how fast im going"
    - "constant shake even crawling through a parking lot"
    - "vibration never goes away, speed doesnt matter"
    - "VEHICLE SHAKING AT ALL SPEEDS"
    - "steady tremor in the whole car since yesterday"
    - "shakes from the minute i pull out of the driveway to the highway"
    - "whole car buzzes even at 10 mph in the neighborhood"
    - "vibration is there at 20, 40, and 70, doesnt get better or worse"
  required_slots:
    - speed_band: "confirmed at ALL speeds — the defining fact"
    - onset_timing: "moving-only vs also at idle in Park — idle shake is an engine concern"
    - started_when: "sudden onset (tire belt breaking) vs gradual"
    - tire_state: "any visible tire deformity/flat spot"
  confusables:
    - vs: steering_wheel_shake_at_highway_speed
      discriminator_question: "Is it constant at every speed, or does it come and go with speed, worst around 60-70?"
    - vs: shaking_at_idle_while_stopped
      discriminator_question: "Does it also shake while sitting still in Park or at a light, or only when moving?"
  safety_flag: none
  notes: >
    Speed-independent (moving) vibration points at an out-of-round tire, broken belt, or a driveline issue
    rather than balance [S9]. A tire coming apart internally can fail suddenly — sudden-onset constant
    shake is worth prompt advice. CROSS-DOMAIN: at-idle shake is engine (performance); driveline/driveshaft
    vibration belongs to the driveline domain — synthesis should keep the moving-vs-idle discriminator.

- category: noise
  subcategory: humming_or_whirring_at_speed
  display: "Hum / drone / roar at speed (wheel bearing or tires)"
  customer_voice_anchors:
    - "humming noise that gets louder the faster i go"
    - "sounds like an airplane taking off on the highway"
    - "droning growl from the back around 40"
    - "roaring noise from the front wheel, gets louder when i turn left"
    - "hum from the rear end, most noticeable 30 to 40"
    - "sounds like i have snow tires on but i dont"
    - "loud whirring at 50 that follows the speed of the car"
    - "growling from the front passenger side, louder on curves"
    - "tires making a strange humming noise when driving"
  required_slots:
    - noise_descriptor: "hum/drone/growl/roar tied to road speed"
    - steering_load_effect: "PROPOSED-NEW slot — louder sweeping one direction = loaded bearing; unchanged = tire noise (the bearing-vs-tire discriminator)"
    - location_axle: "front vs rear where they hear it"
    - speed_band: "when it appears and whether it tracks road speed (not RPM)"
    - tire_state: "cupped/chopped tread makes the same drone — visible wear reroutes to uneven wear"
  confusables:
    - vs: uneven_tire_wear_bald_spots
      discriminator_question: "Are the tires visibly worn unevenly or cupped (that alone can cause the hum)?"
    - vs: steering_wheel_shake_at_highway_speed
      discriminator_question: "Is the concern mainly a humming NOISE, or a shake you feel in the steering wheel?"
    - vs: high_pitched_whining_under_the_hood
      discriminator_question: "Does the sound follow your road speed even coasting in neutral, or does it follow the engine revs?"
    - vs: exhaust_louder_or_rumbling
      discriminator_question: "Is it a wheel-area hum that changes with speed and turning, or a deeper exhaust rumble that got louder overall?"
  safety_flag: none
  notes: >
    Bearing hum loads and unloads with steering sweeps — louder turning one way implicates the opposite
    (loaded) side's bearing; tire roar stays constant through sweeps [S9]. Cupped tires (worn shocks) make
    an identical drone [S13]. CROSS-DOMAIN: rear differential whine (driveline domain) also hums at speed —
    the accel/coast/load change separates it; keep that boundary at synthesis.

# ---------------------------------------------------------------------------
# REQUESTS — direct bookable asks in this domain
# ---------------------------------------------------------------------------

- category: request
  subcategory: wheel_alignment_request
  display: "Alignment request"
  customer_voice_anchors:
    - "need an alignment"
    - "alignment check please"
    - "4 wheel alignment"
    - "hit a curb pretty hard, want the alignment checked"
    - "car needs aligned after the new tires"
    - "how much is an alignment"
    - "wheel alignment check, rear tires were wearing on the edges"
    - "just want an alignment, no other issues"
  required_slots:
    - customer_request_type: "direct service request vs symptom-driven — a bare request books straight in"
    - recent_action: "new tires / curb hit / suspension work — the usual reason behind the ask"
    - tire_state: "any uneven wear mentioned — evidence worth capturing for the alignment tech"
    - pull_direction: "if they mention a pull, capture it — symptom + request routes as the symptom with the request noted"
  confusables:
    - vs: steady_drift_while_cruising
      discriminator_question: "Is the car actually pulling or drifting (worth diagnosing), or do you just want an alignment done?"
    - vs: uneven_tire_wear_bald_spots
      discriminator_question: "Is the alignment request driven by visible uneven tire wear we should document?"
  safety_flag: none
  notes: >
    NEW slug for the direct ask (live flow reaches alignment via suspension_steering_check or uneven-wear).
    Pure requests skip the diagnostic interview — over-asking direct requests is the #1 measured UX
    failure in the current wizard. If a symptom rides along ("alignment, it pulls left"), classify the
    symptom and keep the request as context.

- category: request
  subcategory: tire_rotation_or_balance_request
  display: "Tire rotation / balance request"
  customer_voice_anchors:
    - "need a tire rotation"
    - "rotate and balance please"
    - "havent rotated my tires in forever, probably overdue"
    - "can you balance my tires, slight shake on the highway"
    - "tire rotation with my oil change"
    - "how much to rotate tires"
    - "balance check, feels a tiny bit shaky at 70"
    - "Tire Rotation & Balance"
    - "tires rotated before my trip next week please"
  required_slots:
    - customer_request_type: "maintenance request — books without an interview"
    - speed_band: "if a shake is mentioned, capture the speed — a real shimmy upgrades to the vibration entry"
  confusables:
    - vs: steering_wheel_shake_at_highway_speed
      discriminator_question: "Is there a noticeable shake at highway speed (worth diagnosing), or is this just routine rotation/balance?"
  safety_flag: none
  notes: >
    NEW slug — routine maintenance ask. The judgment call is when "balance my tires" is actually a
    vibration complaint in disguise; a specific speed-banded shake should route to the vibration entry so
    a bent wheel or worse isn't hidden behind a $30 balance ticket.

- category: request
  subcategory: brake_check_or_service_request
  display: "Brake check / brake job request"
  customer_voice_anchors:
    - "need my brakes checked"
    - "brake inspection please"
    - "how much for front brakes"
    - "want the brakes looked at before a road trip"
    - "think i need new brake pads"
    - "brake job quote"
    - "BRAKE INSPECTION, wants to make sure brakes are ok"
    - "due for brakes, its been a while"
    - "check my brakes, making some noise"
  required_slots:
    - customer_request_type: "request vs symptom — a bare 'check my brakes' books the inspection directly"
    - noise_descriptor: "if a noise is mentioned ('making some noise'), one clarifier (squeal vs grind) sets urgency"
    - pedal_feel: "any pedal change mentioned upgrades this to the matching symptom entry"
  confusables:
    - vs: high_pitched_squealing
      discriminator_question: "Are the brakes making any noise or feeling different, or is this just a checkup?"
    - vs: metallic_grinding
      discriminator_question: "If there's a noise — is it a squeak, or a rough grinding?"
  safety_flag: none
  notes: >
    Direct brake-inspection ask; the mixed form ('brakes grinding, need them looked at asap') is a SYMPTOM
    with a request attached — the symptom wins routing, per the style guide's mixed symptom+request rule.
    One noise clarifier is worth asking on vague versions because it separates a routine inspection from
    an urgent grind [S1][S2].

- category: request
  subcategory: just_want_new_tires
  display: "Wants new tires (replacement/quote)"
  customer_voice_anchors:
    - "need 4 new tires"
    - "how much for a set of tires"
    - "tires are worn out, time for new ones"
    - "need new tires before winter"
    - "price on 2 front tires"
    - "my tires are shot, need new rubber"
    - "4 NEW TIRES AND ALIGNMENT, entry level is fine"
    - "shopping for tires, do you price match"
    - "tread is down to the wear bars, ready to replace"
  required_slots:
    - customer_request_type: "purchase/quote intent — this is a sales conversation, not a diagnostic"
    - tire_state: "worn / dry-rotted / damaged — why they want them, affects urgency"
    - location_axle: "2 vs 4 tires"
  confusables:
    - vs: uneven_tire_wear_bald_spots
      discriminator_question: "Do you want us to diagnose why they wore out (alignment/suspension), or just replace them?"
    - vs: dry_rot_sidewall_cracking
      discriminator_question: "Are the tires worn down, or cracking from age — or both?"
  safety_flag: none
  notes: >
    Live slug with a known catalog gap: no bookable tire-SALES service exists, so this routes to an advisor
    quote. Keep it as a first-class anchor entry anyway — tire shopping is high-volume customer intent and
    misrouting it into a $47.68 tire-repair booking is a real, observed failure mode.
