    - vs: just_want_new_tires
      discriminator_question: "Do you want the cause of the wear diagnosed (alignment/suspension), or do you just need replacement tires?"
  safety_flag: none
  notes: >
    Wear pattern is diagnostic: edge wear = alignment (toe/camber), cupping/scalloping = worn shocks or
    balance, center/both-edges = inflation [S12][S13]. Uneven wear is the evidence trail for an alignment
    + suspension check AND usually a tire-replacement conversation — book the diagnostic, note the sales
    lead. Cupped tires also masquerade as wheel-bearing hum [S9].

