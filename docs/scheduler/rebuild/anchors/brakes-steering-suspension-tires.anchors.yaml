    - vs: metallic_grinding
      discriminator_question: "Does the noise happen over bumps, or when you press the brakes?"
  safety_flag: none
  notes: >
    Sway-bar end links are the most common clunk source, then strut mounts, control-arm bushings, and ball
    joints — a separated ball joint is an immediate loss of control, so clunk + steering looseness deserves
    prompt advice [S14]. CROSS-DOMAIN: a clunk when shifting into Drive/Reverse (not over bumps) is
    driveline; a light rattle underneath is exhaust/heat shield.

