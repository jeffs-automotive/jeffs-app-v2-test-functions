    - "acrid burning smell from the driver side wheel after the highway"
    - "one wheel smoking in the parking lot, other three are cool"
    - "burning smell from a wheel after coming down the mountain"
  required_slots:
    - sound_or_smoke_location_zone: "which wheel / one wheel vs all — one hot wheel = dragging brake at that corner"
    - parking_brake_state: "was the parking brake left on — the most common self-inflicted cause"
    - smell_descriptor: "burning/acrid vs sweet vs rubber — separates hot brake from coolant or a shredding belt"
    - drivable_state: "actively smoking now vs smelled it once — active smoke = stop driving"
  confusables:
    - vs: burning_rubber_hot_brake_smell
      discriminator_question: "Do you see actual smoke coming from the wheel, or is it just the burning smell?"
    - vs: smoke_from_under_the_hood
      discriminator_question: "Is the smoke coming from a wheel, or from under the hood?"
    - vs: parking_brake_stuck_or_wont_release
      discriminator_question: "Is the parking brake stuck on right now, or did the wheel just get hot and smoky after driving?"
  safety_flag: advise_immediately
  notes: >
    One smoking/hot wheel = a dragging brake (seized caliper, stuck parking brake) — heat that can boil
    fluid and cause brake loss or fire; advise stopping and cooling immediately [S17]. Includes the
    smell-only sibling (burning_rubber_hot_brake_smell) when localized to a wheel. CROSS-DOMAIN: burning
    RUBBER smell from under the HOOD is a belt (engine-accessory domain); sweet smell is coolant.

