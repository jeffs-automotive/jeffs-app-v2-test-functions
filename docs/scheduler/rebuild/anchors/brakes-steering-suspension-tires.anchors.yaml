  notes: >
    Tread punctures from nails/screws are usually repairable; a SIDEWALL BULGE means broken internal cords
    from impact and is NOT repairable — replacement only, and driving on it risks a blowout [S11] — when a
    bulge is described, advise minimizing driving (treat that variant as urgent even though the entry-level
