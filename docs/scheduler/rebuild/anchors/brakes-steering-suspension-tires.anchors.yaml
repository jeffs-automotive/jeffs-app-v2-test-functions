# =====================================================================================
# Customer-voice anchor bank — DOMAIN: brakes / steering / suspension & ride / wheels-
# tires-TPMS / alignment
#
# Purpose: day-one seed anchors for the rebuilt concern classifier. An embedding model
# matches raw customer text against `customer_voice_anchors` to shortlist candidates;
# a small LLM then extracts `required_slots` and picks among the shortlist using the
# `confusables` discriminator questions.
#
# Conventions
# - Anchors are CUSTOMER language (vague/terse/misspelled/ALL-CAPS included), per
#   docs/automotive-knowledge-base/customer-voice-style-guide.md. No technician jargon.
# - `subcategory` slugs bind to the LIVE scheduler taxonomy
#   (docs/automotive-knowledge-base/00-current-scheduler-taxonomy.md) wherever a live
#   slug exists. Slugs marked "NEW" in notes have no live equivalent (coverage gaps the
#   KB already flagged, e.g. grabby brakes, collapsed spring, parking brake stuck).
# - Slot names reuse the live 29-slot Stage-3 ontology where possible; three slots are
#   PROPOSED-NEW (steering_load_effect, ride_damping_symptom, pull_road_dependence) and
#   are marked as such where used.
# - Phrasing style is calibrated against this repo's fact-checked lexicons
#   (systems/{brakes-friction-hydraulic,steering-power-steering,suspension-ride-alignment,
#   wheels-tires-tpms-bearings,abs-traction-stability}.lexicon.yaml), which encode real
#   Tekmetric / NHTSA / forum customer voice.
#
# Web sources for the diagnostic claims in notes/confusables (fetched 2026-07-19):
#   [S1]  Brake wear indicators (squeal = pads near limit): firestonecompleteautocare.com/blog/brakes/brake-wear-indicators/
#   [S2]  Grinding = friction material gone, backing plate on rotor: knowhow.napaonline.com/noisy-brakes-telltale-signs-of-trouble-you-shouldnt-ignore/
#   [S3]  Pedal pulsation / steering shake when braking = disc thickness variation ("warped rotors"):
#         nrsbrakes.com/blogs/supporting-articles/why-does-my-steering-wheel-shake-diagnosing-a-pulsating-brake-pedal
#         + ricksfreeautorepairadvice.com/brake-rotor-warp-myth-what-causes-brake-pedal-pulsation/
#   [S4]  Front vs rear: wheel shake = front rotors, seat pulsation = rear: tiresplus.com/blog/brakes/car-shakes-when-i-brake/
#   [S5]  Spongy pedal = air/fluid; pedal sinks under steady pressure = master cylinder seals:
#         wagnerbrake.com/technical/technical-tips/why-are-my-brakes-spongy.html + directbrakes.com/blog/soft-brake-pedal-danger
#   [S6]  Hard pedal = booster vacuum loss (hose, diaphragm, check valve): firestonecompleteautocare.com/blog/brakes/why-is-my-brake-pedal-hard/
#         + mpbrakes.com/brake-troubleshooting-troubleshooting-a-hard-brake-pedal-in-a-power-booster-equipped-vehicle/
#   [S7]  ABS (amber) = ABS fault, base brakes still work; red BRAKE = core hydraulic/fluid/parking-brake, urgent;
#         both together = do not drive: westsideautopros.com/abs-warning-light-vs-brake-warning-light-whats-the-difference/
#         + skanyx.com/blog/abs-warning-light-meaning
#   [S8]  EPS light = assist disabled/reduced; weak 12V battery + steering-angle/torque sensor are top causes:
#         kwikkarspringvalley.com/automotive-insights/power-steering-assist-fault/ + autotechiq.com/symptom/power-steering-warning-light
#   [S9]  Bearing hum loads with steering sweep (louder turning one way); tire roar stays constant:
#         gmb.net/blog/wheel-bearing-noise-vs-tire-noise/ + carparts.com/blog/wheel-bearing-noise-vs-tire-noise-how-to-know-whats-the-issue/
#   [S10] TPMS solid = real low pressure (>=25% low); flash 60-90s then solid = sensor/system fault:
#         redi-sensor.com/faqs/solid-vs-flashing-tpms-warning-light/ + prioritytire.com/blog/tire-pressure-sensor-fault
#   [S11] Sidewall bulge = broken cords from impact, NOT repairable, replace (blowout risk):
#         lesschwab.com/article/tires/what-do-tire-sidewall-bubbles-mean.html + bigotires.com/resources/bubble-in-sidewall-of-tire-what-it-means-and-safety-concerns
#   [S12] Pull causes: alignment, tire pressure L/R delta, tire conicity (pull flips with a side-swap), sticking caliper (pull under braking only):
#         firestonecompleteautocare.com/blog/alignment/what-to-do-when-car-pulls-to-one-side/ + atlanticmotorcar.com/casestudies/radial-tire-pull-or-is-my-tire-really-cone-shaped/
#   [S13] Worn shocks/struts: continued bouncing, nose dive, body roll, bottoming out, cupped/scalloped tire wear:
#         monroe.com/technical-resources/shocks-101/symptoms-worn-shock-struts.html + lesschwab.com/article/shocks-struts/how-to-tell-if-your-shocks-or-struts-are-bad.html
#   [S14] Clunk over bumps: sway-bar end links first, then strut mounts / control-arm bushings / ball joints (ball joint = safety):
#         carcaretotal.com/clunking-noise-over-bumps/ + vehicleruns.com/maintenance-repair/sway-bar-link/bad-sway-bar-link-noises-diagnosis/
#   [S15] Death wobble: violent steering shimmy >=40 mph triggered by a bump; worn track bar / tie rods / damper; loss-of-control risk:
#         autozone.com/diy/truck-and-towing/what-causes-death-wobble + knowhow.napaonline.com/what-causes-death-wobble/
#   [S16] Dry rot: age/UV sidewall cracking, unsafe (highway blowout risk), replace-only, ~6-year age guidance:
#         lesschwab.com/article/tires/tire-dry-rot-causes-signs-prevention.html + tireagent.com/blog/what-causes-dry-rotting-tires-are-tires-with-dry-rot-safe
#   [S17] Parking brake stuck: rusted/corroded cables, frozen moisture after washes/cold, seized hardware; do not drive against it:
#         autozone.com/diy/brakes/my-parking-brake-is-stuck + firestonecompleteautocare.com/blog/brakes/parking-brakes-stuck/
# =====================================================================================

# ---------------------------------------------------------------------------
# BRAKES — pedal feel, brake noise, brake-triggered pull/shake, failures
# ---------------------------------------------------------------------------

- category: brakes
  subcategory: high_pitched_squealing
  display: "Brakes squealing / squeaking"
  customer_voice_anchors:
    - "my brakes squeal every time I come to a stop"
    - "high pitched squeak when i slow down, goes away if i press harder"
    - "breaks squeeking real bad, especially in the morning"
    - "loud screeching sound from the front when I hit the brakes"
    - "brakes started chirping last week, worse the first few stops of the day"
    - "BRAKES SQUEALING WHEN STOPPING"
    - "hear a squeaky noise whenever i step on the brake pedal"
    - "brakes make a whistling squeal, do i need new pads?"
    - "car screeches when stopping, so embarrassing at stop lights"
    - "squeeling noise when braking, been going on a couple weeks"
    - "brakes squeak when its damp out but its getting more constant"
  required_slots:
    - noise_descriptor: "squeal/squeak/chirp vs grind — separates near-worn pads (inspection soon) from metal-on-metal (urgent, rotors at risk)"
    - onset_timing: "only while braking vs constant even off the brake — a constant squeal that stops WHEN braking points at the wear indicator dragging; noise unrelated to braking may be a belt"
    - location_axle: "front or rear if the customer can tell — preps the advisor and the estimate"
    - started_when: "how long / getting worse — urgency and whether rotors are likely involved yet"
  confusables:
    - vs: metallic_grinding
      discriminator_question: "Is it a high-pitched squeak or squeal, or more of a rough metal-on-metal grinding?"
    - vs: noise_when_turning_the_steering_wheel
      discriminator_question: "Does the noise happen when you press the brakes, or when you turn the steering wheel?"
    - vs: squeaking_or_creaking_over_bumps
      discriminator_question: "Do you hear it when braking, or when going over bumps and dips?"
    - vs: high_pitched_whining_under_the_hood
      discriminator_question: "Does it only happen when you're braking, or is the noise there any time the engine is running?"
  safety_flag: none
  notes: >
    Squeal is usually the pad wear indicator contacting the rotor — pads near end of life, service soon [S1].
    Includes chirp/screech/whistle framed around braking. Does NOT include grinding (own entry, urgent),
    squeal on turning (steering/belt), or bump-triggered squeaks (suspension). Customers often write
    "breaks"/"squeeking" — keep misspelled variants. If squeal has already progressed to a red BRAKE light,
    route brake_system_red_light instead.

- category: brakes
  subcategory: metallic_grinding
  display: "Grinding when braking (metal-on-metal)"
  customer_voice_anchors:
    - "grinding noise when I brake, sounds like metal on metal"
    - "GRINDING WHEN STOPPING"
    - "when i press the brakes theres a horrible grinding sound"
    - "brakes are grinding really bad, i think im down to the metal"
    - "hear a scraping crunching noise from the wheel when i stop"
    - "left rear brake grinding"
    - "grinding noise when backing up and hitting the brake"
    - "brakes went from squeaking to grinding this week"
    - "sounds like rocks crunching when i slow down"
    - "car makes a growling grind every time i come to a stop"
    - "breaks grinding metal to metal, need them looked at asap"
  required_slots:
    - noise_descriptor: "grind/scrape/crunch confirms metal-on-metal vs squeal — changes urgency and scope (pads + rotors)"
    - onset_timing: "every stop vs only reversing vs only hard stops — reverse-only grinding is often rear shoes/backing plate"
    - location_axle: "front vs rear / which corner — advisor prep"
    - started_when: "how long it's been grinding — longer = more rotor damage likely"
  confusables:
    - vs: high_pitched_squealing
      discriminator_question: "Is it a rough grinding like metal rubbing metal, or a high-pitched squeal?"
    - vs: clunking_over_bumps
      discriminator_question: "Does the noise happen when you press the brakes, or when you drive over bumps?"
    - vs: humming_or_whirring_at_speed
      discriminator_question: "Do you hear it only when braking, or does it hum/grind constantly as you drive and change with speed?"
  safety_flag: advise_immediately
  notes: >
    Grinding = friction material worn away, backing plate contacting the rotor — rotor damage accrues with
    every stop [S2]. Treat as urgent. Includes scraping/crunching/growling tied to brake application
    (including in reverse). Does NOT include speed-dependent hum (bearing) or dragging noises not tied to
    the pedal. Customers frequently self-diagnose ("I think I need brakes") — keep the symptom, ignore the
    self-diagnosis for routing.

- category: brakes
  subcategory: pulsating_or_vibrating_pedal
  display: "Brake pedal pulses / vibrates underfoot"
  customer_voice_anchors:
    - "brake pedal pulses under my foot when I stop"
    - "pedal vibrates when braking at highway speeds"
    - "i can feel the brake pedal throbbing when i slow down from 70"
    - "pedal pushes back at my foot in waves when i brake"
    - "brake pedal shudders when im stopping"
    - "feels like the pedal is bouncing under my foot during braking"
    - "BRAKE PEDAL VIBRATES AT HIGHWAY SPEEDS WHEN BRAKING"
    - "pedal feels lumpy when i brake going down hills"
    - "when i brake down a long hill the pedal starts pulsing"
  required_slots:
    - pedal_feel: "pulsing/throbbing in the PEDAL itself — separates this from shake felt in the wheel/whole car"
    - speed_band: "highway-speed braking vs all speeds — classic rotor thickness-variation pattern is worst from speed"
    - onset_timing: "only when braking (must be brake-triggered to stay in brakes)"
    - started_when: "gradual vs after recent brake work — recent-service pulsation routes the advisor differently"
  confusables:
    - vs: vibration_or_pulsing_when_braking
      discriminator_question: "Do you feel it mostly in the brake pedal under your foot, or in the steering wheel / whole car?"
    - vs: steering_wheel_shake_at_highway_speed
      discriminator_question: "Does the shaking only happen while you're pressing the brakes, or does it happen just cruising at speed?"
  safety_flag: none
  notes: >
    Pedal pulsation is almost always disc thickness variation ("warped rotors" colloquially) — thick/thin
    spots push the caliper pistons in and out and the pedal telegraphs it [S3]. Keep both this pedal-feel
    entry and the whole-car sibling; the discriminator is WHERE the customer feels it [S4]. Does NOT
    include ABS pedal buzz during a hard emergency stop on gravel/ice (normal ABS engagement — note in
    conversation, not a fault).

- category: brakes
  subcategory: vibration_or_pulsing_when_braking
  display: "Car / steering wheel shakes when braking"
  customer_voice_anchors:
    - "steering wheel shakes when I hit the brakes at 65"
    - "whole car shudders when braking from highway speed"
    - "front end vibrates whenever i brake coming off the freeway"
    - "car shakes really bad when applying the brakes"
    - "when i brake at high speed the steering wheel wobbles back and forth"
    - "violently shakes and shudders when I apply the brakes no matter the speed"
    - "shaking when applying brakes"
    - "car judders to a stop, feel it through the seat when braking"
    - "steering wheel vibrates braking downhill with the family in the car"
    - "brakes make the whole front end tremble when stopping from 60"
  required_slots:
    - pedal_feel: "whether the pedal also pulses — pedal + wheel together strengthens the rotor-DTV picture"
    - speed_band: "what speed braking triggers it — highway-only vs every stop"
    - onset_timing: "MUST be brake-triggered; if it shakes while cruising without braking it's the balance/shimmy entry"
    - location_axle: "wheel shake = front rotors, seat/floor pulsing = rear — where the customer feels it localizes the axle"
  confusables:
    - vs: steering_wheel_shake_at_highway_speed
      discriminator_question: "Does it shake only when you're braking, or also when just driving at highway speed without touching the brakes?"
    - vs: pulsating_or_vibrating_pedal
      discriminator_question: "Is the shake mostly in the steering wheel or whole car, or mostly a pulsing you feel in the brake pedal itself?"
    - vs: shaking_or_bouncing_over_bumps_and_rough_roads
      discriminator_question: "Does it happen when braking on smooth roads too, or only over bumps and rough pavement?"
  safety_flag: none
  notes: >
    Brake-triggered shake felt in the wheel points at FRONT rotor thickness variation; felt in the seat,
    rear [S3][S4]. The #1 trap: customers say "car shakes at 65" and it's actually wheel balance —
    brake-triggered vs cruise-triggered is the load-bearing fact. Brake-only vibration stays in brakes
    (live rule: NOT suspension). Severe shake + pull together can be a sticking caliper — advisor note.

- category: brakes
  subcategory: spongy_or_soft_pedal
  display: "Soft / spongy brake pedal"
  customer_voice_anchors:
    - "brake pedal feels soft and mushy"
    - "have to pump the brakes a couple times to get them to grab"
    - "pedal goes way farther down than it used to before the car slows"
    - "brakes feel squishy, like stepping on a sponge"
    - "pedal feels weak and the car takes longer to stop"
    - "breaks feel spongy ever since i had the pads done"
    - "brake pedal is soft, firms up if i pump it"
    - "not much pressure in the brake pedal anymore"
    - "pedal almost hits the floor before the brakes really bite"
    - "brakes feel low, like theres air in the lines"
  required_slots:
    - pedal_feel: "soft/spongy/low vs sinking vs hard — the pedal-feel triage separates air/fluid vs master cylinder vs booster"
    - drivable_state: "can they still stop confidently — decides drive-in vs tow advice"
    - recent_action: "recent brake work or fluid top-offs — air introduced during service is a top cause"
    - started_when: "sudden vs gradual — sudden soft pedal is more alarming (leak) than slow fade"
  confusables:
    - vs: pedal_sinks_to_floor
      discriminator_question: "If you press and HOLD the pedal at a stop, does it slowly keep sinking toward the floor, or does it stay where it is (just feels soft)?"
    - vs: hard_or_unresponsive_pedal
      discriminator_question: "Does the pedal feel soft and squishy, or stiff and hard to push down?"
    - vs: clear_yellow_or_light_brown_puddle_brake_fluid
      discriminator_question: "Have you noticed any fluid on the ground or had to add brake fluid?"
  safety_flag: advise_immediately
  notes: >
    Spongy pedal = air in the hydraulics or fluid loss; firming up when pumped is the classic air signature
    [S5]. Ask about fluid/leaks — a soft pedal plus a puddle escalates to the brake-fluid-leak entry.
    Does NOT include a pedal that sinks under steady hold (master cylinder — own entry) or normal
    slightly-longer travel after new pads bed in.

- category: brakes
  subcategory: pedal_sinks_to_floor
  display: "Brake pedal sinks to the floor"
  customer_voice_anchors:
    - "brake pedal slowly sinks to the floor when im holding it at a light"
    - "pedal goes all the way to the floor"
    - "if i hold the brake the pedal creeps down and the car starts rolling"
    - "brake pedal not holding, it sinks while im stopped"
    - "at red lights i have to keep pumping because the pedal keeps dropping"
    - "pedal went to the floor this morning, barely stopped"
    - "hold the brake for ten seconds and it just keeps going down"
    - "brake pedal drops to the floorboard when pressed steady"
  required_slots:
    - pedal_feel: "sinking under steady pressure is the master-cylinder signature — distinct from spongy"
    - drivable_state: "does the car still stop / has it failed to stop — tow vs careful drive-in"
    - onset_timing: "sinks at stops under hold vs dropped suddenly while driving — sudden drop is an emergency"
    - recent_action: "recent brake work / fluid added — helps separate internal bypass from a fresh leak"
  confusables:
    - vs: spongy_or_soft_pedal
      discriminator_question: "Does the pedal keep sinking while you hold steady pressure, or does it stop and hold once pressed (just feels soft)?"
    - vs: clear_yellow_or_light_brown_puddle_brake_fluid
      discriminator_question: "Is the brake fluid level dropping or is there any wet spot under the car or inside a wheel?"
  safety_flag: advise_immediately
  notes: >
    A pedal that sinks under sustained pressure with no external leak is the classic worn master-cylinder
    seal pattern (fluid bypassing internally) [S5]. Treat as urgent; a pedal that suddenly went to the
    floor mid-drive is an emergency — if the customer says the brakes failed outright, route
    brakes_failed_or_gave_out.

- category: brakes
  subcategory: hard_or_unresponsive_pedal
  display: "Brake pedal stiff / hard to press"
  customer_voice_anchors:
    - "brake pedal is rock hard and the car barely stops"
    - "pedal feels stiff, like pushing against a wall"
    - "have to stand on the brake pedal to get it to stop"
    - "brake pedal got really hard all of a sudden"
    - "pedal feels like stepping on a brick, no give at all"
    - "brakes are super stiff first thing in the morning"
    - "pedal barely moves when i push it and stopping takes forever"
    - "brake pedal hard as a rock after the car sat for a month"
  required_slots:
    - pedal_feel: "hard/high-effort — the booster-side signature vs soft/sinking hydraulic signatures"
    - onset_timing: "always vs first stops only vs after repeated quick stops — a check-valve leak gets stiffer with rapid repeats"
    - drivable_state: "can they still stop the car with heavy effort — drive-in vs tow"
    - engine_running: "hard only before starting the engine is normal (no vacuum yet); hard while running is the fault"
  confusables:
    - vs: spongy_or_soft_pedal
      discriminator_question: "Is the pedal hard and difficult to push down, or soft and squishy?"
    - vs: brakes_failed_or_gave_out
      discriminator_question: "Can you still stop the car if you push very hard, or did the brakes stop working entirely?"
  safety_flag: advise_immediately
  notes: >
    High-effort pedal is most often booster vacuum loss — cracked vacuum hose, torn diaphragm, or failed
    check valve [S6]. Stopping distance increases substantially, hence the flag. Does NOT include the
    normal firm pedal with the engine OFF, or hybrid/EV regen feel complaints (advisor conversation).

- category: brakes
  subcategory: grabby_or_jumpy_brakes
  display: "Brakes grab / too touchy"
  customer_voice_anchors:
    - "brakes grab really hard even when i barely touch the pedal"
    - "brakes are super touchy, the car jerks to a stop"
    - "slightest tap on the brake and everyone gets thrown forward"
    - "brakes bite way too hard at low speed"
    - "brakes feel jumpy, hard to stop smoothly"
    - "car lurches when I brake gently, cant make a smooth stop"
    - "new pads and now the brakes slam on with the lightest touch"
    - "brakes grab and release, kind of jerky coming to a stop"
  required_slots:
    - pedal_feel: "grabby/over-sensitive bite — the defining feel"
    - recent_action: "after recent pad/rotor work vs out of nowhere — contamination or wrong-pad issues follow service"
    - weather_condition: "worse when cold/damp first thing — morning-grab from surface rust is common and often benign"
    - onset_timing: "every stop vs first stops of the day"
  confusables:
    - vs: pulling_only_when_braking
      discriminator_question: "When the brakes grab, does the car stay straight (just stops too hard), or does it pull to one side?"
    - vs: pulsating_or_vibrating_pedal
      discriminator_question: "Do the brakes bite too hard, or do you feel a pulsing/vibration through the pedal?"
  safety_flag: none
  notes: >
    NEW slug — no live subcategory covers grab (the KB brakes dossier flagged this gap; Stage-3
    pedal_feel=grabby exists but had nowhere to route). Includes over-sensitive bite and jerky engagement.
    Does NOT include one-wheel lockup with smoke/smell (dragging brake — route the wheel-smoke entry) or
    pull during braking (own entry).

- category: brakes
  subcategory: pulling_only_when_braking
  display: "Pulls to one side when braking"
  customer_voice_anchors:
    - "car pulls hard to the left every time I hit the brakes"
    - "veers to the right when braking, drives straight otherwise"
    - "swerves to one side whenever i brake hard"
    - "pulls left when stopping, scared it'll put me in the other lane"
    - "when i slam the brakes the car jerks to the right"
    - "brakes pull the car toward the shoulder every time i slow down"
    - "steering yanks to one side under braking only"
    - "car darts left when braking downhill"
  required_slots:
    - pull_direction: "left or right — needed for booking notes and to confirm it's one-directional"
    - onset_timing: "ONLY when braking — the fact that separates it from an alignment/tire pull"
    - started_when: "sudden vs gradual — a sudden brake pull suggests a stuck caliper or hose"
    - drivable_state: "how severe / do they feel safe — a hard swerve under braking may warrant tow advice"
  confusables:
    - vs: steady_drift_while_cruising
      discriminator_question: "Does it pull only while you're pressing the brakes, or does it drift to one side even when just cruising?"
    - vs: pull_that_started_after_recent_tire_or_service_work
      discriminator_question: "Did the pulling start right after tire, alignment, or brake work was done?"
  safety_flag: none
  notes: >
    Pull under braking only = brake-side problem (sticking/seized caliper, collapsed hose, uneven pads) —
    not alignment [S12]. If the customer describes losing their lane or says they don't feel safe, escalate
    to the safety path. Does NOT include cruise pulls (steering_handling entries) or torque steer on
    acceleration (pulling_only_during_acceleration, performance/driveline domain).

- category: brakes
  subcategory: brakes_failed_or_gave_out
  display: "Brakes failed / no brakes"
  customer_voice_anchors:
    - "my brakes went out"
    - "NO BRAKE PRESSURE. DO NOT DRIVE."
    - "pedal went straight to the floor and the car barely stopped"
    - "lost my brakes coming down a hill, terrifying"
    - "the brakes gave out"
    - "no brakes!! car is parked, need it towed"
    - "brakes stopped working out of nowhere, im not driving it"
    - "pressed the brake and nothing happened"
    - "brakes completely gone, had to use the emergency brake to stop"
  required_slots:
    - drivable_state: "is the car parked/towed vs still being driven — the FIRST question; this concern should never be driven in"
    - pedal_feel: "floor / no pressure / hard — what the pedal did during the failure"
    - onset_timing: "sudden total loss vs progressive fade — fade after long downhill may recover but still urgent"
    - started_when: "when it happened and whether anything preceded it (leak, light, noise)"
  confusables:
    - vs: pedal_sinks_to_floor
      discriminator_question: "Did the brakes completely stop working, or do they still stop the car but the pedal sinks while you hold it?"
    - vs: brake_system_red_light
      discriminator_question: "Are the brakes actually failing to stop the car, or is it a red BRAKE warning light with the brakes still working?"
  safety_flag: advise_immediately
  notes: >
    Total or near-total brake loss is a do-not-drive safety override — recommend tow, never a drive-in
    appointment. Live taxonomy routes this to the safety_concern situational bucket; the anchor entry
    exists so the embedding shortlist catches "brakes went out" phrasing and hands it to the safety path
    rather than a $39.99 inspection.

- category: brakes
  subcategory: parking_brake_stuck_or_wont_release
  display: "Parking brake stuck / won't release"
  customer_voice_anchors:
    - "parking brake is stuck and wont release"
    - "e-brake wont come off"
    - "emergency brake is jammed and the car wont move"
    - "left the parking brake on all winter and now its frozen"
    - "parking brake light stays on and it feels like somethings dragging"
    - "ebrake handle comes up but the back wheels are still locked"
    - "electronic parking brake says release fault and wont let go"
    - "parking break froze overnight after the car wash"
    - "rear brakes seem stuck on after i parked with the handbrake for a week"
  required_slots:
    - parking_brake_state: "applied/stuck vs released-but-dragging — defines the complaint"
    - drivable_state: "is the car immobile — likely needs on-site help or tow rather than a drive-in"
    - weather_condition: "freezing overnight / after a car wash — frozen-cable pattern"
    - started_when: "after sitting a long time vs after normal use — rusted cable vs hardware failure"
  confusables:
    - vs: smoke_or_burning_smell_from_a_wheel
      discriminator_question: "Is the car stuck in place, or did you drive it and now a wheel smells hot or is smoking?"
    - vs: brake_system_red_light
      discriminator_question: "Is the parking brake physically stuck, or is it just the red brake light staying on with the parking brake released?"
  safety_flag: none
  notes: >
    NEW slug — common real-world concern with no live subcategory. Rusted/corroded cables and frozen
    moisture (cold snaps, post-car-wash) are the classic causes; driving against a stuck parking brake
    overheats the rear brakes [S17]. If they already drove it and a wheel is hot/smoking, escalate to the
    wheel-smoke entry (advise_immediately). Covers manual levers, foot pedals, and electronic parking
    brake fault messages.

# ---------------------------------------------------------------------------
# WARNING LIGHTS — chassis telltales (ABS, red BRAKE, TPMS, EPS, traction)
# ---------------------------------------------------------------------------

- category: warning_light
  subcategory: abs_anti_lock_brake_light
  display: "ABS light on"
  customer_voice_anchors:
    - "ABS light came on"
    - "abs light is on but the brakes feel fine"
    - "yellow ABS light came on after I hit a pothole"
    - "abs light on, brakes still stop fine"
    - "ABS LIGHT ON AND OFF"
    - "anti lock light stays on all the time now"
    - "abs light plus the traction light came on together"
    - "abs light came on and the brakes feel like they vibrate on gravel"
    - "the letters ABS lit up yellow on my dash"
  required_slots:
    - warning_light_named: "ABS specifically vs red BRAKE vs traction icon — the routing hinge for the whole light family"
    - warning_light_behavior: "steady vs intermittent vs on-at-startup-then-off (normal bulb check)"
    - pedal_feel: "any brake symptom with it — mechanical symptom + light routes to the brake-inspection-with-light service"
    - started_when: "after a pothole / recent service / out of nowhere"
  confusables:
    - vs: brake_system_red_light
      discriminator_question: "Is it the yellow ABS light, or a red light that says BRAKE (or a red exclamation point in a circle)?"
    - vs: traction_control_stability_light
      discriminator_question: "Does the light say ABS, or is it the little car with squiggly lines (traction/stability)?"
    - vs: multiple_warning_lights_at_once
      discriminator_question: "Is it just the ABS light, or did several different warning lights come on at the same time?"
  safety_flag: none
  notes: >
    Amber ABS = anti-lock fault; the base brakes still work normally, but anti-lock protection is offline
    [S7]. A momentary ABS light at key-on that goes out is the normal self-test. ABS + red BRAKE together
    = treat as the red-light entry (do-not-drive advice) [S7]. Wheel-speed sensors are shared with
    traction/stability — co-illumination is common and routes on which light the customer NAMES.

- category: warning_light
  subcategory: brake_system_red_light
  display: "Red BRAKE warning light"
  customer_voice_anchors:
    - "red BRAKE light came on on my dash"
    - "brake warning light on and the fluid was low"
    - "red exclamation point in a circle lit up"
    - "brake light on the dash stays on even with the parking brake off"
    - "RED BRAKE LIGHT COMING ON AND OFF, topped off the fluid and its back"
    - "red brake light comes on when I go around corners"
    - "brake light on dash lit up today, the brake lights out back work fine"
    - "brakes squeaking for weeks and now the red brake light is on too"
    - "red parking brake light wont turn off while driving"
  required_slots:
    - warning_light_named: "red BRAKE / (!) symbol vs amber ABS — red is the urgent one"
    - warning_light_behavior: "steady vs flickers on corners (classic low-fluid slosh) vs recurring after top-off"
    - parking_brake_state: "confirmed fully released — the first thing to rule out"
    - pedal_feel: "any soft/sinking pedal with it — light + pedal symptom together is a leak picture"
    - drivable_state: "still stopping normally? red light + any pedal change = advise no driving"
  confusables:
    - vs: abs_anti_lock_brake_light
      discriminator_question: "Is the light red and labeled BRAKE (or a red ! in a circle), or the yellow ABS light?"
    - vs: parking_brake_stuck_or_wont_release
      discriminator_question: "Is the parking brake itself stuck, or is it released and the red light stays on anyway?"
    - vs: accessory_doesnt_work
      discriminator_question: "Is this a warning light on your dashboard, or a brake light bulb out on the back of the car?"
  safety_flag: advise_immediately
  notes: >
    Red BRAKE = core hydraulic system: low fluid, pressure loss, or parking-brake circuit — the urgent
    brake light [S7]. Flickering on corners with low fluid = fluid sloshing below the sensor (leak or very
    worn pads). TRAP: "my brake lights work fine" — customers conflate the dash telltale with the exterior
    bulbs; the exterior-bulb complaint is electrical, not this. Red + ABS together: advise not to drive [S7].

- category: warning_light
  subcategory: tpms_tire_pressure_light
  display: "Tire pressure (TPMS) light"
  customer_voice_anchors:
    - "tire pressure light is on"
    - "tpms light wont go off even after i put air in all four"
    - "low tire light keeps coming back every few days"
    - "orange horseshoe with an exclamation point on my dash"
    - "TPMS LIGHT COMES ON & OFF"
    - "tire light flashes for a minute when i start the car then stays on"
    - "tire pressure sensor fault message on the screen"
    - "tire light came on this morning when it got cold"
    - "pressure light on but all my tires look fine"
    - "tpms sensor not reading on one wheel since i got new tires"
  required_slots:
    - warning_light_behavior: "solid vs flashes-then-solid — solid = real low pressure; flashing 60-90s then solid = sensor/system fault"
    - tire_state: "has the customer checked/added air, and did the light clear — separates a leak from a TPMS fault"
    - recent_action: "new tires / rotation / seasonal swap — sensors commonly need relearn or get damaged during tire work"
    - weather_condition: "first cold snap — pressure drop with temperature is the benign seasonal pattern"
  confusables:
    - vs: tire_going_flat_losing_air
      discriminator_question: "Is one tire actually going low or flat when you check it, or is it just the light with the tires holding normal pressure?"
    - vs: visible_damage_nail_screw_bulge_cut
      discriminator_question: "Have you seen anything in the tire, like a nail or screw, or is it only the light?"
  safety_flag: none
  notes: >
    Solid TPMS light = one or more tires ~25%+ below spec; a light that FLASHES 60-90 seconds at startup
    then stays solid = sensor/system malfunction, not pressure [S10]. If air was added and the light
    returns, either a real slow leak (route tire_going_flat_losing_air) or a sensor fault. Covers the
    live low_pressure_warning_light_only sibling: the checked-and-inflated-but-light-persists phrasing
    belongs here too.

- category: warning_light
  subcategory: power_steering_eps_light
  display: "Power steering / EPS light"
  customer_voice_anchors:
    - "power steering light came on"
    - "EPS light is on and the wheel feels heavy"
    - "steering wheel icon with an exclamation point lit up on my dash"
    - "power steering assist fault message on the screen"
    - "eps light came on right after they replaced my battery"
    - "yellow steering wheel light on and its harder to park than usual"
    - "power steering warning comes on and off, steering gets stiff when it does"
    - "steering light on the dash, drives normal though"
  required_slots:
    - warning_light_named: "the steering-wheel icon / EPS / PS message — anchors the light family"
    - steering_feel: "heavy/normal/intermittent assist — light + heavy steering is urgent; light alone is diagnostic"
    - recent_action: "battery service, alignment, or jump start — steering-angle/low-voltage triggers are the top pattern"
    - warning_light_behavior: "steady vs comes-and-goes with the stiffness"
  confusables:
    - vs: hard_to_turn_heavy_steering
      discriminator_question: "Is there a warning light on the dash, or is the steering just hard to turn with no light?"
    - vs: battery_charging_light
      discriminator_question: "Is it the steering wheel icon, or the battery light — or did several lights come on together?"
    - vs: multiple_warning_lights_at_once
      discriminator_question: "Is the steering light the only one on, or did a bunch of warning lights appear at once?"
  safety_flag: none
  notes: >
    EPS light = the module detected a fault and may reduce or disable assist [S8]. A weak 12V battery and
    a steering-angle sensor knocked out of calibration after battery/alignment/tire work are the most
    common triggers [S8] — hence the recent_action slot. If assist actually cut out and the wheel is heavy,
    escalate to hard_to_turn_heavy_steering (advise_immediately). Cross-domain: low-voltage cascades light
    EPS alongside battery/electrical telltales — that's the electrical domain's multiple-lights entry.

- category: warning_light
  subcategory: traction_control_stability_light
  display: "Traction control / stability light"
  customer_voice_anchors:
    - "traction control light stays on"
    - "stabilitrak light came on"
    - "little yellow car with squiggly lines under it on my dash"
    - "skid light keeps flashing when it rains"
    - "esc off light came on by itself"
    - "TRACTION CONTROL LIGHT STAYING ON, car drives fine"
    - "traction and abs lights came on together after a bump"
    - "service traction control message on startup"
  required_slots:
    - warning_light_named: "skid-car icon / TC / StabiliTrak vs ABS letters — same sensor family, different telltale"
    - warning_light_behavior: "flashing during slippery driving = NORMAL intervention; steady = fault"
    - weather_condition: "rain/snow when it flashes — supports the normal-intervention read"
    - started_when: "after a pothole/suspension work vs random onset"
  confusables:
    - vs: abs_anti_lock_brake_light
      discriminator_question: "Does the light say ABS, or is it the car-with-squiggly-lines (traction/stability) icon?"
    - vs: multiple_warning_lights_at_once
      discriminator_question: "Is it just the traction light, or did several warning lights come on at the same time?"
  safety_flag: none
  notes: >
    Flashing while accelerating on wet/loose surfaces = the system WORKING (normal); steady-on = fault or
    manually switched off. Shares wheel-speed sensors with ABS, so co-illumination is routine — route on
    the light the customer names. Cross-domain edge: "ESC off" after pressing the button is user-resolvable;
    mention before booking.

# ---------------------------------------------------------------------------
# STEERING — effort, play, centering, noise on turn
# ---------------------------------------------------------------------------

- category: steering_handling
  subcategory: hard_to_turn_heavy_steering
  display: "Steering hard to turn / heavy"
  customer_voice_anchors:
    - "steering wheel is really hard to turn all of a sudden"
    - "power steering went out"
    - "takes both hands and all my strength to turn into a parking spot"
    - "steering got super stiff overnight"
    - "wheel feels heavy at low speed but okay on the highway"
    - "power stearing stopped working, can barely turn the wheel"
    - "steering is tight, like the assist quit"
    - "hard to turn the wheel when the car is cold, loosens up after driving"
    - "STEERING WHEEL FEELS TIGHT"
    - "lost the power steering while driving, had to muscle it home"
  required_slots:
    - steering_feel: "heavy/stiff effort — the defining symptom"
    - warning_light_named: "any PS/EPS light with it — light + heavy routes to the EPS diagnostic"
    - onset_timing: "constant vs low-speed-only vs cold-first-start — hydraulic low fluid vs EPS cutout patterns differ"
    - started_when: "sudden vs gradual — sudden loss mid-drive is the urgent version"
    - recent_action: "battery/alignment/tire work just before — common EPS triggers"
  confusables:
    - vs: power_steering_eps_light
      discriminator_question: "Is a steering warning light on the dash along with the heavy feel?"
    - vs: loose_or_sloppy_steering
      discriminator_question: "Is the wheel hard to physically turn, or easy to turn but loose and sloppy feeling?"
    - vs: red_or_pink_puddle_transmission_or_power_steering
      discriminator_question: "Have you seen any red or pink fluid under the front of the car, or had to top off power steering fluid?"
  safety_flag: advise_immediately
  notes: >
    Loss of assist = full manual steering effort — controllable but dangerous in parking maneuvers and
    emergencies, so advise promptly [S8]. Hydraulic cars: check for whine + low fluid (leak entry).
    EPS cars: it's electrical [S8]. Does NOT include an ignition/wheel LOCK that won't turn with the key
    (starting/keys domain) — if the engine isn't running, that's not this.

- category: steering_handling
  subcategory: loose_or_sloppy_steering
  display: "Steering loose / sloppy / too much play"
  customer_voice_anchors:
    - "steering feels really loose and sloppy"
    - "theres a lot of play in the steering wheel"
    - "i can wiggle the wheel back and forth before the car actually turns"
    - "steering feels disconnected from the road"
    - "dead spot in the middle of the steering"
    - "wheel feels loose, especially on the highway"
    - "car lags behind the steering, i turn and it reacts a second later"
    - "too much slop in the wheel, have to saw at it to stay straight"
    - "PLAY IN STEERING WHEEL AND CLUNKING IN SUSPENSION"
  required_slots:
    - steering_feel: "play/deadband/vague — the defining symptom"
    - noise_descriptor: "any clunk with the play — play + clunk points at worn linkage/joints"
    - speed_band: "worse at highway speed — wander at speed raises urgency"
    - started_when: "gradual wear vs sudden after impact — sudden play after a pothole is more alarming"
  confusables:
    - vs: wandering_or_drifting_in_both_directions
      discriminator_question: "Is it the wheel itself that feels loose with a dead spot, or does the car drift side to side even though the wheel feels normal?"
    - vs: hard_to_turn_heavy_steering
      discriminator_question: "Is the steering loose and easy to move, or stiff and hard to turn?"
    - vs: clunking_over_bumps
      discriminator_question: "Do you mainly feel looseness in the wheel, or mainly hear clunking over bumps?"
  safety_flag: none
  notes: >
    Worn tie rods, ball joints, or rack bushings create free play; play + clunk together is the classic
    worn-linkage pair [S14]. If the customer describes fighting the wheel to stay in a lane or feeling
    unsafe, escalate to the safety path. Does NOT include pull to one side (pull entries) or a loose/tilted
    steering COLUMN (mounting — advisor note).

- category: steering_handling
  subcategory: steering_wheel_off_center_when_driving_straight
  display: "Steering wheel off-center / crooked"
  customer_voice_anchors:
    - "steering wheel is crooked when im driving straight"
    - "wheel sits at an angle even though the car goes straight"
    - "after new tires my steering wheel isnt centered anymore"
    - "steering wheel off center since the alignment"
    - "have to hold the wheel at 10 and 2 slightly turned to go straight"
    - "wheel points a little left when driving down a straight road"
    - "car drives fine but the steering wheel is cocked sideways"
    - "steering wheel not straight after i hit a curb"
  required_slots:
    - steering_feel: "off-center while tracking straight — distinct from pull (car itself drifts)"
    - recent_action: "after alignment/tire/suspension work or a curb hit — the dominant onset stories"
    - pull_direction: "confirm the CAR tracks straight — if it also drifts, it's a pull entry instead"
  confusables:
    - vs: steady_drift_while_cruising
      discriminator_question: "Does the car itself drift to one side, or does it drive straight while the wheel just sits crooked?"
    - vs: pull_that_started_after_recent_tire_or_service_work
      discriminator_question: "Since the recent work, is the problem a crooked wheel while driving straight, or the car actually pulling to a side?"
  safety_flag: none
  notes: >
    Off-center wheel with straight tracking = toe split / alignment centering issue — an alignment
    correction, not a safety event [S12]. Frequently reported right after an alignment or curb strike.
    Does NOT include a wheel that is off-center AND the car pulls — the pull dominates for routing.

- category: steering_handling
  subcategory: noise_when_turning_the_steering_wheel
  display: "Noise when turning the steering wheel"
  customer_voice_anchors:
    - "whining noise when i turn the steering wheel"
    - "groaning sound when turning into parking spots"
    - "HEARS A LOUD SQUEAL WHEN TURNING"
    - "creaking from the steering when i turn at low speed"
    - "moaning noise when i crank the wheel all the way to the side"
    - "steering makes a rubbing squeak turning out of my driveway"
    - "wheel groans when parking, quiet going straight"
    - "hear a whine that only happens while the wheel is turned"
    - "creak from the steering column every time i turn while parked"
  required_slots:
    - noise_descriptor: "whine/groan/creak/squeal vs CLICK-CLICK — clicking on turns is the CV-axle pattern, a different system"
    - onset_timing: "only while the wheel is turning vs whenever the engine runs — engine-tied whine is a belt/pump, not steering geometry"
    - steering_feel: "any heaviness with the noise — noise + heavy = low PS fluid picture"
    - speed_band: "parking-lot speed vs driving speed — low-speed full-lock groan vs at-speed hum differ"
  confusables:
    - vs: popping_or_clicking_when_turning
      discriminator_question: "Is it a whine/groan/creak, or a rhythmic clicking-popping sound when turning (like tick-tick-tick)?"
    - vs: high_pitched_whining_under_the_hood
      discriminator_question: "Does the noise only happen while turning the wheel, or is it there any time the engine is running?"
    - vs: high_pitched_squealing
      discriminator_question: "Does the noise happen when turning the steering wheel, or when pressing the brakes?"
    - vs: squeaking_or_creaking_over_bumps
      discriminator_question: "Do you hear it when turning the wheel, or when going over bumps?"
  safety_flag: none
  notes: >
    Whine/groan on turns with low fluid = hydraulic PS starving; creak at standstill turns = dry strut
    bearing or column joint. CROSS-DOMAIN: rhythmic clicking on turns is the CV-joint signature
    (driveline domain — popping_or_clicking_when_turning); engine-speed whine regardless of steering is
    belt/pump/alternator (engine-accessory domain). Those two confusables must survive synthesis.

- category: steering_handling
  subcategory: steady_drift_while_cruising
  display: "Pulls / drifts to one side while driving"
  customer_voice_anchors:
    - "car pulls to the right when driving"
    - "have to hold the wheel to one side to keep it straight"
    - "drifts left on the highway if i loosen my grip"
    - "car veers right ever since i hit a curb"
    - "pulls to one side even though the tires are pretty new"
    - "always drifting toward the shoulder, have to keep correcting"
    - "car wont track straight, leans right constantly"
    - "pulls left a little at any speed"
  required_slots:
    - pull_direction: "left vs right vs varies — a consistent single direction defines this entry"
    - onset_timing: "cruising, not braking — brake-triggered pull is a brakes concern"
    - pull_road_dependence: "PROPOSED-NEW slot — every road vs only crowned/sloped roads; separates a true pull from road-crown drift"
    - recent_action: "recent tire/alignment work or curb/pothole strike — onset story changes the route"
    - tire_state: "any visibly low tire — a low tire alone can cause the drift"
  confusables:
    - vs: pulling_only_when_braking
      discriminator_question: "Does it pull all the time while cruising, or only when you press the brakes?"
    - vs: drift_that_follows_the_roads_slope
      discriminator_question: "Does it pull on every road, or only on certain roads (fine on flat side streets)?"
    - vs: pull_that_started_after_recent_tire_or_service_work
      discriminator_question: "Did the pulling start right after tire, alignment, or other service work?"
    - vs: wandering_or_drifting_in_both_directions
      discriminator_question: "Does it always pull toward the same side, or wander back and forth in both directions?"
  safety_flag: none
  notes: >
    Steady one-direction pull: alignment, left/right tire-pressure split (2-3 psi is enough), tire
    conicity, or a dragging brake [S12]. Ask pressure first — cheapest fix. Conicity clue: the pull flips
    sides when front tires are swapped side-to-side [S12]. Does NOT include torque steer during hard
    acceleration (driveline/performance domain).

- category: steering_handling
  subcategory: wandering_or_drifting_in_both_directions
  display: "Wanders / floats both directions"
  customer_voice_anchors:
    - "car wanders all over the road"
    - "constantly correcting the steering on the highway"
    - "floats side to side at 70, cant relax"
    - "feels like the car has a mind of its own on the freeway"
    - "it began to wander badly at highway speeds and now im uncomfortable driving it"
    - "car drifts whichever way it wants, left then right"
    - "have to saw the wheel back and forth to stay in my lane"
    - "no center feel, wanders between the lines"
  required_slots:
    - pull_direction: "varies/both — confirms wander vs a one-direction pull"
    - speed_band: "highway-dominant wander is typical and raises urgency"
    - steering_feel: "any looseness/play with it — wander + play = worn linkage picture"
    - drivable_state: "does the customer feel unsafe — severe wander warrants the safety path"
  confusables:
    - vs: steady_drift_while_cruising
      discriminator_question: "Does it drift back and forth in both directions, or always toward the same side?"
    - vs: loose_or_sloppy_steering
      discriminator_question: "Is it mainly the car wandering on the road, or mainly the steering wheel itself feeling loose with a dead spot?"
  safety_flag: none
  notes: >
    Bi-directional wander = worn steering linkage/bushings, bad alignment (toe), or badly worn/underinflated
    tires — not the same fault family as a one-way pull [S12][S14]. If described as scary/unsafe at speed,
    escalate to the safety concern path. Distinct live slug; do not collapse into the generic pull.

- category: steering_handling
  subcategory: drift_that_follows_the_roads_slope
  display: "Drifts with the slope of the road"
  customer_voice_anchors:
    - "pulls on some roads but drives fine on others"
    - "drifts toward the shoulder on the highway but its fine on side streets"
    - "car leans with the slope of the road"
    - "only pulls on the interstate, straight as an arrow in my neighborhood"
    - "drifts right on most highways but not on flat roads"
    - "follows the tilt of the road, always toward the ditch"
    - "on a flat calm road it tracks fine hands off, but it drifts on the interstate"
    - "it only seems to pull on certain roads and drives fine on others"
  required_slots:
    - pull_road_dependence: "PROPOSED-NEW slot — the defining fact: certain roads only vs every road"
    - pull_direction: "usually toward the road edge/shoulder — consistent-with-crown supports this read"
    - tire_state: "pressure split can masquerade as crown drift — cheap to rule out"
  confusables:
    - vs: steady_drift_while_cruising
      discriminator_question: "Does it drift on every road, or only on certain roads like the highway?"
  safety_flag: none
  notes: >
    US roads are crowned for drainage; a mild rightward lean on crowned highways that disappears on flat
    roads is largely normal geometry — worth an alignment check but often expectation-setting [S12].
    Anchors here keep the classifier from over-booking normal crown drift as a fault; the advisor sets
    expectations.

- category: steering_handling
  subcategory: pull_that_started_after_recent_tire_or_service_work
  display: "Pull that started after recent tire / service work"
  customer_voice_anchors:
    - "just got new tires and now it pulls to the left"
    - "had an alignment last week and it still pulls"
    - "pulls to the right ever since the tire rotation"
    - "RE CHECK ALIGNMENT, car goes right when holding the wheel straight, alignment was just done"
    - "new tires and an alignment and it STILL drifts, third time back"
    - "started pulling right after the shop rotated my tires"
    - "put winter tires on and now the car pulls"
    - "two new front tires on monday, pulling left by wednesday"
    - "alignment done a month ago but it drifts worse than before"
  required_slots:
    - recent_action: "which work and how recently — the defining fact for this route"
    - pull_direction: "left/right — swap tests depend on it"
    - started_when: "immediately after the work vs weeks later — immediate onset ties it to the work"
  confusables:
    - vs: steady_drift_while_cruising
      discriminator_question: "Did the pull start right after tire or alignment work, or has it developed on its own over time?"
    - vs: recent_tire_work_then_new_symptom
      discriminator_question: "Is the new problem a pull to one side, or something else like a vibration or noise since the work?"
  safety_flag: none
  notes: >
    Pull appearing right after tire work is classically tire conicity or a mounting/rotation artifact —
    a front side-to-side swap flips the pull if a tire is the cause [S12]. Onset-after-service is its own
    live slug; keep it separate from the generic pull so the advisor knows to re-check the recent work
    first. Overlaps the situational after_recent_service_or_repair_work bucket — causal tie to the recent
    work wins.

# ---------------------------------------------------------------------------
# LEAKS — brake fluid + power-steering fluid (cross into the leaks domain)
# ---------------------------------------------------------------------------

- category: leak
  subcategory: clear_yellow_or_light_brown_puddle_brake_fluid
  display: "Brake fluid leak"
  customer_voice_anchors:
    - "brake fluid leaking, spot on the garage floor by the wheel"
    - "keep having to top off the brake fluid every week"
    - "added brake fluid and it leaked right back out"
    - "clear oily fluid on the floor and my pedal feels softer"
    - "wet streak on the inside of my rear tire, smells weird"
    - "brake fluid reservoir keeps going down but i dont see a puddle"
    - "light brown slick fluid under the car near the front wheel"
    - "leak near the brake lines under the driver side"
  required_slots:
    - fluid_color: "clear/yellow/light-brown slick fluid — separates brake fluid from oil (dark), coolant (green/orange), PS/trans (red)"
    - fluid_under_car_location: "at a wheel or along the body lines — brake fluid shows at wheels/lines, not under the engine"
    - pedal_feel: "any softness/sinking — leak + pedal change is the urgent combination"
    - warning_light_named: "red BRAKE light with it — low fluid trips the level sensor"
  confusables:
    - vs: spongy_or_soft_pedal
      discriminator_question: "Have you actually seen fluid on the ground or dropping in the reservoir, or does the pedal just feel soft?"
    - vs: brown_or_black_puddle_engine_oil
      discriminator_question: "Is the fluid thin and clear-to-light-brown near a wheel, or dark engine-oil brown/black under the middle of the engine?"
    - vs: red_or_pink_puddle_transmission_or_power_steering
      discriminator_question: "Is the fluid clear/yellowish, or distinctly red or pink?"
  safety_flag: advise_immediately
  notes: >
    Any confirmed brake-fluid loss is urgent — hydraulic pressure is what stops the car; leaks at wheels
    (wheel cylinder/caliper) or lines are the classic presentations [S5]. Fresh brake fluid is nearly
    clear and darkens with age; customers often call it "oil". CROSS-DOMAIN: this entry lives in the leaks
    domain's color table — synthesis should keep exactly one canonical brake-fluid-leak entry.

