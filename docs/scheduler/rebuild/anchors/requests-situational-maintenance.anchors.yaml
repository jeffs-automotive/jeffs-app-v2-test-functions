# ============================================================================
# Anchor knowledge — domain: requests-situational-maintenance
# Generated: 2026-07-19 (day-one seed for the rebuilt concern classifier)
#
# SCOPE: direct service requests (oil change, brake job, tires, inspection,
# AC recharge, tune-up, part replacement), situational intake (post-accident,
# car sat unused, pre-trip, post-service comeback, multiple symptoms, second
# opinion), general maintenance, the genuinely-vague triage cases, and
# out-of-scope (not a car-repair request). This file DEFINES the reserved
# `general_diagnostic` and `out_of_scope` categories for the whole classifier.
#
# RESERVED-CATEGORY SEMANTICS (defined here, honored classifier-wide):
#   general_diagnostic — the broad-triage bucket. Used (a) when the customer's
#     words are genuinely vague ("car feels off") and (b) as the classifier's
#     FALLBACK when no domain category clears the embedding/LLM confidence
#     gate. Never let a specific, testable symptom land here.
#   out_of_scope — not a car-repair concern at all (logistics, business
#     inquiries, services the shop doesn't offer, gibberish). Routes to a
#     friendly re-prompt / front office, NEVER to a diagnostic category.
#
# ROUTING PRINCIPLES baked into these entries (from the shop's live-corpus
# routing analysis, docs/automotive-knowledge-base/routers/router-requests-maintenance.md):
#   1. A named diagnosable SYMPTOM beats request framing — "brakes grinding,
#      need a brake job" belongs to the brakes symptom domain; the request is
#      metadata. Anchors here are for utterances DOMINATED by the request /
#      situation / maintenance line.
#   2. A situational cue overrides a symptom keyword only when the customer
#      states it as the CAUSE ("after X, now Y" / "since X, still Y"). A cue
#      in passing (tow-in backstory, prior unrelated repair) does not.
#   3. Safety fear with no nameable symptom, or total loss of a safety
#      system, is its own advise-immediately situation.
#
# SOURCES (cited as [S#] in notes):
#   S1  KBB — what a tune-up means today: https://www.kbb.com/car-advice/whats-involved-in-a-vehicle-car-tune-up/
#   S2  Jalopnik — why modern cars don't need tune-ups: https://www.jalopnik.com/1962279/why-modern-cars-dont-need-tune-ups/
#   S3  USTMA — tire repair basics (tread-area only, <=1/4 in; no sidewall repair): https://www.ustires.org/tire-care-safety/tire-repair-basics
#   S4  Tire Industry Association — tire repair consumer guidance: https://www.tireindustry.org/resources/consumer-education/consumer-safety-overview/tire-repair/
#   S5  Synchrony — what goes wrong when a car sits too long: https://www.synchrony.com/blog/automotive/what-happens-when-your-car-sits-for-too-long
#   S6  Car-X — car sitting idle for weeks or months: https://www.carx.com/blog/car-sitting-idle-for-weeks-or-months-heres-what-you-need-to-know/
#   S7  CARSTAR — checking for damage after hitting a curb: https://www.carstar.com/blog/how-to-check-for-car-damage-from-hitting-the-curb/
#   S8  FCP Euro — suspension checks after a curb strike: https://www.fcpeuro.com/blog/what-to-look-for-on-your-suspension-after-hitting-a-curb
#   S9  NerdWallet — pre-purchase inspections (~$100-300): https://www.nerdwallet.com/auto-loans/learn/pre-purchase-inspection-car
#   S10 JD Power — how to get a pre-purchase inspection: https://www.jdpower.com/cars/shopping-guides/how-do-you-get-a-pre-purchase-inspection-when-buying-a-used-car
#   S11 US EPA — MVAC recharge options (sealed system; low = leak): https://www.epa.gov/mvac/options-recharging-your-air-conditioner
#   S12 MACS — regulating recharge (top-offs don't fix leaks): https://macsmobileairclimate.org/2016/06/23/regulating-recharge/
#   S13 PA DMV — annual safety inspection + county emissions: https://www.pa.gov/agencies/dmv/vehicle-services/inspection-and-safety-requirements
#   S14 AAA — modern oil-change intervals: https://www.aaa.com/autorepair/articles/how-often-should-you-change-your-oil
#   S15 Capital One — oil intervals stretched 3,000 -> 10,000 mi: https://www.capitalone.com/cars/learn/finding-the-right-car/how-oilchange-intervals-stretched-from-3000-to-10000-miles/1761
#   S16 NHTSA — recall remedies are free at the manufacturer's dealer: https://www.nhtsa.gov/recalls
#   S17 FTC — federal warranty law (independent shops OK for warranty-era maintenance): https://www.ftc.gov/business-guidance/resources/businesspersons-guide-federal-warranty-law
#
# Customer-voice provenance: phrasing patterns are modeled on the shop's real
# de-identified concern corpus + forum-style paraphrase (see the KB's
# customer-voice-style-guide.md) — ALL-CAPS fragments, misspellings, and mixed
# request+symptom lines are intentional training signal.
# ============================================================================

- category: request
  subcategory: oil_change
  display: "Oil change"
  customer_voice_anchors:
    - "need an oil change"
    - "due for an oil change and tire rotation"
    - "Oil Change full syn"
    - "can i get an oil chnage this week"
    - "oil life is at 5%"
    - "the little wrench light came on, i think its just due for service"
    - "need my 3000 mile oil change"
    - "just need my oil changed nothing else"
    - "overdue for an oil change by like 2000 miles"
    - "oil change, and they said i needed a filter last time"
    - "sticker on the windshield says i was due back in march"
    - "how soon can you get me in for a synthetic oil change"
  required_slots:
    - service_scope: "oil-only vs bundled (rotation / inspection / filters) — sets booking length and price"
    - due_status: "overdue / due now / maintenance-reminder light on — urgency and whether a reminder reset is needed"
    - symptom_present: "any leak, burning smell, or RED oil-pressure light mentioned alongside — flips this to a diagnostic concern in the leak/warning_light domains"
    - oil_type_preference: "conventional / blend / full synthetic if stated — pricing and correct spec"
  confusables:
    - vs: oil_pressure_light
      discriminator_question: "Is a RED oil-can light coming on while you drive, or is it a maintenance/oil-life reminder saying you're due for service?"
    - vs: oil_leak
      discriminator_question: "Are you just due for an oil change, or are you seeing oil spots or drips under the car?"
    - vs: scheduled_maintenance_service
      discriminator_question: "Just the oil change, or the full mileage service your manual calls for?"
  safety_flag: none
  notes: "Bookable maintenance line — no diagnosis. Customers still say '3000 mile oil change'; modern intervals are 5,000-10,000 mi depending on oil spec [S14][S15] — accept the phrasing, don't correct it. A red oil-pressure light is NOT this entry (engine-damage risk, warning_light domain, advise immediately). 'Reset my oil light' with no service = a work-order line that also lands here."

- category: request
  subcategory: scheduled_maintenance_service
  display: "Factory scheduled maintenance"
  customer_voice_anchors:
    - "due for my 30k service"
    - "60,000 mile service"
    - "maintenance required light came on"
    - "the car says service due"
    - "need the B1 service done"
    - "manual says im due for the big service"
    - "just regular maintenance, nothing wrong with it"
    - "100k service, want everything thats due"
    - "need 3000-mile service"
    - "shes due for her checkup per the maintenance schedule"
  required_slots:
    - mileage_or_interval: "which service interval (30k/60k/90k, A/B code, or 'whatever's due') — defines the work list"
    - maintenance_light_state: "maintenance-minder message/light on vs going by mileage — reset needed"
    - symptom_present: "any symptom mentioned alongside — routes that symptom to its domain first"
    - service_history_known: "new to the shop vs regular — whether records must be pulled or the customer brings them"
  confusables:
    - vs: oil_change
      discriminator_question: "The full scheduled service from the manual, or just an oil change?"
    - vs: tune_up_request
      discriminator_question: "Following the factory schedule, or does the car feel like it's running poorly?"
    - vs: general_checkup
      discriminator_question: "The factory mileage service, or an open-ended once-over to see how the car is doing?"
  safety_flag: none
  notes: "Bookable maintenance — no diagnosis unless a symptom rides along. Includes manufacturer maintenance-minder codes (Honda A1/B1 style) and 'service due' dash messages. Does NOT include the red/amber diagnostic lights (warning_light domain) or 'check engine' — a maintenance reminder and a check-engine light are different systems, and customers regularly conflate them; ask which if unclear."

- category: request
  subcategory: tune_up_request
  display: "Tune-up"
  customer_voice_anchors:
    - "car needs a tune up"
    - "probably due for a tune up"
    - "can you give it a tune up"
    - "needs a tune up its running rough"
    - "spark plugs and wires, the usual tune up stuff"
    - "give it a good tune up before winter"
    - "tune up and oil change"
    - "how much is a tuneup"
    - "old truck could use a tune up, plugs and all"
    - "hasnt had a tune up in years"
  required_slots:
    - symptom_present: "CRITICAL — 'running rough / misfiring / stalling' flips this to the performance domain; a bare 'due for a tune up' stays a maintenance request"
    - what_customer_means: "scheduled plugs/filters/fluids maintenance vs 'fix why it runs bad' — the word covers both in customer speech"
    - vehicle_age: "older vehicles may genuinely need ignition service; newer ones map to scheduled maintenance"
  confusables:
    - vs: rough_idle_or_misfire
      discriminator_question: "Is the car actually running rough, shaking, or losing power right now — or do you just want the scheduled plugs-and-filters maintenance?"
    - vs: scheduled_maintenance_service
      discriminator_question: "Do you want what the factory schedule calls for at your mileage, or specifically plugs/ignition parts?"
  safety_flag: none
  notes: "'Tune-up' is legacy vocabulary — modern engines have no traditional tune-up (electronic ignition, long-life plugs) and the word now means either scheduled maintenance or 'it runs badly, make it right' [S1][S2]. The discriminator question is essential: roughly half of tune-up asks are hidden driveability complaints (performance domain, cross-domain confusable)."

- category: request
  subcategory: brake_service_request
  display: "Brake job / brake replacement"
  customer_voice_anchors:
    - "need new brakes"
    - "i need a brake job"
    - "brakes need replaced, pads and rotors"
    - "dealer said i need rear brakes"
    - "was told my breaks are getting low"
    - "want my brakes checked, probably need pads"
    - "front brakes done please"
    - "how much for pads and rotors on a 2018 camry"
    - "they said my brakes are at 3 millimeters"
    - "need my brakes done asap before my inspection"
    - "brake replacement, rear"
  required_slots:
    - axle_named: "front / rear / all four — scopes the job"
    - prior_diagnosis_source: "dealer / another shop / inspection / self — 'told by X' colors it as fix-a-known-problem, still bookable as a brake check"
    - symptom_present: "grinding, squealing, pedal feel, pulling — any of these puts the brakes SYMPTOM domain in control"
    - urgency: "metal-on-metal or 'asap' language raises priority"
  confusables:
    - vs: grinding_when_braking
      discriminator_question: "Are the brakes making a noise or feeling different when you stop, or is this replacement someone recommended without a symptom?"
    - vs: second_opinion
      discriminator_question: "Do you want us to do the brake job, or double-check whether you really need it?"
    - vs: fluid_flush_service
      discriminator_question: "Brake pads/rotors, or the brake-fluid flush service?"
  safety_flag: none
  notes: "Bare request ('need brakes', 'dealer said') books as a brake inspection/quote — the request type is metadata. ANY live symptom (grinding metal-on-metal, pedal sinking, pulling when braking) belongs to the brakes symptom domain and may escalate to advise_immediately there. Cross-domain confusable with the entire brakes domain."

- category: request
  subcategory: new_tires_request
  display: "New tires / tire replacement"
  customer_voice_anchors:
    - "need 4 new tires"
    - "quote for a set of tires"
    - "want to put new tires on before winter"
    - "tires are bald, time for new ones"
    - "my tires are dry rotted, sidewalls all cracked"
    - "TIRE REPLACEMENT"
    - "need new rubber on it"
    - "two new tires for the front"
    - "do you sell tires? need a set for a 2015 rav4"
    - "failed inspection on tread, need tires"
    - "need my snow tires put on"
    - "tires are like 8 years old, want them replaced"
  required_slots:
    - tire_count: "how many (1/2/4) — quoting"
    - replacement_reason: "worn tread / dry rot-age / damaged beyond repair / seasonal swap / just want them — separates sales from repair"
    - vehicle_or_size: "vehicle or tire size — required to quote"
    - tires_supplied_by: "shop-sourced vs customer already bought tires (mount & balance only)"
  confusables:
    - vs: tire_puncture_repair
      discriminator_question: "Do you want one tire fixed or patched (a nail, a screw, it's losing air), or new tires because they're worn out or old?"
    - vs: tire_rotation_or_balance
      discriminator_question: "New tires, or rotating/balancing the ones you have?"
    - vs: alignment_request
      discriminator_question: "Just the tires, or an alignment with them (recommended if they wore unevenly)?"
  safety_flag: none
  notes: "Pure sales/quote request — no diagnostic test. Industry rule: punctures are repairable only in the tread area and only up to 1/4 inch; sidewall damage and dry rot cannot be safely repaired — replacement is the correct answer, so do NOT route dry-rot language to tire repair [S3][S4]. Uneven-wear language ('wearing funny', 'bald on the inside') hints at an alignment/suspension cause — cross-domain confusable with the tires/steering_handling symptom domains."

- category: request
  subcategory: tire_rotation_or_balance
  display: "Tire rotation / wheel balance"
  customer_voice_anchors:
    - "tire rotation please"
    - "rotate and balance my tires"
    - "Tire Rotation & Balance"
    - "havent rotated my tires in forever"
    - "need my wheels balanced"
    - "rotation with my oil change"
    - "tires wearing funny, figure they need rotated"
    - "can you rotate the tires while its in there"
    - "balance the fronts, i think one threw a weight"
  required_slots:
    - bundled_with: "standalone vs riding along with an oil change or other service"
    - vibration_present: "steering-wheel shake at speed suggests balance as a FIX for a symptom — vibration domain leads"
    - uneven_wear_noticed: "'wearing funny / bald on one edge' is an alignment/suspension symptom, not routine rotation"
  confusables:
    - vs: steering_wheel_shake_at_highway_speed
      discriminator_question: "Routine rotation, or is there a shake or vibration you're trying to get rid of?"
    - vs: uneven_tire_wear
      discriminator_question: "Just keeping up on rotation, or have you noticed the tires wearing unevenly or on one edge?"
  safety_flag: none
  notes: "Routine maintenance line. 'Balance' asked FOR a vibration is symptom-driven — the vibration domain should own it so the real cause (balance vs bent wheel vs bearing vs alignment) gets diagnosed. Cross-domain confusables: vibration + tires domains."

- category: request
  subcategory: alignment_request
  display: "Wheel alignment"
  customer_voice_anchors:
    - "need an alignment"
    - "check alignment and re align if needed"
    - "wheel alignment please"
    - "steering wheel is crooked, want an alignment"
    - "just got new tires somewhere else, need an alignment"
    - "need an alinement"
    - "4 wheel alignment"
    - "car pulls a little, figure i need an alignment"
    - "hit a curb, want the alignment checked"
    - "tires wore out fast, shop said get an alignment next time"
  required_slots:
    - alignment_reason: "routine / after new tires / pulling or crooked wheel / after an impact — impact-as-cause moves it to the situational domain"
    - impact_event: "pothole/curb/accident named as cause — situational after_accident_or_impact takes over"
    - pull_symptom: "active pulling/drifting is a steering_handling-domain symptom; alignment is one possible fix, not the diagnosis"
  confusables:
    - vs: pulling_or_drifting
      discriminator_question: "Is the car actively pulling or drifting on its own, or is this a preventive/after-new-tires alignment?"
    - vs: after_accident_or_impact
      discriminator_question: "Did this start after hitting a pothole, curb, or something else? If so we should check the whole front end, not just align it."
    - vs: new_tires_request
      discriminator_question: "Alignment only, or tires too?"
  safety_flag: none
  notes: "Bookable service. Curb and pothole strikes commonly bend tie rods and knock alignment out even when nothing looks damaged [S7][S8] — when the customer names an impact as the cause, the situational post-impact entry wins so the shop inspects before aligning. Active pull/drift language is a cross-domain confusable with steering_handling."

- category: request
  subcategory: state_inspection_emissions
  display: "State inspection / emissions"
  customer_voice_anchors:
    - "state inspection"
    - "need my inspection done, sticker expired"
    - "inspection and emissions"
    - "due for inspection this month"
    - "safety and emissions inspection"
    - "reinspection, already fixed what failed"
    - "need a sticker"
    - "car failed emissions, need it retested"
    - "annual inspection"
    - "just moved here, car needs its first inspection"
    - "inspection due end of month, whats open"
  required_slots:
    - inspection_type: "safety / emissions / both / reinspection — what gets booked"
    - due_or_expired: "sticker month, expired, or grace situation — urgency"
    - failed_previously: "a prior FAIL (esp. emissions with a check-engine light) means diagnosis/repair first, then retest"
    - registration_change: "new-to-state registrations often need an initial inspection"
  confusables:
    - vs: general_checkup
      discriminator_question: "The official state inspection sticker, or an open-ended look-over to see what the car needs?"
    - vs: check_engine_light
      discriminator_question: "Is the check engine light on? It usually has to be fixed before the car can pass emissions."
    - vs: pre_trip_inspection
      discriminator_question: "The state-required inspection, or a check-up before a trip?"
  safety_flag: none
  notes: "Regulatory service line — the shop books it, no diagnosis (e.g., Pennsylvania requires an annual safety inspection plus county-based emissions testing [S13]; details vary by state — keep shop-agnostic). 'Annual inspection' is ambiguous: sticker/state/legal framing = this entry; wellness framing = general_checkup. A failed-emissions retest with a lit CEL is a cross-domain confusable with warning_light/check_engine_light."

- category: request
  subcategory: ac_recharge_request
  display: "A/C recharge"
  customer_voice_anchors:
    - "need my ac recharged"
    - "ac needs a recharge before summer"
    - "freon top off"
    - "recharge a/c"
    - "can you put freon in it"
    - "ac recharge, it does this every year"
    - "just want a can of refrigerant put in"
    - "AC RECHARGE AND CHECK"
    - "a/c is low on juice i think"
    - "wife says the air needs charged"
  required_slots:
    - cooling_symptom_present: "blowing warm/weak RIGHT NOW is an hvac-domain symptom; a preseason top-off ask stays here"
    - recharge_history: "recharged before and lost cooling again — strong leak signal, route toward leak testing"
    - timeframe: "how long since it last blew cold — fast loss = bigger leak"
  confusables:
    - vs: ac_blows_warm
      discriminator_question: "Is the A/C actually blowing warm right now, or is this a just-in-case top-off before the season?"
    - vs: ac_leak
      discriminator_question: "Has it been recharged before and gone warm again? That points to a leak that needs finding, not another top-off."
  safety_flag: none
  notes: "Customers ask in these exact words, so the anchor exists — but the A/C is a sealed system: low refrigerant means it leaked out, and recharging is not scheduled maintenance [S11][S12]. The booking flow should surface the leak-vs-recharge discriminator instead of silently booking a top-off. Cross-domain confusable with the hvac domain (warm air symptom) and leak domain."

- category: request
  subcategory: battery_replacement_request
  display: "Battery test / replacement"
  customer_voice_anchors:
    - "i need a new battery"
    - "want my battery replaced"
    - "battery is 6 years old, just replace it"
    - "can you test my battery"
    - "autozone said my battery is bad"
    - "Replace battery"
    - "need a battery for my f150"
    - "battery keeps dying, i just want a new one"
    - "check battery and replace if needed"
    - "how much is a battery installed"
  required_slots:
    - symptom_present: "won't start / clicks / slow crank / died while driving — those own the routing (no_start or electrical domain)"
    - battery_age_or_test: "age or a prior parts-store test result — supports a straight replacement"
    - test_vs_replace: "wants a test first vs committed to replacement"
    - repeat_failures: "'keeps dying' suggests charging-system or parasitic-draw diagnosis, not just a battery"
  confusables:
    - vs: wont_start_clicks
      discriminator_question: "Is the car failing to start right now, or are you replacing the battery before it becomes a problem?"
    - vs: battery_drains_overnight
      discriminator_question: "Does the new-ish battery keep going dead? Then something is draining or not charging it — that needs testing, not just a battery."
    - vs: battery_charging_light
      discriminator_question: "Is the red battery light coming on while you drive?"
  safety_flag: none
  notes: "Bare replacement/test request. 'Keeps dying' language is the classic mis-description: the battery may be the victim of a bad alternator or a parasitic draw — cross-domain confusable with the electrical/no_start domains. A red charging-system light while driving belongs to warning_light."

- category: request
  subcategory: replace_specific_part
  display: "Replace a specific part"
  customer_voice_anchors:
    - "replace front wheel hub drivers side"
    - "need a starter put in"
    - "rack replacement"
    - "replace the serpentine belt"
    - "need new wiper blades"
    - "headlight bulb replacement"
    - "REPLACE CABIN AIR FILTER"
    - "i have the part already, just need it installed"
    - "put a new thermostat in it"
    - "spark plugs replaced"
    - "need my water pump done, already know thats whats bad"
    - "swap out the alternator for me"
  required_slots:
    - part_named: "which part — scopes labor and parts quoting"
    - parts_source: "shop-supplied vs customer-supplied part — many shops restrict or won't warranty customer parts; advisor policy check"
    - symptom_present: "if a symptom is driving the ask, the symptom domain leads and the named part becomes the customer's theory"
    - diagnosis_confidence: "who decided this part is needed (self / another shop / prior visit) — second-opinion vs straight install"
  confusables:
    - vs: second_opinion
      discriminator_question: "Do you want us to just install that part, or first confirm it's actually what the car needs?"
    - vs: accessory_doesnt_work
      discriminator_question: "Is something not working that you believe this part will fix — or is this a simple replace-it request (bulb, blade, filter)?"
    - vs: approve_recommended_work
      discriminator_question: "Is this work we already recommended to you, or something new?"
  safety_flag: none
  notes: "The generic named-action request — covers everything from wiper blades to a starter. Small commodity items (blades, bulbs, filters) book directly. Big-ticket parts named WITHOUT a shop diagnosis should surface a gentle confirm-the-diagnosis offer (customers often name the wrong part). Cross-domain confusable with electrical/accessory symptom entries ('headlight out' the SYMPTOM vs 'replace headlight bulb' the REQUEST)."

