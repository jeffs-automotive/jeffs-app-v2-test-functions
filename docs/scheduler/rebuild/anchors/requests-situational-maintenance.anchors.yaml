  safety_flag: none
  notes: "Customers use 'diagnostic' as a magic word — most scan requests are really a lit warning light (cross-domain: warning_light) or a symptom they hope the machine will name (route the symptom). The bare 'just scan it, no light, no symptom' request books as a general diagnostic appointment. A FLASHING check-engine light mentioned anywhere = advise_immediately in the warning_light domain."

- category: request
  subcategory: second_opinion
  display: "Second opinion on another shop's diagnosis"
  customer_voice_anchors:
    - "another shop said i need a new transmission, want a second opinion"
    - "dealer quoted me $2400 for brakes, is that legit"
    - "was told wheel bearings were needed, wants second opinion"
    - "got a huge estimate somewhere else, can you double check it"
    - "shop said head gasket. i dont trust them"
    - "want you to verify what the dealership found"
    - "someone said my struts are shot but it feels fine to me"
    - "can you look at this estimate and tell me whats actually needed"
    - "getting quotes — they said i need a catalytic converter"
  required_slots:
    - prior_diagnosis: "the system/part the other shop named — the vehicle SYSTEM named takes routing control; second_opinion is metadata on it"
    - prior_source: "dealer / chain / independent / friend — context for the advisor"
    - estimate_amount: "if given — sizing the decision"
    - symptom_present: "whether the customer themselves feels/hears anything — corroborating symptom routes its domain"
  confusables:
    - vs: replace_specific_part
      discriminator_question: "Do you want us to verify the diagnosis first, or go ahead and do the repair they recommended?"
    - vs: approve_recommended_work
      discriminator_question: "Was it our recommendation you're acting on, or another shop's you want checked?"
  safety_flag: none
  notes: "Routing rule: the NAMED system keeps control — 'second opinion on wheel bearings' books the suspension/bearing check with second_opinion recorded as the request type. This entry anchors the FRAMING so the embedding can catch estimate-verification asks that name no system ('look at this quote'). Cross-domain by construction — it can point at any symptom domain."

- category: request
  subcategory: approve_recommended_work
  display: "Approve previously recommended work"
  customer_voice_anchors:
    - "you recommended rear brakes last visit, ready to get that done"
    - "want to do the work you quoted me"
    - "go ahead with the stuff i declined last time"
    - "ready to do the cabin filter and flush you suggested"
    - "you guys found a leak last time, lets fix it now"
    - "calling about the estimate you sent over, lets book it"
    - "do the previously declined work"
    - "that thing on my last invoice i said no to — i want it done now"
    - "ok to proceed with the repairs from the inspection"
  required_slots:
    - work_reference: "which visit/estimate/invoice line — the advisor must pull the record"
    - scope_confirmation: "all of it vs specific lines — avoid assuming the whole estimate"
    - new_symptom_since: "anything changed since the recommendation — may need re-inspection"
  confusables:
    - vs: booking_logistics
      discriminator_question: "Booking approved work we already quoted, or a question about an existing appointment?"
    - vs: brake_service_request
      discriminator_question: "Work we recommended, or a brake job you're asking about fresh?"
  safety_flag: none
  notes: "The customer-voice version of the shop's 'previously declined' work-order lines. No diagnosis — it's record lookup + booking. Keep distinct from second_opinion (their shop's rec vs another shop's) and from fresh requests."

- category: request
  subcategory: estimate_quote_request
  display: "Price quote for a named job"
  customer_voice_anchors:
    - "how much for a brake job on a 2016 civic"
    - "price for an alternator replacement"
    - "can i get a quote for struts"
    - "what do you charge for an oil change"
    - "ballpark for a timing belt?"
    - "how much would it cost to fix an ac leak"
    - "quote to replace a catalytic converter"
    - "whats a water pump run these days"
    - "how much do u charge for an oil change and tire rotation?"
  required_slots:
    - job_named: "the specific job/part being priced — no job named means this is booking_logistics, not a quote"
    - vehicle_info: "year/make/model — most quotes are vehicle-specific"
    - diagnosis_known: "quoting a confirmed repair vs price-shopping a guess — guesses may need a diag first"
  confusables:
    - vs: booking_logistics
      discriminator_question: "A price for a specific job on your car, or general questions about hours and how we work?"
    - vs: second_opinion
      discriminator_question: "Just the price, or do you also want us to confirm the repair is really needed?"
  safety_flag: none
  notes: "The legacy classifier null-routed price questions to an advisor; this seed keeps them classifiable so the assistant can hand off WITH the named job attached. Route the quote to the named job's request entry when one exists (tires -> new_tires_request, brakes -> brake_service_request). Price question naming NO job at all = out_of_scope/booking_logistics."

- category: request
  subcategory: recall_or_warranty_question
  display: "Recall / warranty coverage question"
  customer_voice_anchors:
    - "is there a recall on my car for this"
    - "i got a recall letter, can you do the recall work"
    - "will my warranty cover this"
    - "my extended warranty company needs a claim filed, do you work with them"
    - "theres a TSB for this exact problem, i read about it online"
    - "airbag recall — can you handle that or is it dealer only"
    - "can you do warranty work"
    - "the powertrain warranty is still active, does that change anything"
    - "carshield is my warranty, do you take it"
  required_slots:
    - recall_vs_warranty: "manufacturer recall / factory warranty / extended-service contract — three different answers"
    - symptom_present: "the underlying problem, if any — its domain still owns the diagnosis"
    - warranty_provider: "factory vs third-party contract — determines whether the shop can bill it"
  confusables:
    - vs: services_not_offered
      discriminator_question: "A safety recall (free at the manufacturer's dealer), or repair work you'd like us to handle here?"
    - vs: diagnostic_scan_request
      discriminator_question: "Do you want us to diagnose the problem itself, or mainly to sort out who pays for it?"
  safety_flag: none
  notes: "Safety-recall remedies are performed free of charge through the vehicle manufacturer's dealers [S16] — the advisor typically redirects recall-letter work to a dealer. Factory-warranty-era maintenance and third-party extended-service-contract repairs generally CAN be done at an independent shop (Magnuson-Moss; warranty can't be voided just for using one) [S17]. If a symptom is described, its domain leads and the coverage question is metadata."

# ---------------------------------------------------------------------------
# SITUATIONAL INTAKE — the situation dominates; a human advisor usually takes
# these. The causal-tie rule applies: the situation must be the STATED CAUSE
# to override a specific symptom the customer also describes.
# ---------------------------------------------------------------------------

- category: situational
  subcategory: after_accident_or_impact
  display: "After an accident / impact"
  customer_voice_anchors:
    - "got rear ended last weekend, bumper looks fine but it drives different now"
    - "hit a huge pothole and now the front end feels off"
    - "slid into a curb and now i hear a thumping"
    - "was in a fender bender, want the car checked out"
    - "hit a deer last night, seems ok but want it looked over"
    - "curbed it hard parking and now the steering wheel sits crooked"
    - "accident a few weeks back, body shop fixed the outside but somethings still not right"
    - "ran over something on the highway, want the underneath looked at"
    - "my wife hit a parking block, no lights on but its making a noise now"
    - "SHE WAS IN ACCIDENT RECENTLY, CHECK VEHICLE OVER"
    - "pothole season got me, need the front end checked"
  required_slots:
    - impact_type: "collision / pothole / curb / road debris / animal — different inspection focus"
    - when_it_happened: "just now vs weeks ago — urgency and insurance timing"
    - symptom_since: "what changed after (pull, noise, vibration, crooked wheel) — the evidence list for the inspection"
    - airbags_deployed: "deployment = collision-level event; SRS work and insurance likely involved"
    - insurance_involved: "claim open? affects who authorizes the work"
    - drivable_state: "drivable / limping / needs tow"
  confusables:
    - vs: alignment_request
      discriminator_question: "Did the crooked wheel or pull start after the impact? Then the whole front end should be inspected, not just aligned."
    - vs: suspension_noise_or_clunk
      discriminator_question: "Is the noise something that started with the impact, or an older problem you'd been hearing before?"
    - vs: services_not_offered
      discriminator_question: "Is the concern how it drives (our side), or the body/paint damage (a body shop's side)?"
  safety_flag: none
  notes: "Even low-speed curb/pothole hits commonly bend tie rods and control arms and knock alignment out with no visible damage [S7][S8] — the correct booking is an inspection, not a straight alignment. Cosmetic-only damage routes to a body shop (out_of_scope/services_not_offered). Cross-domain: overlaps steering_handling (pull, crooked wheel), noise, and warning_light (airbag light after impact — that domain owns a lit SRS light). Escalate in conversation if the customer describes steering or braking loss — that is safety_concern territory."

- category: situational
  subcategory: symptom_after_recent_service
  display: "Problem right after recent service / repair"
  customer_voice_anchors:
    - "you replaced my brakes last month and theyre still squealing"
    - "check engine light came back on right after the repairs"
    - "just had the alternator done somewhere else and the battery light is on again"
    - "ac was recharged two months ago, blowing hot again"
    - "ever since the oil change theres a burning smell"
    - "picked it up yesterday and now theres a noise it never made before"
    - "still overheating after the water pump got replaced"
    - "had tires put on last week and now the steering wheel shakes"
    - "same problem as before, whatever you fixed didnt take"
    - "multiple repairs completed still misfiring"
    - "brakes done at another shop last week and now theres a grinding worse than before"
  required_slots:
    - work_done: "what was done, when, and WHERE (this shop vs another) — same-shop comebacks are a warranty/rework workflow"
    - symptom_relation: "same problem persisting / came back / brand-new symptom since the work"
    - causal_claim: "customer explicitly ties it to the work ('since', 'right after', 'still') — the trigger for this entry"
  confusables:
    - vs: approve_recommended_work
      discriminator_question: "Is something wrong after the recent work, or are you booking work we recommended?"
    - vs: the_underlying_symptom_domain
      discriminator_question: "Do you think the recent work caused this, or is it a separate new problem you want diagnosed on its own?"
  safety_flag: none
  notes: "The causal tie is what fires this entry ('after X, now Y' / 'still Y after X'). Prior work mentioned only as backstory before a fresh symptom does NOT — route the symptom to its domain. Same-shop comebacks should be flagged to the advisor as potential warranty/rework (distinct workflow, often no charge). Cross-domain by construction: pairs with whichever symptom domain the complaint belongs to (offer both when genuinely mixed)."

- category: situational
  subcategory: car_sat_unused
  display: "Car has been sitting unused"
  customer_voice_anchors:
    - "my dads truck sat in the garage for two years, want to get it road ready"
    - "car has basically been parked since covid"
    - "been sitting all winter, what does it need before i drive it"
    - "inherited my moms car, its been sitting like 8 months"
    - "just got back from deployment and the car hasnt moved in a year"
    - "old project car, want it gone through before i put it on the road"
    - "sat 6 months, battery was dead, jumped it but want the whole thing checked"
    - "tires look low and it smells weird after sitting so long"
    - "kid left the car here all semester, needs a once over before the drive back"
    - "storage unit find, hasnt run since 2022"
  required_slots:
    - sit_duration: "weeks vs months vs years — scales the road-ready checklist"
    - storage_conditions: "garage vs outside — weather/rodent exposure"
    - runs_now: "started since sitting? a specific won't-crank/won't-start complaint routes the no_start domain first"
    - goal: "make-it-road-ready look-over vs one specific fix"
  confusables:
    - vs: wont_start_after_sitting
      discriminator_question: "Is the main problem that it won't start right now, or do you want the whole car gone through before using it again?"
    - vs: new_tires_request
      discriminator_question: "Are the tires cracked or dry-rotted from sitting? Those need replacement, which we can quote as part of the check."
    - vs: general_checkup
      discriminator_question: "Has it been parked a long time, or in regular use and just due for a look-over?"
  safety_flag: none
  notes: "Long-sitting cars cluster predictable problems: discharged battery, tire flat spots and dry rot, degraded fuel, rusted brake rotors, deteriorated fluids, and rodent damage to wiring [S5][S6]. The framing ('make it safe to drive again') books an advisor-scoped road-ready inspection. A single leading symptom (won't crank NOW) hands control to the no_start/electrical domain with the sit as context — cross-domain confusable there."

- category: situational
  subcategory: pre_trip_inspection
  display: "Pre-trip check"
  customer_voice_anchors:
    - "driving to florida next month, want a once over first"
    - "road trip check before we head out west"
    - "wellness check as ill be driving to boston"
    - "taking the car cross country, want to know its up for it"
    - "long trip coming up — check the tires brakes and fluids"
    - "vacation next week, make sure this thing wont leave us stranded"
    - "towing a camper to the lake this summer, want it all checked"
    - "GENERAL CHECK OVER TRIP"
    - "pre trip inspection please"
    - "kid is driving to school out of state, look it over for me"
  required_slots:
    - trip_timing: "when they leave — booking deadline"
    - trip_profile: "distance / towing / mountain driving — shapes the checklist (towing adds cooling + brakes emphasis)"
    - known_worries: "any symptom they already feel — that symptom's domain leads, trip becomes context"
  confusables:
    - vs: state_inspection_emissions
      discriminator_question: "A trip check-up, or the official state inspection sticker?"
    - vs: general_checkup
      discriminator_question: "Is there a specific trip coming up, or just a general look-over?"
    - vs: a_named_symptom_domain
      discriminator_question: "Is something already acting up that worries you for the trip? Let's book that specifically — the trip makes it more worth fixing right."
  safety_flag: none
  notes: "Open-ended condition assessment — advisor books an inspection. A trip mentioned as CONTEXT for a real symptom ('brakes grinding and i have a road trip friday') does NOT land here — the symptom domain wins and the trip raises urgency. Trip dates are deadlines, not driving conditions — don't extract them as symptom facts."

- category: situational
  subcategory: pre_purchase_inspection
  display: "Pre-purchase inspection (car I might buy)"
  customer_voice_anchors:
    - "thinking about buying a used car, can you inspect it before i commit"
    - "pre purchase inspection on a truck im looking at"
    - "can the seller drop a car off for you to check out for me"
    - "buying from a private seller, want a mechanic to go over it first"
    - "PPI on a 2019 tacoma"
    - "found a car on marketplace — what would it cost for you to check it"
    - "my daughter is buying her first car, can you look at it before she pays"
    - "dealer says its certified but i want an independent set of eyes"
    - "used car inspection before purchase, how does that work"
  required_slots:
    - vehicle_access: "who brings the car and when — seller cooperation is the usual bottleneck"
    - purchase_timeline: "how soon they must decide — booking urgency"
    - seller_type: "private / dealer / auction — shapes what records exist"
  confusables:
    - vs: general_checkup
      discriminator_question: "A car you're thinking of buying, or one you already own?"
    - vs: estimate_quote_request
      discriminator_question: "An inspection of the whole car before you buy, or pricing for a specific repair?"
  safety_flag: none
  notes: "Standard shop offering: an independent mechanical assessment before purchase, typically ~$100-300, valued for surfacing hidden problems and negotiating leverage [S9][S10]. Distinct from just-bought check-ups (general_checkup) by timing — the customer doesn't own the car yet, so scheduling revolves around the seller."

- category: situational
  subcategory: general_checkup
  display: "General check-up / once-over"
  customer_voice_anchors:
    - "just want a general check up, nothing specific"
    - "just bought a used focus, want an overall check and an oil change"
    - "havent had it looked at in years, give it a once over"
    - "warranty is expiring, want to make sure everything is ok"
    - "peace of mind check"
    - "new to the area, want a baseline check with a shop i can trust"
    - "make sure everythings good before winter"
    - "full vehicle inspection, tell me what it needs"
    - "my son is taking this car to college, check it over"
    - "just hit 150k, what should i be doing to keep it going"
    - "no problems, just want it looked at bumper to bumper"
  required_slots:
    - motivation: "just-bought / warranty expiring / seasonal / high mileage / new customer — helps the advisor scope"
    - known_worries: "anything specific nagging them — a named worry routes its domain and the check-up rides along"
    - records_available: "service history known or a blank slate"
  confusables:
    - vs: state_inspection_emissions
      discriminator_question: "An open-ended look-over, or the official state inspection?"
    - vs: scheduled_maintenance_service
      discriminator_question: "Whatever the factory schedule says is due, or a condition assessment of the whole car?"
    - vs: vague_concern_needs_triage
      discriminator_question: "Is something actually acting up, or is nothing wrong and you just want it checked?"
  safety_flag: none
  notes: "The 'nothing is wrong, look it over' bucket — includes just-bought once-overs and warranty-expiring checks. The vague_concern boundary matters most: check-up = NO active worry; vague concern = something IS wrong but the customer can't name it. Those two must not collapse into each other — they book differently (inspection vs triage-then-diagnosis)."

- category: situational
  subcategory: multiple_symptoms
  display: "Multiple problems / not sure where to start"
  customer_voice_anchors:
    - "honestly not sure whats wrong — it rattles, the heat smells weird, and the steering feels loose"
    - "got like 3 different problems, where do i even start"
    - "a/c not cooling, maybe a fuse. also oil change"
    - "coolant leak, window motor stuck, oil change and many more"
    - "theres a bunch of stuff going on with this car"
    - "the whole dashboard lit up and its making noises too"
    - "car is falling apart — brakes squeak, it pulls right, and it stalls sometimes"
    - "i have a list of things, too many to type here"
    - "several issues, some electrical some not"
    - "old car, lots of little problems, need someone to sort out whats worth fixing"
  required_slots:
    - symptom_list: "capture every named problem verbatim — the advisor triages"
    - primary_if_any: "ONE dominant symptom with minor asides routes the dominant one instead of landing here"
    - lights_involved: "a many-lights-at-once dashboard is the warning_light domain's multi-light entry when lights are the whole story"
    - budget_frame: "'whats worth fixing' asks for prioritization — advisor conversation"
  confusables:
    - vs: multiple_warning_lights
      discriminator_question: "Is it mainly a bunch of dashboard lights at once, or several different problems you can feel and hear?"
    - vs: a_single_dominant_symptom
      discriminator_question: "Is there one main thing you'd want fixed first if you had to pick?"
    - vs: vague_concern_needs_triage
      discriminator_question: "Can you name the problems (even several), or is it more that something feels wrong and you can't pin it down?"
  safety_flag: none
  notes: "Co-equal problems with no single primary — advisor handoff, don't force one category. One dominant symptom + asides = route the dominant symptom. Lights-only Christmas-tree = warning_light domain (cross-domain confusable). Any single item in the list that is a safety-system loss escalates per that domain's rules."

- category: situational
  subcategory: safety_concern_not_safe_to_drive
  display: "Doesn't feel safe to drive"
  customer_voice_anchors:
    - "i dont feel safe driving it anymore"
    - "the brakes gave out, im scared to drive it"
    - "steering feels like its about to let go, im not driving it"
    - "started making an awful noise on the highway so i pulled over, too scared to keep going"
    - "my mechanic said do not drive this car"
    - "is this even safe to drive?? something is really wrong"
    - "feels like the wheel is going to fall off"
    - "smells like gas inside, not driving it until someone looks"
    - "no brake pressure at all"
    - "it did something terrifying on the freeway, im shook"
  required_slots:
    - what_failed: "if a system IS named (brakes/steering/wheel/fuel smell), that domain gets flagged alongside — total loss of a safety system is not a routine inspection"
    - drivable_state: "still driving it scared / parked at home / stranded — determines tow advice"
    - vehicle_location: "home / roadside / work — logistics for getting it in safely"
  confusables:
    - vs: a_named_symptom_plus_passing_safety_question
      discriminator_question: "Is there one specific thing (a light, a noise, the brakes) you want checked and you're mostly asking if it's OK to drive — or do you genuinely not feel safe in this car?"
    - vs: breakdown_tow_in
      discriminator_question: "Is the car still drivable but scary, or has it already quit on you?"
  safety_flag: advise_immediately
  notes: "Fear dominating with no nameable symptom, or an outright safety-system failure ('brakes gave out', 'no brake pressure', 'told not to drive it'). Advise immediately: do not drive; arrange a tow. The mirror rule: a NAMED diagnosable symptom with a passing 'is it safe?' stays in that symptom's domain — the safety question alone doesn't override. Cross-domain escalation partner for brakes, steering, fuel-smell, and wheel domains."

- category: situational
  subcategory: breakdown_tow_in
  display: "Broke down / being towed in"
  customer_voice_anchors:
    - "car broke down on 78, getting it towed to you"
    - "died on the highway and wont start back up, can i have it towed there"
    - "im stranded at work and the car wont do anything"
    - "tow truck is bringing my car in, no idea whats wrong"
    - "TOW IN"
    - "broke down this morning, aaa is dropping it at your shop"
    - "can i drop it after hours? it barely made it home"
    - "car quit on me at a light, had to push it off the road"
    - "its on the flatbed now, heads up its coming to you"
  required_slots:
    - stranded_now: "actively stranded vs car already home/at the shop — immediate advice vs intake"
    - symptom_at_failure: "what it did when it quit (died, overheated, loud bang, lost power) — seeds the diagnostic domain candidates"
    - tow_arranged: "AAA/roadside on the way vs needs the shop's tow referral"
    - keys_dropoff: "after-hours drop logistics — advisor handles"
  confusables:
    - vs: wont_start_at_home
      discriminator_question: "Did it quit while driving, or is it at home and just won't start?"
    - vs: died_while_driving
      discriminator_question: "Can you describe what happened when it quit (lights, noises, smoke)? If so we can book that specific diagnosis."
    - vs: safety_concern_not_safe_to_drive
      discriminator_question: "Has it already quit, or is it running but you're afraid to drive it?"
  safety_flag: advise_immediately
  notes: "Tow-in ALONE (no describable symptom) is an advisor intake — never guess a service. Tow-in PLUS a specific symptom routes the symptom ('towed in, doesn't shift' = transmission; the tow is how it arrived, not the concern). Advise immediately when the customer is stranded NOW — human contact beats a wizard flow. Cross-domain confusable with no_start and electrical died-while-driving entries."

# ---------------------------------------------------------------------------
# RESERVED CATEGORY: general_diagnostic — broad triage. Also the classifier's
# fallback when no domain category clears the confidence gate.
# ---------------------------------------------------------------------------

- category: general_diagnostic
  subcategory: vague_concern_needs_triage
  display: "Something's wrong — needs triage"
  customer_voice_anchors:
    - "car feels weird"
    - "somethings off with my car lately"
    - "its just not driving right"
    - "the car is acting up again"
    - "doesnt feel like it used to"
    - "runs funny"
    - "something aint right but i cant explain it"
    - "my car is doing a thing"
    - "feels off at times, hard to describe"
    - "not sure, it just seems wrong somehow"
    - "been acting funny since last week"
    - "somethings up with it, you guys will figure it out"
  required_slots:
    - sensory_channel: "the FIRST triage question: is it something you feel, hear, smell, see (light/leak), or how it drives?"
    - when_noticed: "when it started / how often — narrows candidates"
    - driving_conditions: "at speed / at idle / braking / turning / cold start — the second triage cut"
    - drivable_state: "still comfortable driving it? escalates if not"
  confusables:
    - vs: general_checkup
      discriminator_question: "Is something actually wrong (even if hard to describe), or is nothing wrong and you want it looked over?"
    - vs: multiple_symptoms
      discriminator_question: "Is it one hard-to-describe thing, or several problems you can name?"
    - vs: every_symptom_domain
      discriminator_question: "Would you say it's more a sound, a feeling, a smell, or something you see? (first chip of the triage flow)"
  safety_flag: none
  notes: "RESERVED-CATEGORY DEFINITION: general_diagnostic exists for (a) genuinely vague utterances like these and (b) the classifier FALLBACK — any input where no domain category clears the embedding/LLM confidence threshold must land here rather than a low-confidence guess. The booking flow should run broad triage chips (feel/noise/smell/light/when) instead of guessing. The moment a triage answer names a channel, the matching symptom domain takes over. 'Weird noise up front' is NOT this entry — a noise word routes to the noise domain's triage."

- category: general_diagnostic
  subcategory: intermittent_issue_cant_reproduce
  display: "Intermittent problem — comes and goes"
  customer_voice_anchors:
    - "it only does it sometimes, of course it wont do it now"
    - "makes the noise maybe once a week"
    - "problem comes and goes, never when a mechanic is around"
    - "acts up whenever it feels like it — couldnt make it happen at the dealership"
    - "only does it first thing in the morning then its fine all day"
    - "randomly it will just do it, no pattern i can find"
    - "happened twice last month and its been fine since"
    - "i took a video of it doing it because it never acts up at the shop"
    - "every now and then it does this thing, cant predict it"
  required_slots:
    - symptom_when_present: "what actually happens when it acts up — if nameable, THAT domain owns routing and intermittency becomes a fact"
    - frequency_pattern: "how often / any trigger (cold, rain, warm engine, rough road) — reproduction plan"
    - evidence_available: "video/audio/witness — hugely valuable for intermittents, ask for it"
  confusables:
    - vs: the_underlying_symptom_domain
      discriminator_question: "When it does act up, what exactly does it do? (the answer routes it — intermittency is a fact, not a category)"
    - vs: vague_concern_needs_triage
      discriminator_question: "When it happens, can you describe it — or is it vague even in the moment?"
  safety_flag: none
  notes: "Mostly a triage aid: a nameable intermittent symptom belongs to its symptom domain with frequency/conditions carried as facts. This entry catches the framing where the INTERMITTENCY dominates the utterance and no symptom is named. Encourage evidence capture (video of the noise/behavior) — standard advice for can't-reproduce complaints."

# ---------------------------------------------------------------------------
# RESERVED CATEGORY: out_of_scope — not a car-repair concern. Routes to a
# friendly re-prompt / front office / referral, NEVER to a diagnostic category
# and NEVER to a guessed service.
# ---------------------------------------------------------------------------

- category: out_of_scope
  subcategory: booking_logistics
  display: "Appointment / logistics question"
  customer_voice_anchors:
    - "need to reschedule my appointment from friday"
    - "what time do you close today"
    - "do you take walk ins"
    - "is my car ready yet"
    - "can i pay over the phone and pick up after hours"
    - "do you have loaner cars"
    - "how long will it take"
    - "running late for my 10 oclock, sorry"
    - "do i need an appointment or can i just come by"
    - "wheres my invoice from last week"
    - "can you email me the estimate"
  required_slots:
    - logistics_intent: "reschedule / cancel / status / hours / payment / dropoff — front-office routing"
    - existing_appointment: "references a booked visit vs a general question"
  confusables:
    - vs: estimate_quote_request
      discriminator_question: "A price for a specific job on your car, or a general question about the shop?"
    - vs: approve_recommended_work
      discriminator_question: "Booking work we already recommended, or managing an existing appointment?"
  safety_flag: none
  notes: "RESERVED out_of_scope member: not a vehicle concern. Hand to the booking/FAQ flow or front office. Never extract concern facts from booking language ('do we need an appointment', 'give me a call') — those are logistics, not symptoms or request types."

- category: out_of_scope
