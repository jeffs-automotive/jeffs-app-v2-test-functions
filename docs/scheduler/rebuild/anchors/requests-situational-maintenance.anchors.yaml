  confusables:
    - vs: booking_logistics
      discriminator_question: "A question about your car or an appointment, or about the business itself?"
  safety_flag: none
  notes: "RESERVED out_of_scope member: employment, vendor, sponsorship, and buy/sell-a-car inquiries. Route to the front office with a friendly note; never to a service category."

- category: out_of_scope
  subcategory: services_not_offered
  display: "Service this shop doesn't offer (referral)"
  customer_voice_anchors:
    - "need my bumper repainted"
    - "got a dent i want pulled out"
    - "windshield is cracked, do you replace glass"
    - "looking for an interior detail and shampoo"
