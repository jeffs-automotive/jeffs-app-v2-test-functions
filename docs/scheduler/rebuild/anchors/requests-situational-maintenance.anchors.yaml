  notes: "RESERVED out_of_scope member. Default not-offered list for a general repair shop: collision/body/paint, glass replacement, detailing, upholstery, wraps/tint, and customization — SHOP-CONFIGURABLE (some general shops do exhaust or lift work; keep the list in config, not code). Always split mixed messages: refer the cosmetic half, book the mechanical half (usually via after_accident_or_impact)."

- category: out_of_scope
  subcategory: not_a_vehicle_issue
  display: "Not about a vehicle"
  customer_voice_anchors:
