- category: request
  subcategory: diagnostic_scan_request
  display: "Diagnostic scan / read codes"
  customer_voice_anchors:
    - "can you just scan it"
    - "read the codes for me"
    - "hook it up to the computer"
    - "i want a full diagnostic run"
    - "just want to know whats wrong, run the scanner"
    - "my code reader said P0420, can you confirm"
    - "full diagnostic please"
    - "check what codes are stored"
    - "scan it — the light was on last week but went off"
    - "put it on the machine and tell me whats up"
  required_slots:
    - light_state: "check-engine light ON now / was on, went off / never on — a lit CEL belongs to the warning_light domain"
    - codes_already_known: "customer-scanned codes in hand — capture them; they seed the diagnosis"
    - goal: "diagnose-and-fix here vs information-only ('I'll fix it myself') — advisor policy on diag-fee application"
  confusables:
    - vs: check_engine_light
      discriminator_question: "Is the check engine light on right now? Then let's book it as a check-engine diagnosis."
