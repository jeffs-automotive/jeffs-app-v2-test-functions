system: wheels-tires-tpms-bearings
# Typed change-ops binding this dossier's findings to the live snapshot (00-current-scheduler-taxonomy.md),
# verified against the DB 2026-07-18 (project itzdasxobllfiuolmbxu). Two structural gaps drive these ops:
#   (1) tire_repair / tpms_testing / suspension_steering_check ALL have empty example_keywords[] -> L1.
#   (2) THE TIRE-BUYING GAP (just_want_new_tires / dry_rot / worn-out) has no bookable service -> catalog.
# Stage-2 enrichment is otherwise strong -> NO stage2.description.revise ops (avoid regression; the one
# real description bug -- tpms desc references a non-existent slug -- is flagged in dossier §8 for Chris,
# not auto-revised). L5 AUDITS the required_facts[] gaps on REAL question IDs (esp. humming_or_whirring_at_speed,
# all 7 empty) and RECONCILES with the same-day Workstream-Q maps (binding/required-facts-map.q2.md/q3.md):
# the mapper is presence-only, so every candidate tag is a wrongful-skip risk -> ZERO required_facts.set ops;
# all deferred to intentionally_empty with the map's reason, plus the steering_load_effect slot proposal.

ops:
  # ============================================================
  # L1 — Stage-1 keywords. ALL THREE services are keyword-blind today. Multi-token / domain only.
  # ============================================================
  # --- tire_repair (concern_categories: [tires]) ---
  - op: stage1.keyword.add
    category_key: tire_repair
    phrase: "nail in my tire"
    rationale: "Canonical repairable-puncture phrase; tire_repair has ZERO keywords today."
    evidence: "DB positive pattern; USTMA puncture-repair scope"
  - op: stage1.keyword.add
    category_key: tire_repair
    phrase: "screw in my tire"
    rationale: "High-frequency puncture object; verbatim customer voice."
    evidence: "eval tpms_testing-001 ('screw sticking out')"
  - op: stage1.keyword.add
    category_key: tire_repair
    phrase: "tire keeps losing air"
    rationale: "Slow-leak lead phrase (FM-3.2); air-loss framing."
    evidence: "tka-056 'LOOSING AIR PSI'; tkc-217"
  - op: stage1.keyword.add
    category_key: tire_repair
    phrase: "slow leak in my tire"
    rationale: "2-token slow-leak phrase, unambiguously tire_repair."
    evidence: "tkc-010 'Lf tire slow leak'"
  - op: stage1.keyword.add
    category_key: tire_repair
    phrase: "tire going flat"
    rationale: "Going-flat framing; distinguishes physical tire from TPMS-light-only."
    evidence: "tkc-010, tka-056"
  # NOTE: "patch and plug" was intentionally DROPPED — it is the shop's name for the repair
  # (service display_name), not customer voice, and had no corpus occurrence or cited misroute
  # (fails the consolidation-lint bar for keywords, which requires a corpus hit or a real misroute).
  # --- tpms_testing (concern_categories: [warning_light, tires]) ---
  - op: stage1.keyword.add
    category_key: tpms_testing
    phrase: "TPMS light"
    rationale: "The canonical TPMS trigger; tpms_testing has ZERO keywords today. Domain token."
    evidence: "tkc-018, tka-088"
  - op: stage1.keyword.add
    category_key: tpms_testing
    phrase: "tire pressure light"
    rationale: "Most common lay name for the TPMS telltale."
    evidence: "tkc-137, eval tpms_testing-003"
  - op: stage1.keyword.add
    category_key: tpms_testing
    phrase: "low tire pressure warning"
    rationale: "Warning-led framing; routes to the light path not the physical-tire path."
    evidence: "eval tpms_testing-003"
  - op: stage1.keyword.add
    category_key: tpms_testing
    phrase: "tire pressure sensor not reading"
    rationale: "TPMS system-fault phrasing (dead/offline sensor)."
    evidence: "tkc-076 'sensor not reading/offline'"
  - op: stage1.keyword.add
    category_key: tpms_testing
    phrase: "horseshoe light"
    rationale: "Shape-based customer name for the amber TPMS icon."
    evidence: "DB synonym 'horseshoe icon'; FMVSS 138 telltale shape"
  # --- suspension_steering_check (concern_categories: [noise, steering, pulling, vibration]) ---
  #     Only the WHEEL/BALANCE/BEARING-flavored keys here (this dossier's focus). Suspension-ride and
  #     driveline keys are owned by their dossiers; flagged to avoid collision.
  - op: stage1.keyword.add
    category_key: suspension_steering_check
    phrase: "shimmy at highway speed"
    rationale: "Balance-imbalance shimmy (FM-3.9); service is keyword-blind."
    evidence: "tkc-052 'SHIMMY AT HIGHWAY SPEEDS', tka-196"
  - op: stage1.keyword.add
    category_key: suspension_steering_check
    phrase: "steering wheel shakes at highway speed"
    rationale: "Highest-frequency balance phrase; disambiguates from brake-only shake at Stage-1."
    evidence: "tka-196, tkc-290"
  - op: stage1.keyword.add
    category_key: suspension_steering_check
    phrase: "wheel bearing hum"
    rationale: "Bearing hum (FM-3.11); domain phrase. SHARED surface with driveline dossier — coordinate."
    evidence: "tkc-102 (dealer said wheel bearings), tkc-113"
  - op: stage1.keyword.add
    category_key: suspension_steering_check
    phrase: "humming that gets louder with speed"
    rationale: "Road-speed-rising hum, the bearing/tire-roar cue."
    evidence: "tkc-113 '30 to 40 mph', DB positive"
  - op: stage1.keyword.add
    category_key: suspension_steering_check
    phrase: "vibration at all speeds"
    rationale: "Out-of-round constant tremor (FM-3.10); separates from band-limited shimmy."
    evidence: "tkc-032 'SHAKING AT ALL SPEEDS'"

  # ============================================================
  # L1 — Stage-1 hedges (confusable pairs). THE REQUIRED TRIPLE FIRST.
  # ============================================================
  - op: stage1.hedge.add
    category_a: tire_repair
    category_b: tpms_testing
    rule: "Physical tire evidence the customer can SEE or feel (nail/screw/bulge/cut, a tire that is low or going flat) -> tire_repair. A dashboard TPMS/low-pressure LIGHT as the customer's lead clue, with no confirmed low or damaged tire -> tpms_testing. If a nail/flat AND the light are both stated, the physical damage wins (tire_repair) and the light is corroborating. NOTE: the eval corpus mislabels a visible screw as tpms_testing (tpms_testing-001) — a named object must route to tire_repair."
    discriminating_fact: tire_state   # visible_damage/flat/low_pressure -> tire_repair; normal_or_unknown + TPMS light -> tpms_testing
  - op: stage1.hedge.add
    category_a: tire_repair
    category_b: suspension_steering_check
    rule: "A tire problem (puncture, leak, visible damage) -> tire_repair. A wheel-DYNAMICS problem (vibration/shimmy at speed, wheel-bearing hum, a pull) -> suspension_steering_check. The split is 'the tire itself' vs 'how the wheel spins/rides'."
    discriminating_fact: tire_state   # present -> tire_repair; absent + noise/vibration cue -> suspension_steering_check
  - op: stage1.hedge.add
    category_a: tpms_testing
    category_b: suspension_steering_check
    rule: "A TPMS/low-pressure warning LIGHT -> tpms_testing. A balance shimmy or bearing hum with NO tire-pressure light -> suspension_steering_check. A TPMS light plus an unrelated vibration is two concerns — lead with the customer's primary framing and hedge."
    discriminating_fact: warning_light_named   # TPMS -> tpms_testing; null + vibration/noise -> suspension_steering_check
  - op: stage1.hedge.add
    category_a: suspension_steering_check
    category_b: brake_inspection
    rule: "Steering-wheel shake at a steady HIGHWAY speed with the foot OFF the brake -> suspension_steering_check (wheel balance). Shake/pulsation ONLY while pressing the brake pedal -> brake_inspection. The corpus files balance shimmy under 'CHECK BRAKES' (tkc-290) — do not let the customer's brake guess override an explicit speed-triggered, non-braking shake."
    discriminating_fact: onset_timing   # when_braking -> brakes; highway/specific_mph without brake -> balance
  # NOTE: the tire_repair-vs-tire-buying boundary is NOT expressed as a stage1.hedge.add — a hedge's two
  # keys must both be valid Stage-1 keys (a testing_services.service_key or one of the 6 'other' situational
  # slugs, per taxonomy §1/§3b), and `just_want_new_tires` is a tires-category SUBCATEGORY slug, not a
  # Stage-1 key. The boundary is a Stage-1 ACCEPT-vs-REJECT (does tire_repair fire, or is there no service ->
  # empty Stage-1 -> advisor), already carried by: (a) the live `tire_repair` service description ("NOT
  # worn/dry-rot/new-tire requests (no fit -> advisor quote)"), (b) catalog.service.propose
  # (tire_sales_consultation, below), and (c) the Stage-2 negatives below. One reinforcing Stage-2 negative
  # is added so a "worn-out/just-want-new" phrasing on a repairable subcat routes to the tire-buying bucket.

