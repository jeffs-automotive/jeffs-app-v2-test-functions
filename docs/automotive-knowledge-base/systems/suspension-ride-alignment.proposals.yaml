  - text: "my tires are wearing on the inside edge of the front, want the alignment checked"
    tags: [request_plus_symptom, taxonomy_gap]
    expected:
      # uneven_tire_wear_bald_spots is a `tires`-pool slug; suspension_steering_check.concern_categories =
