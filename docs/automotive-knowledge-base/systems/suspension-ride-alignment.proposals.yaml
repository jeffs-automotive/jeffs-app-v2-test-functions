  # --- INFERENCE TRAP: situational-override + strict literalness ---
  # Tempts a suspension/clunk pick and tempts inventing noise/location/damage the
  # customer never stated. Correct route is the recent-impact situational bucket,
  # and Stage-3 must extract ONLY the two facts literally present.
  - text: "hit a really bad pothole yesterday and now the front end feels off, no noises or warning lights, just want someone to make sure nothing got bent"
    tags: [inference_trap, situational_override]
    expected:
      stage1_category_key: after_a_recent_accident_or_impact
      stage1_acceptable: [after_a_recent_accident_or_impact, suspension_steering_check]
      stage2_subcategory_slug: null
      # "yesterday" -> days_ago (the closest enum); NOT today. Extractor: 'started today' -> today, 'a few days' -> days_ago.
      stage3_facts: { recent_action: hit_pothole_or_curb, started_when: days_ago }
      route: advisor
    trap_note: "Do NOT set noise_descriptor (none stated), location_side/axle (only 'front end' vague), tire_state, or pull_direction. 'feels off' is not a fact, and 'yesterday' is days_ago not today. The pothole + 'make sure nothing is bent' triggers the recent-impact situational override."

