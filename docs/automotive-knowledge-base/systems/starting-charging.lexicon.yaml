system: starting-charging
# phrase -> normalized -> routes_to[] (subcategory slug) -> ambiguity -> provenance
# ambiguity: unambiguous | needs-fact:<slot> | cross-system:<service_key>
#   cross-system referents are testing-service KEYS (one consistent referent type for Wave C
#   aggregation) — e.g. no_start_testing, battery_test, check_engine_light_testing — NOT subcategory
#   slugs. Entries with routes_to: [] rely on this field for their route.
# provenance: tekmetric | nhtsa | forum-paraphrase | synthetic
entries:
  # ---- wont_crank_just_clicks -------------------------------------------------
  - phrase: "turn the key and all i get is click click click, wont turn over"
    normalized: rapid clicking, engine does not rotate
    routes_to: [wont_crank_just_clicks]
    ambiguity: unambiguous
    provenance: synthetic
  - phrase: "every time I turn the ignition I just hear one click nothing else"
    normalized: single click, no crank (starter/severe-resistance cue)
    routes_to: [wont_crank_just_clicks]
    ambiguity: needs-fact:lights_state
    provenance: forum-paraphrase
  - phrase: "i got a bunch of click click clicks, got a jump and it started, drove around to charge it, shut it off and right away all i got were clicks again"
    normalized: rapid clicking, dead-battery signature, jump recovers only briefly
    routes_to: [wont_crank_just_clicks]
    ambiguity: unambiguous
    provenance: forum-paraphrase
  - phrase: "Jeep does not start on initial push, only on secondary push"
    normalized: intermittent no-crank on push-button start
    routes_to: [wont_crank_just_clicks]
    ambiguity: needs-fact:engine_running
    provenance: tekmetric
  - phrase: "when i turn the key nothing happens, no clicking no cranking, interior lights dim and go off but the battery light stays on"
    normalized: silent no-crank, lights collapse (dead battery / open connection)
    routes_to: [wont_crank_just_clicks]
    ambiguity: needs-fact:engine_running   # this is no_sound_at_all, not clicking (§3.10)
    provenance: forum-paraphrase
  - phrase: "usually only in the morning i hear a single click after i turn the key then nothing, it starts after a few tries"
    normalized: intermittent single-click no-crank, cold mornings
    routes_to: [wont_crank_just_clicks]
    ambiguity: needs-fact:lights_state
    provenance: forum-paraphrase
  - phrase: "one click from the starter and nothing else, i cleaned the grounds and terminals and the battery reads 12.6 volts"
    normalized: single click, good battery → starter / high-resistance (§3.2)
    routes_to: [wont_crank_just_clicks]
    ambiguity: unambiguous
    provenance: forum-paraphrase
  - phrase: "grinding noise when i go to start it, like the gears wont catch"
    normalized: starter pinion/flywheel grind on start (§3.12)
    routes_to: [wont_crank_just_clicks]
    ambiguity: unambiguous   # grind explicitly tied to the START attempt -> ours, not the noise router
    provenance: synthetic
