  # ==================================================================
  # stage1.hedge  (115)
  # ==================================================================
  "stage1.hedge":
    # source: router-leaks
    - op: stage1.hedge.add
      category_a: oil_leak_testing
      category_b: coolant_leak_testing
      rule: >
        A dark-brown/black greasy puddle with a petroleum or burnt-oil smell is engine oil (oil_leak_testing); a bright
        green/orange/yellow/pink puddle that smells sweet is coolant (coolant_leak_testing). Do not let the bare word "leak"
        pick either — require a color or smell cue.
      discriminating_fact: >-
        fluid_color (brown_or_black vs green_or_orange_or_yellow_or_pink) + smell_descriptor (burnt_oil vs
        sweet_or_maple_syrup)
    # source: router-leaks
    - op: stage1.hedge.add
      category_a: oil_leak_testing
      category_b: brake_inspection
      rule: >
        SAFETY. Fresh clean engine oil AND brake fluid are both amber/light-brown, so amber ALONE is ambiguous. A slick amber
        drip near a WHEEL with a soft/low/sinking pedal is brake fluid (brake_inspection,
        clear_yellow_or_light_brown_puddle_brake_fluid) — treat as urgent; an amber/dark drip under the engine up front with a
        normal pedal is engine oil (oil_leak_testing). Never upgrade a bare "amber" to a confident engine-oil pick.
      discriminating_fact: fluid_under_car_location (under_a_wheel vs under_engine_front) + pedal_feel (soft/sinks vs normal)
    # source: router-leaks
    - op: stage1.hedge.add
      category_a: coolant_leak_testing
      category_b: ac_leak_testing
      rule: >
        A bright-colored puddle that smells sweet is coolant (coolant_leak_testing); a truly clear, odorless, watery puddle
        under the mid/passenger side after the A/C has run is normal A/C condensation
        (clear_odorless_puddle_water_or_ac_condensation) and is usually NOT a fault — reject unless water is pooling INSIDE
        the cabin.
      discriminating_fact: fluid_color (green_or_orange_or_yellow_or_pink vs clear_no_color) + smell_descriptor (sweet_or_maple_syrup vs none)
    # source: router-leaks
    - op: stage1.hedge.add
      category_a: oil_leak_testing
      category_b: transmission_testing
      rule: >
        A dark-brown/black greasy puddle under the engine/front is engine oil (oil_leak_testing); a bright-red thinner oily
        puddle toward the middle/rear is transmission fluid (red_or_pink_puddle_transmission_or_power_steering,
        transmission_testing). Color + location split them.
      discriminating_fact: fluid_color (brown_or_black vs red_or_pink) + fluid_under_car_location (under_engine_front vs under_middle/under_rear)
    # source: router-leaks
    - op: stage1.hedge.add
      category_a: coolant_leak_testing
      category_b: power_steering_eps_testing
      rule: >
        Pink is a trap — many long-life coolants (Dex-Cool, Toyota SLLC) are pink/red like PS fluid. Watery bright-neon +
        sweet smell + overheating/temp-gauge-hot is coolant (coolant_leak_testing); oily red up front WITH heavy or whining
        steering is power-steering fluid (power_steering_eps_testing). Color alone does not settle it.
      discriminating_fact: >-
        smell_descriptor (sweet_or_maple_syrup) + steering_feel (heavy_or_hard_to_turn) + fluid_under_car_location
        (under_engine_front)
    # source: router-leaks
    - op: stage1.hedge.add
      category_a: oil_leak_testing
      category_b: exhaust_system_testing
      rule: >
        Cross-ref router-smoke-smells. Liquid oil on the ground or oil residue on the manifold (burnt-oil smell, often NO
        ground puddle) is oil_leak_testing; a louder exhaust with a ticking/tapping and no fluid is an exhaust breach
        (exhaust_system_testing). When no puddle exists, this is a smoke/smell decision — defer to router-smoke-smells.
      discriminating_fact: smell_descriptor (burnt_oil + oil residue) vs noise_descriptor (ticking_or_tapping + louder exhaust, no fluid)
    # source: router-no-start-power
    - op: stage1.hedge.add
      category_a: charging_starting_testing
      category_b: no_start_testing
      rule: >
        Split on what happens when the customer turns the key / presses start (engine_running). If the engine ROTATES at
        normal speed but never fires (engine_running=wont_start) -> no_start_testing (fuel/spark/crank-cam). If the engine
        does NOT rotate, rotates SLOWLY, is dead, only clicks, makes NO sound, dies-while-driving with electrical precursors,
        or shows dim lights / a battery light (engine_running in {wont_crank_just_clicks, slow_crank, no_sound_at_all,
        died_while_driving}) -> charging_starting_testing. When the customer says only "won't start / no start / dead" with NO
        crank detail, engine_running=null -> offer BOTH as clarify chips.
      discriminating_fact: engine_running
      consolidates: starting-charging.proposals.yaml stage1.hedge.add (charging_starting_testing <-> no_start_testing)
    # source: router-no-start-power
    - op: stage1.hedge.add
      category_a: charging_starting_testing
      category_b: no_start_testing
      rule: >
        SECURITY / IMMOBILIZER override. If the customer names a SECURITY / anti-theft / theft / KEY light
        (warning_light_named ~ security|anti-theft|theft|key), especially flashing, AND the battery is otherwise fine
        (lights_state=normal, no jump needed) -> this is an immobilizer no-start, route no_start_testing (interim; Stage-2
        body-glass FM-7 -> key_or_fob_not_recognized_wont_start), NOT a battery no-start. If the battery state is unstated,
        keep charging_starting_testing as a clarify chip. A named security light + a normally-charged battery is NEVER a dead
        battery.
      discriminating_fact: warning_light_named
    # source: router-no-start-power
    - op: stage1.hedge.add
      category_a: charging_starting_testing
      category_b: check_engine_light_testing
      rule: >
        "Died while driving" splits on the FIRST sign. Dimming lights / a battery-charge light / the dashboard going dark
        BEFORE shutdown (lights_state=dim_or_flickering OR warning_light_named~ battery|charge|alt) ->
        charging_starting_testing (car_died_while_driving_electrical). Engine sputter / stumble / hesitation with NO
        electrical warning -> check_engine_light_testing (stalling_while_driving_under_load). Precursor unstated -> offer
        both.
      discriminating_fact: lights_state
      consolidates: starting-charging.proposals.yaml stage1.hedge.add (charging_starting_testing <-> check_engine_light_testing)
    # source: router-no-start-power
    - op: stage1.hedge.add
      category_a: charging_starting_testing
      category_b: check_engine_light_testing
      rule: >
        HYBRID / EV won't-go-to-READY override. On a LITERALLY stated hybrid/electric vehicle (vehicle_powertrain in {hybrid,
        electric}) that "won't power on / won't go to READY" with no engine crank, check the 12 V AUXILIARY battery FIRST ->
        charging_starting_testing / battery_test. Flip to the HV path (check_engine_light_testing; Stage-2 hybrid-ev
        hybrid_or_ev_wont_power_on / hybrid_system_warning_light) ONLY if a turtle / Check-Hybrid-System / red-triangle /
        hybrid warning is named OR a 12 V jump did NOT fix it. NEVER encode "hybrid + won't start -> HV battery."
      discriminating_fact: recent_action
      consolidates: hybrid-ev-high-voltage.proposals.yaml stage1.hedge.add (charging_starting_testing <-> check_engine_light_testing)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: brake_inspection
      rule: >
        A shake/vibration is BRAKES only when it happens while pressing the brake pedal. A steering-wheel shimmy at a steady
        highway speed (foot off the brake) or a shake/bounce over bumps is SUSPENSION / wheel-balance. Real corpus mislabels
        the highway shimmy as "CHECK BRAKES" — hedge, don't trust the customer's guess.
      discriminating_fact: onset_timing=when_braking (brakes) vs speed_band=highway+no-brake / over_bumps (suspension)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: exhaust_system_testing
      category_b: check_engine_light_testing
      rule: >
        A tick/tap that is loudest at cold start and FADES or disappears once the engine is fully warm is an exhaust-manifold
        leak (exhaust eval). A tick that is still there warm, tracks RPM, "sewing machine" from the top of the engine is
        valvetrain/timing-chain (engine_ticking_or_tapping, reached via CEL / oil-pressure testing). Warm-up behavior is the
        split, not the cold-start onset alone.
      discriminating_fact: warm_up_behavior=quiets_when_warm (manifold) vs persists_warm (valvetrain)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: awd_4x4_testing
      rule: >
        A rhythmic CLICK only when turning (moving, low speed) is a CV joint → suspension_steering_check. A whole-car
        BIND/HOP/shudder in tight turns "like it's stuck in 4x4", or a 4WD/AWD warning message, is AWD/4WD → awd_4x4_testing.
        A hum that changes on-gas-vs-coast is a differential (route awd_4x4_testing on AWD vehicles, else
        suspension_steering_check).
      discriminating_fact: noise_descriptor=popping_or_clicking (CV) vs binds_or_hops_in_turns / warning_light_named=4wd|awd (AWD)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: transmission_testing
      rule: >
        A hum/whine that tracks ROAD speed (same at a given mph in every gear) is driveline (wheel bearing / differential) →
        suspension_steering_check. One that tracks ENGINE RPM and changes when the transmission shifts is transmission →
        transmission_testing. Customers file both under "transmission".
      discriminating_fact: road-speed-tracking (driveline) vs rpm/gear-linked (transmission)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: exhaust_system_testing
      category_b: suspension_steering_check
      rule: >
        A roar/rumble that rises with ENGINE RPM (rev it in park) is exhaust → exhaust_louder_or_rumbling. A roar/hum that
        rises only with ROAD speed and is steering-load sensitive is a wheel bearing/tire → humming_or_whirring_at_speed.
        Also: a can-of-rocks rattle underneath at idle/throttle-blip is an exhaust cat/heat-shield
        (rattling_underneath_the_car); a bump-triggered thump is a suspension clunk.
      discriminating_fact: rises-with-RPM-in-park (exhaust) vs rises-with-road-speed (bearing/tire)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: check_engine_light_testing
      category_b: suspension_steering_check
      rule: >
        A deep, heavy knock from the lower engine that worsens under load (accelerating / uphill) is engine-mechanical →
        deep_knocking_from_the_engine. A hard single clunk triggered by bumps with no engine-load link is suspension →
        clunking_over_bumps. Load-triggered vs bump-triggered is the split.
      discriminating_fact: onset_timing=when_accelerating+noise_descriptor=knocking_deep (engine) vs over_bumps+clunking (suspension)
    # source: router-nvh
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: power_steering_eps_testing
      rule: >
        A whine/groan only when TURNING the wheel (and heavier steering effort) is power steering →
        power_steering_eps_testing. A rhythmic CLICK while rolling through a turn is a CV joint, and a creak/clunk over bumps
        is suspension — both → suspension_steering_check. Turn-noise ≠ PS by default.
      discriminating_fact: noise_descriptor=whining+steering_feel=heavy (PS) vs popping_or_clicking/creaking (suspension/CV)
    # source: router-requests-maintenance
    - op: stage1.hedge.add
      category_a: after_recent_service_or_repair_work
      category_b: check_engine_light_testing
      rule: >-
        Recent shop/part work named as the STATED CAUSE of a symptom that STARTED or PERSISTS ('after service, CEL on';
        'multiple repairs completed STILL misfiring'; 'we replaced rear brakes, client STILL reports squeal') ->
        after_recent_service_or_repair_work FIRST; if a specific testable symptom is ALSO clearly described, return the
        situational key first + the symptom service second (2-candidate clarify). A recent repair mentioned only as BACKSTORY
        to a fresh testable symptom ('Carmax already replaced the strut' before an isolate-the-noise ask) does NOT fire the
        bucket -> route the symptom.
      discriminating_fact: recent_action
    # source: router-requests-maintenance
