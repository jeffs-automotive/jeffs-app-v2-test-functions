        "Died while driving" splits on the FIRST sign: dimming lights / battery light / dashboard going dark before shutdown
        -> charging_starting_testing (car_died_while_driving_electrical); engine sputter/stumble/hesitation with no electrical
        warning -> engine-side (check_engine_light_testing / stalling_while_driving_under_load).
      discriminating_fact: lights_state
    # source: steering-power-steering
    - op: stage1.hedge.add
      category_a: power_steering_eps_testing
      category_b: charging_starting_testing
      rule: >
        A whine/groan is PS only when it occurs specifically ON TURNING and fades when the wheel is straight. A continuous
        whine that rises and falls with engine RPM (present when NOT turning) is a belt/alternator noise ->
        charging_starting_testing / high_pitched_whining_under_the_hood. Do not route a "whine when running" to power
        steering.
      discriminating_fact: onset_timing (when_turning => PS; during_driving/RPM-tied => belt/alternator)
    # source: steering-power-steering
    - op: stage1.hedge.add
      category_a: power_steering_eps_testing
      category_b: suspension_steering_check
      rule: >
        DEPRIORITIZATION HEURISTIC (not an absolute): steering EFFORT / NOISE-on-turn / FLUID / LIGHT lean
        power_steering_eps_testing; steering PLAY, wheel POSITION (off-center), or a directional PULL/WANDER lean
        suspension_steering_check (alignment/linkage). For a steady directional pull, prefer alignment first WHEN effort is
        normal, there is no whine, and no light is set — that profile is overwhelmingly alignment/tire/brake. Caveat: a
        power-assist fault CAN produce a steady pull (unbalanced steering-gear / rotary-valve leakage = "memory steer"/lead;
        EPS torque-sensor or pull-compensation faults), so do NOT hard-exclude PS when the pull is paired with heavy/uneven
        effort, a whine, or a steering light.
      discriminating_fact: >-
        steering_feel + warning_light_named + noise_descriptor (heavy/whine/light present with a pull => keep PS in play;
        normal effort + no whine + no light + steady pull => alignment first)
    # source: steering-power-steering
    - op: stage1.hedge.add
      category_a: power_steering_eps_testing
      category_b: transmission_testing
      rule: >
        A red/pink puddle is shared between the two. Location + accompanying symptom decide the STAGE-1 service:
        fluid_under_car_location=under_engine_front with heavy steering or a whine-on-turn => power_steering_eps_testing;
        fluid_under_car_location=under_middle with slipping/hesitation/harsh shifts => transmission_testing. Both still land
        on the same shared subcategory red_or_pink_puddle_transmission_or_power_steering at stage 2.
      discriminating_fact: fluid_under_car_location (under_engine_front => PS; under_middle => transmission)
    # source: steering-power-steering
    - op: stage1.hedge.add
      category_a: power_steering_eps_testing
      category_b: brake_inspection
      rule: >
        "Pulls when I brake" is a brake fault (pulling_only_when_braking), not steering. Route to brake_inspection when the
        pull is gated on brake application.
      discriminating_fact: onset_timing (when_braking => brakes)
    # source: suspension-ride-alignment
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: brake_inspection
      rule: >-
        Bump-triggered shake/bounce/clunk is suspension; a shudder/pulsation felt while pressing the brake pedal is brakes. If
