        normal:
          - shifts fine
          - shifting is normal
          - no shifting problems
      questions_unlocked:
        - 995
        - 168
        - 1183
        - 1186
      note: >
        Boundary discipline (verifier issue 7): stuck_in_gear and the old wont_shift_out_of_gear collided — 'won't shift out
        of 3rd' and 'won't shift out of gear' are the SAME complaint. Merged into stuck_in_gear. pops_out_of_gear is the
        OPPOSITE failure (won't stay in gear) and never shares a cue. A bare speed cap ('won't go over a certain speed') is
        NOT a literal transmission_behavior cue (could be engine limp / fuel starvation / clogged cat) and was REMOVED from
        stuck_in_gear — that phrase only sets stuck_in_gear when paired with a named mode ('went into limp mode').
        engine_running cannot hold these — it encodes misfire/surge/stall/crank state; mixing shift behavior into it would
        corrupt an engine-state slot and the D1/D2 hedges. Literalness enforced: 'slipping' requires an explicit rev/speed
        split; a bare 'no power' does NOT set it.
