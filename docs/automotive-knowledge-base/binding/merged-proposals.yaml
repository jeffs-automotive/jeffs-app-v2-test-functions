    # source: manual-trans-clutch
    - op: stage2.description.revise
      subcat_slug: low_power_or_wont_accelerate_normally
      text: >-
        ...append: On a MANUAL-transmission car this is most often a slipping CLUTCH — the engine revs up but road speed
        doesn't follow, worst on hills or hard acceleration, often with a burning smell. Distinct from an AUTOMATIC's
        torque-converter/gear slip (no clutch pedal, flare between shifts). If the customer mentions a clutch pedal or a
        manual/stick shift, prefer the clutch reading.
      why: >-
        Current desc mentions 'transmission slipping (engine revs without speed)' generically but gives Stage-2 no
        manual/clutch-vs-auto cue; corpus has verbatim clutch-slip lines landing here.
    # source: starting-charging
    - op: stage2.description.revise
      subcat_slug: hard_to_start_when_cold
      text: >
        After the car has SAT (typically overnight) so the engine is cold, the engine CRANKS AT NORMAL SPEED but takes many
        seconds / several tries to fire, and may run rough for the first minute. Trigger is a COLD engine; it starts fine
        later once warmed up. IMPORTANT: this is a cranks-but-won't-CATCH problem (fuel/spark/cold-enrichment), NOT slow
        cranking. If the customer says the engine turns over SLOWLY ("rrr rrr"), that is slow_crank_sluggish_start (a
        battery/starter issue), not this. If the customer only says "hard to start when cold" without stating crank speed, the
        crank quality is unknown and must be asked.
      why: >-
        Corpus 'hard to start when cold' is routinely conflated with slow-crank; make the literal crank-speed cue decisive
        (§3.8 inference trap).
    # source: steering-power-steering
    - op: stage2.description.revise
      subcat_slug: noise_when_turning_the_steering_wheel
      text: >
        A noise that occurs SPECIFICALLY when the steering wheel is turned — most often a whine, groan, moan, hum, growl,
        creak, squeak, squeal, or pop coming from the engine bay or steering column. Often most noticeable turning
        lock-to-lock at low speed (parking, three-point turns) or when turning while parked with the engine running. Most
        commonly caused by low power-steering fluid, air in the power-steering system, a failing pump, or a worn steering
        shaft / U-joint — OR by a dry strut bearing, which typically produces a creak/squeal on turn with NORMAL steering
        effort (no assist fault). Distinct from popping_or_clicking_when_turning (a sharp CV-joint click only while rolling)
        and from high_pitched_whining_under_the_hood (a continuous RPM-tied whine present even when not turning).
      why: >-
        current DB text already lists whine/groan/moan/hum/growl/creak/pop and column + dry-strut sources; the genuine delta
        is only adding "squeal" (a real corpus phrasing, tka-157) and the explicit "normal steering effort" tell that
        separates a dry-bearing squeal from a pump fault.
    # source: suspension-ride-alignment
    - op: stage2.description.revise
      subcat_slug: clunking_over_bumps
      text: >-
        APPEND to existing description: 'A clunk that is triggered by SHIFTING INTO GEAR, taking off, or lifting off the gas
        (NOT by bumps) is a driveline complaint (U-joint / differential / motor or transmission mount), not suspension — route
        it to the driveline clunk subcategory, not here.'
      why: >-
        Corpus shows shift/throttle clunks ('putting car into drive', 'as I accelerated') contaminating this bump-triggered
        subcategory; onset_timing is the separator.
    # source: suspension-ride-alignment
    - op: stage2.description.revise
      subcat_slug: drift_that_follows_the_roads_slope
      text: >-
        APPEND: 'The definitive test is the flat empty parking lot — crown drift GOES AWAY on flat ground and REVERSES when
        the road tilts the other way; a pull that persists on flat ground is steady_drift_while_cruising instead.'
      why: Encodes the one discriminating test into the description; supports the proposed pull_road_dependence slot.

