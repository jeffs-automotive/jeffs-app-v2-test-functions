    # source: cooling-system
    - op: stage2.description.revise
      subcat_slug: engine_temperature_light
      text: >-
        A red (urgent — overheating now) or blue (cold start; normal) dashboard warning light shaped like a THERMOMETER
        SUBMERGED IN TWO WAVY WAVES of liquid. ALSO route here when the customer's lead symptom is the temperature GAUGE
        reading high / in the red / 'running hot' / 'overheated', or a digital 'HIGH TEMPERATURE' / 'ENGINE HOT' / 'COOLANT
        TEMP' message — even if they did not name a specific light — UNTIL a dedicated overheating subcategory exists. When
        RED, coolant temperature is above safe range: imminent risk of warping the head, blowing a head gasket, or seizing.
        Causes: low coolant (leak or internal burn), a bad pressure/radiator cap that won't hold pressure and boils over,
        stuck thermostat, failed water pump, clogged radiator, dead cooling fan (overheats at idle/in traffic, cools at
        speed), or head-gasket failure. (A gauge that swings or reads dead with NO steam/coolant-loss can instead be a failing
        coolant-temp sensor/sender, not a real overheat.) Often paired with steam from under the hood, a sweet maple-syrup
        smell, or the needle climbing into the red. Pull over and shut off. Distinct from smoke/smoke_from_under_the_hood
        (customer leads with VISIBLE steam) and smell/sweet_smell_maple_syrup_antifreeze (leads with smell). Distinct from
        oil_pressure_light — both red, but oil is a can-with-drip and this is a thermometer-in-waves.
      why: >-
        Interim fix for the §8 NO-FIT: plain-overheat and gauge-in-the-red reports have no home and are force-fit here anyway.
        Makes the force-fit explicit and correct until Chris rules on the new subcategory. Adds the fan idle-vs-speed cue.
    # source: cooling-system
    - op: stage2.description.revise
      subcat_slug: heat_doesnt_work
      text: >-
        Customer says the heater blows cold or room-temperature air, OR heat takes a very long time to warm up, OR heat works
        while moving but goes cold at idle/stops. Common causes: stuck-open thermostat (engine never reaches operating temp —
        temp GAUGE stays low), low coolant from a leak, clogged/failing heater core, or a stuck blend-door actuator. Key tell:
        the temp GAUGE — stays low while driving ⇒ thermostat suspect; gauge normal but cabin cold ⇒ heater core / actuator.
        Distinct from ac_blows_warm_or_hot_air (that's AC making no cool; this is HEAT making no warm) and
        vents_dont_blow_strongly (there airflow VOLUME is weak; here air comes out fine but stays cold). No heat + wet
        passenger carpet + foggy windows ⇒ leaking heater core (still route here). If the PRIMARY report is a temp warning
        light/gauge-in-the-red, route warning_light/engine_temperature_light instead.
      why: >-
        Adds the 'works at speed, cold at idle' pattern (low coolant/airflow) and sharpens the gauge-stays-low thermostat
        discriminator (proposed temperature_gauge_state).
    # source: driveline-cv-diff-awd
    - op: stage2.description.revise
      subcat_slug: popping_or_clicking_when_turning
      text: >
        A repeating pop, click, or clack that happens ONLY while the car is MOVING through a turn — most noticeable at low
        speed in parking lots, U-turns, and tight cornering, and often worse under a little acceleration mid-turn. The rhythm
        speeds up and gets louder the tighter the turn, and is usually one-sided. Classic worn CV (constant-velocity) joint or
        torn CV boot slinging grease (look for grease on the inside of the wheel/tire). Distinct from clunking_over_bumps
        (bump- triggered, not turn-triggered) and from squeaking_or_creaking_over_bumps (a rubbery squeak). KEY BOUNDARY: a
        creak, whine, or pop that occurs when turning the steering wheel while PARKED or stopped is the steering column /
        power-steering system -> steering/noise_when_turning_the_ steering_wheel, NOT this. A bind, hop, or shudder (not a
        discrete click) in tight turns is an AWD/4WD driveline concern -> awd_4x4_testing.
      why: Adds the moving-vs-parked CV/steering boundary and the AWD-bind exclusion (owned confusable pair).
    # source: driveline-cv-diff-awd
    - op: stage2.description.revise
      subcat_slug: humming_or_whirring_at_speed
      text: >
        A steady humming, whirring, droning, growling, or roaring from the wheel/axle area that gets louder the faster you
        drive — usually from ~30-40 mph, intensifying with ROAD speed (not engine RPM). Wheel-bearing cue when it CHANGES with
        steering load (louder turning one way, quieter the other). Differential/gear cue when it is more of a WHINE that
        changes with throttle — rising when you get on the gas, changing or fading when you coast/lift off. Tire cue when it
        stays the same no matter how you steer and the tires are worn/cupped. Distinct from high_pitched_whining_under_
        the_hood (engine-bay, tracks engine RPM) and rattling_underneath_the_car (discrete shake, not a continuous hum).
        Cross-category: a whine that tracks ENGINE rpm / trans shifts, not road speed, belongs to transmission
        (transmission_testing).
      why: Adds bearing(steering-load) vs diff(throttle-load) vs tire vs transmission(rpm) discriminators.
    # source: engine-controls-driveability
    - op: stage2.description.revise
      subcat_slug: low_power_or_wont_accelerate_normally
      text: >-
        Append a sharper transmission-slip boundary: 'If the ENGINE RPM rises higher than normal while the car does NOT gain
        speed (revs flare, car crawls), that is transmission slipping -> route transmission, not engine power loss. This
        subcategory is for the engine BOGGING / not being able to rev / a hard speed or RPM ceiling (limp mode).'
      why: >-
        Corpus repeatedly mislabels transmission slip as 'no power'/'clutch failed'; the current text mentions trans slip only
        in passing. This makes the discriminator explicit.
    # source: engine-controls-driveability
    - op: stage2.description.revise
      subcat_slug: service_engine_soon_or_maintenance_required_light
      text: >-
        Keep existing text; add front matter: 'ROUTE HERE ONLY IF the car drives fine AND the telltale is an UNAMBIGUOUS
        maintenance reminder -- the wrench icon, MAINT REQD, a Honda Maintenance Minder A/B code, or oil-life %. IMPORTANT:
        the bare words SERVICE ENGINE SOON are NOT sufficient on their own -- on GM, Nissan/Infiniti, and older Ford SERVICE
        ENGINE SOON is the CHECK-ENGINE (MIL) legend, i.e. a stored fault. When the customer says only service engine soon (no
        make, or a GM/Nissan vehicle), prefer check_engine_light (scan). Engine-outline icon OR any
        rough-run/misfire/stall/smell -> check_engine_light.'
      why: >-
        The prior revision wrongly treated all SERVICE ENGINE SOON wording as a reminder; on a large slice of the US fleet
        those words ARE the MIL. This encodes the OEM-legend ambiguity so bare-SES + drives-fine does not silently skip a scan
        (verifier fact-error, 2026-07-18).
    # source: engine-mechanical
    - op: stage2.description.revise
      subcat_slug: engine_ticking_or_tapping
      text: >
        Light, rapid tapping/ticking from the TOP of the engine (valvetrain), rate tracking engine speed — "sewing machine",
        "typewriter". Loudest at cold start and/or idle; may quiet slightly as oil pressure builds but typically NEVER fully
        disappears, and often pairs with oil-pressure concerns. Common causes: low/dirty/aerated oil, worn or stuck hydraulic
        lifters, excess valve lash, injector click, or a cold timing-chain/tensioner rattle. KEY BOUNDARY vs
        exhaust_manifold_tick_or_puff: a tick that goes AWAY COMPLETELY once the engine is fully warm (manifold metal expands
        and seals) is an exhaust-manifold leak, NOT valvetrain — route there. Distinct from deep_knocking_from_the_engine
        (deeper, slower, lower-block, load-driven) and from electrical_buzzing (continuous tone, no discrete tap rhythm).
      why: >
        Live text already notes partial quieting and the tick-vs-knock/buzzing distinctions; this adds the two things it does
        NOT carry — the explicit exhaust_manifold complete-quiet BOUNDARY (present only on the manifold subcat's side today)
        and the oil-pressure pairing / cold timing-chain rattle.
    # source: engine-mechanical
    - op: stage2.description.revise
      subcat_slug: deep_knocking_from_the_engine
      text: >
        Deep, heavy, rhythmic hammering from the LOWER engine block — "someone banging inside the engine", slower and more
        forceful than a tick. Louder under load (accelerating, climbing hills) and often paired with an oil-pressure warning.
        Most often connecting-rod- or main-bearing wear (rod knock) from low oil pressure / oil starvation; also piston slap —
        a COLD knock that fades as pistons warm and expand. Typically a DO-NOT-DRIVE warning. Distinct from
        engine_ticking_or_tapping (light, fast, top-of-engine) and from clunking_over_bumps (suspension, bump-triggered not
        load-triggered). Spark-knock/detonation-pinging on low-octane fuel is a lighter metallic rattle — NOT this deep
        bottom-end knock.
      why: >
        Live text lacks the piston-slap (cold-fades) variant; adds it. The load-vs-bump discriminator is already in the live
        text and is retained, not claimed as new; the pinging boundary is restated to match the live negative example that
        already pushes 'pinging on cheap gas' out.
    # source: exhaust-emissions
    - op: stage2.description.revise
      subcat_slug: exhaust_manifold_tick_or_puff
      text: >
        (APPEND one clause to the existing description) — Discriminator vs valvetrain tick: an exhaust-manifold tick is
        present at COLD START and FADES or disappears once the engine reaches operating temperature (the cast manifold expands
        and reseals); a valvetrain tick (noise/engine_ticking_or_tapping) persists when warm and often pairs with oil-pressure
        concerns.
      why: Encodes the single best FM-1-vs-valvetrain discriminator (charter confusable pair
    # source: exhaust-emissions
    - op: stage2.description.revise
      subcat_slug: exhaust_louder_or_rumbling
      text: >
        (APPEND one clause) — If the deep rumble/roar rises and falls with ENGINE RPM (rev in park), it is exhaust; if it
        rises only with ROAD SPEED and is steady when revving in park, it is a wheel-bearing/tire roar ->
        suspension_steering_check, not exhaust.
      why: Adds the exhaust-vs-bearing RPM/speed discriminator the current description lacks.
    # source: hvac-climate
    - op: stage2.description.revise
      subcat_slug: clear_odorless_puddle_water_or_ac_condensation
      text: >-
        Clear, odorless, colorless water — the customer says it looks and feels like plain water, dries quickly, no sweet or
        oily quality. A puddle UNDER the car (mid/passenger area) after running the A/C is normal evaporator condensation
        drainage. ALSO route here when the customer reports clear odorless water INSIDE the cabin — dripping onto the
        passenger/driver floor or a soaked carpet that appears when the A/C runs — which is a clogged or misrouted evaporator
        drain (a real repair), UNTIL a dedicated hvac/water_leaking_inside_cabin_ac_on subcategory exists. Distinct from
        green/orange/pink coolant (bright + sweet => green_orange_yellow_or_pink_puddle_coolant) and from red transmission/PS
        fluid. Key tell: clear + odorless + watery, tied to A/C use.
      why: >-
        Interim fix for the §8 weak-fit: inside-cabin AC water has no clean home and the fluid_under_car_location slot only
        models under-vehicle positions. Makes the force-fit explicit until Chris rules on the new subcategory. Adds the
        tied-to-AC tell.
    # source: hvac-climate
    - op: stage2.description.revise
      subcat_slug: ac_is_weak_not_cold_enough
      text: >-
        Customer says the AC IS cooling, just not as cold as it used to be or not cold enough for the weather — 'lukewarm',
        'barely cool', 'cools on the highway but warms at stoplights', 'cold on cool days, useless on hot days'. The
        cold-for-15-20-min-then-warm cycling is a classic low-charge evaporator-freeze pattern. Common causes: slow
        refrigerant leak (partial charge), clogged cabin filter, dirty condenser, weak cooling fan. Distinct from
        ac_blows_warm_or_hot_air (ZERO cooling) and vents_dont_blow_strongly (airflow VOLUME weak; here air is cool but
        inadequate). NOTE ON SERVICE ROUTING: if the customer signals a repeating refrigerant leak (recharged before and lost
        cold again, 'keeps needing freon', dye added), the SERVICE is ac_leak_testing though this symptom subcategory still
        applies.
      why: >-
        Adds the leak-recurrence service note (pair #2 hedge) and keeps the evaporator-freeze cycling pattern explicit,
        without changing the existing boundary language.
    # source: hybrid-ev-high-voltage
    - op: stage2.description.revise
      subcat_slug: low_power_or_wont_accelerate_normally
      text: >
        The engine/vehicle lacks normal power -- hesitates, bogs, or won't accelerate as it should, especially under load or
        uphill. For a GASOLINE/DIESEL vehicle this is fuel delivery, a clogged catalytic converter, a boost/turbo fault, or
        ignition. IMPORTANT: if the customer states the vehicle is a HYBRID or ELECTRIC, or names a TURTLE / reduced-power /
        "check hybrid system" warning, this is a high-voltage reduced-power / limp ("turtle") derate, NOT an ICE fuel/turbo
        problem -- route to the hybrid/EV reduced-power path. Never infer hybrid/EV from make or model; require an explicit
        "hybrid"/"electric" statement or an HV/turtle warning. "Reduced power" wording alone, with no stated powertrain and no
        HV icon, STAYS here (ICE cars also enter reduced-power/limp).
      why: >-
        The reduced-power wording is word-for-word identical across ICE and electrified causes and both route to
        check_engine_light_testing at Stage-1; make the vehicle_powertrain / turtle cue the decisive Stage-2 signal (§5/§7).
    # source: hybrid-ev-high-voltage
    - op: stage2.description.revise
      subcat_slug: pulsating_or_vibrating_pedal
      text: >
        [APPEND to the existing description -- do NOT replace; current DB text was not retrievable this run.] Also the interim
        home for a REGEN-braking feel change on a STATED hybrid/EV: brakes feel grabby / different / "let go then grab," worse
        when cold or with a full battery, with NO grinding or squeal and NO speed-linked shudder. That is a regen/friction
        blending effect (the car shifts braking to the friction brakes when regen is limited), NOT a warped-rotor pulsation.
        Regen feel has no dedicated subcategory yet, so it stays here with this note.
      why: >-
        Regen feel on a stated hybrid/EV currently mis-reads as warped-rotor pulsation; give it an explicit in-slug note + a
        positive example instead of a self-referential negative (§3.4/§8).
    # source: ignition-misfire
    - op: stage2.description.revise
      subcat_slug: engine_misfire_or_bucking_feeling
      text: >-
        A JERKY, BUCKING, KICKING, or skip-a-beat feeling — the car jerks then catches, repeatedly, like it's skipping or
        running on fewer cylinders. Worst under load: acceleration, climbing hills, merging, in wet weather, or at certain
        RPMs. Often paired with a check engine light; a FLASHING/blinking light means a severe active misfire that damages the
        catalytic converter — reduce power and get it towed. Caused when a cylinder fails to fire: worn/fouled spark plug,
        failing ignition coil, cracked plug boot/wire (worse when wet), leaking injector, vacuum leak, or low compression.
        Distinct from hesitation_or_lag_when_accelerating (a SMOOTH one-time pause, not repeated jerks), from
        surging_or_rpms_going_up_and_down (smooth RPM oscillation, no violent jerk), from rough_idle_or_shaking_at_a_stop
        (rough only while stopped, not bucking under way), and from shaking_at_idle_while_stopped (whole car shakes but the
        ENGINE sounds normal — that's motor mounts).
      why: >-
        Adds the wet-weather (boot/wire) cause, the flashing-MIL safety line, and an explicit mount-shake exclusion — the two
        required confusable pairs.
    # source: ignition-misfire
    - op: stage2.description.revise
      subcat_slug: rough_idle_or_shaking_at_a_stop
      text: >-
        The ENGINE runs rough, uneven, or sputtery while the car is stopped or idling in park/drive — RPM needle bounces, the
        note sounds choppy, and shudder comes through the wheel/seat but smooths out once moving. Often a misfiring plug/coil,
        vacuum leak, dirty injector, or carbon-fouled throttle body; a check engine light may be on. Distinct from
        shaking_at_idle_while_stopped (WHOLE CAR shakes while the engine itself sounds normal — usually broken engine/motor
        mounts), from stalling_at_idle_or_when_stopping (the engine actually DIES), and from engine_misfire_or_bucking_feeling
        (which is bucking/jerking UNDER WAY, not just rough at a stop).
      why: Sharpens the engine-rough vs whole-car-mount-shake seam and the rough-vs-bucking-under-load seam.
    # source: lighting-visibility
    - op: stage2.description.revise
      subcat_slug: accessory_doesnt_work
      text: >
        APPEND to the examples clause: "This subcategory also covers a single EXTERIOR lamp that is out or misbehaving — a
        headlight, taillight, brake-light bulb, turn signal/blinker, fog lamp, side-marker, or license-plate light — where the
        rest of the car's lights are fine. A customer who says they replaced a headlight bulb and it is still dark usually has
        a socket, fuse, ground, wiring, or (LED) sealed-module fault, not a bad bulb. Note: a WIPER complaint ('wipers don't
        work / won't move') is NOT an accessory-testing item here — it belongs to the windshield/wiper inoperative service
        (windshield_inop_testing)."
      why: >
        Live enrichment lists only windows/radio/locks, so exterior bulb-out has no explicit home and under-matches; and the
        live "wipers don't work" synonym / "Rear windshield wiper doesn't move" positive wrongly pull wiper complaints in
        (dossier §7/§8). Exterior-lamp demand: 4 genuine concern lines in the 500-line corpus (headlight, tail light, turn
        signal, a terse "left plate lamp") all consensus-routed here, plus 3 declined/work-order lamp lines — recurring but
        modest.
    # source: lighting-visibility
    - op: stage2.description.revise
      subcat_slug: dim_or_flickering_lights
      text: >
        APPEND: "Pick this ONLY for a brightness/flicker complaint affecting the lights as a system. If just ONE lamp is out
        (the others fine) -> accessory_doesnt_work. If the lights dimmed and then the car SHUT OFF or won't restart ->
