    # source: ignition-misfire, router-warning-lights
    - op: stage1.keyword.add
      category_key: check_engine_light_testing
      phrase: flashing engine light
      rationale: >
        A FLASHING/blinking check-engine light is an active catalyst-damaging misfire — the single highest- urgency
        warning-light signal. Ensures Stage-1 fires even when the customer leads with the light, not the buck/stumble.
        (ignition-misfire.proposals.yaml also emits this; harmless duplicate, one canonical add.)
      evidence: >-
        engine-controls §6 / ignition-misfire §6 (flashing MIL = active severe misfire); corpus 'CHECK ENGINE LIGHT ON.
        RUNNING ROUGH'
