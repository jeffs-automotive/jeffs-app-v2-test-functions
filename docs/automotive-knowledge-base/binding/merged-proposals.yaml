    # source: automatic-transmission
    - op: stage3.slot.propose
      name: transmission_behavior
      type: enum
      values:
        - slipping
        - delayed_engagement
        - no_engagement
        - harsh_or_hard_shift
        - shudder_or_judder
        - flaring_between_shifts
        - stuck_in_gear
        - pops_out_of_gear
        - shifts_erratically
        - normal
      literal_cues:
        slipping:
          - trans slips
          - engine revs but the car doesn't move
          - revs high but doesn't speed up
          - slips in gear
          - revs up going uphill but barely speeds up
        delayed_engagement:
          - takes a few seconds to engage
          - hesitates when i put it in gear
          - delay before it catches in drive or reverse
          - felt like it was in neutral for a moment
        no_engagement:
