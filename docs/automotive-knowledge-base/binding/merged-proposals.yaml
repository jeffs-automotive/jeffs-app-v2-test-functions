      discriminating_fact: warning_light_named
    # source: wheels-tires-tpms-bearings
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: brake_inspection
      rule: >-
        Steering-wheel shake at a steady HIGHWAY speed with the foot OFF the brake -> suspension_steering_check (wheel
