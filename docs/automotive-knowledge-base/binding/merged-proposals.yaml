          - bangs into gear
        shudder_or_judder:
          - shudders when i give it gas
          - shuddering transmission
          - judder on takeoff
          - feels like rumble strips at 40
          - torque converter shudder
        flaring_between_shifts:
          - revs up between gears then catches
          - rpm flares on the shift
        stuck_in_gear:
          - stuck in gear
          - won't shift out of 3rd
