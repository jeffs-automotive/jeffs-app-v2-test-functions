      discriminating_fact: tire_state
    # source: wheels-tires-tpms-bearings
    - op: stage1.hedge.add
      category_a: tire_repair
      category_b: suspension_steering_check
      rule: >-
        A tire problem (puncture, leak, visible damage) -> tire_repair. A wheel-DYNAMICS problem (vibration/shimmy at speed,
        wheel-bearing hum, a pull) -> suspension_steering_check. The split is 'the tire itself' vs 'how the wheel
        spins/rides'.
      discriminating_fact: tire_state
    # source: wheels-tires-tpms-bearings
    - op: stage1.hedge.add
      category_a: tpms_testing
      category_b: suspension_steering_check
      rule: >-
        A TPMS/low-pressure warning LIGHT -> tpms_testing. A balance shimmy or bearing hum with NO tire-pressure light ->
        suspension_steering_check. A TPMS light plus an unrelated vibration is two concerns — lead with the customer's primary
