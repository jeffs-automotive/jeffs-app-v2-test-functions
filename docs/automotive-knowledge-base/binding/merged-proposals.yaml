  # ==================================================================
  # catalog.service.propose  (12)
  # ==================================================================
  "catalog.service.propose":
    # source: adas-driver-assist
    - op: catalog.service.propose
      name: ADAS calibration diagnostic
      demand_evidence: >
        FORWARD-LOOKING, low current volume: corpus shows zero ADAS traffic today, but Jeff's inbound mix is modernizing on a
        GROWING-FLEET basis (NOT a current mandate): 20 automakers voluntarily committed in 2016 to make AEB standard on
        virtually all new US light vehicles by ~Sept 2022 (voluntary commitment, not a rule), and NHTSA's binding AEB mandate
        (FMVSS 127, finalized April 2024) does not take effect until ~Sept 2029 — so the ADAS-equipped share of the on-road
        fleet is climbing fast either way. warning_light_general is a generic code-scan and does not scope ADAS calibration
        (targets, static vs dynamic road drive, per-feature aim) or price it. A dedicated service captures the growing
        post-windshield/post-alignment/post-collision calibration demand. [NHTSA FMVSS 127 final rule (April 2024) + 2016
        20-automaker voluntary AEB commitment, Tier 1; AAA Cost of ADAS Repairs 2023, Tier 2; I-CAR RTS, Tier 2; GM windshield
        position statement, Tier 1 OEM — accessed 2026-07-18]
      fee_rationale: >
        Anchor the diagnostic/verification step to the existing $179.95 diagnostic tier (matches warning_light_general);
        calibration labor itself (static/dynamic) quoted or sublet separately per OEM procedure. Chris sets final fee +
        in-house vs sublet policy.
    # source: air-induction-forced-induction
    - op: catalog.service.propose
      name: Forced-induction / boost system test
      demand_evidence: >-
        Tekmetric corpus has turbo/boost concerns (whistle+no-accel, limp mode, oil under turbos) currently absorbed by CEL
        testing and situational buckets; README lists forced induction as a coverage gap. Volume is modest today but rising
        with the shop's turbo-heavy modern mix.
      fee_rationale: >-
        Overlaps the $179.95 CEL scan (codes + live data) plus a boost/smoke-leak test and charge-pipe inspection. Could price
        at CEL parity ($179.95) OR simply route to check_engine_light_testing. DECISION IS CHRIS'S — do not auto-create;
        forced-induction faults already scan well under CEL.
    # source: automatic-transmission
    - op: catalog.service.propose
      gated: true
      name: >-
        transmission_testing (REVISION, not a new service): expand concern_categories from [performance] to [performance,
        vibration, leak, warning_light, noise]; populate example_keywords[] (see stage1.keyword.add ops).
      demand_evidence: >-
        Correctly-worded transmission complaints in four OTHER categories currently cannot reach transmission_testing at
        Stage-1: converter/CVT shudder (vibration -> shaking_when_speeding_up_or_going_uphill), red ATF puddle (leak ->
        red_or_pink_puddle_transmission_or_power_steering), limp-mode / trans-temp light (warning_light), and gear/pump/CVT
        whine + reverse grind (noise -> high_pitched_whining_under_the_hood). Corpus shows all five channels in real concerns;
        today only 'performance' is advertised.
      fee_rationale: No fee change — same $179.95 diagnostic; this is a routing-reach fix, not a new offering.
    # source: body-glass-water-leaks-keys
    - op: catalog.service.propose
      name: body_water_leak_testing
      demand_evidence: >-
        eval + forum wet-carpet/interior-water cases (FM-1); the only water slug is an under-car AC puddle, leaving interior
        leaks with no bookable diagnostic. Water intrusion also causes downstream electrical gremlins (FM-8) and mold.
      fee_rationale: >-
        Water-leak trace is labor (controlled hose test, one zone at a time; sometimes smoke test) comparable to the $109-$179
        diagnostic tier; suggest ~$109-$149. Chris to set.
    # source: body-glass-water-leaks-keys
    - op: catalog.service.propose
      name: key_immobilizer_antitheft_testing
      demand_evidence: >-
        FM-7 immobilizer no-starts + security-light concerns; currently misrouted to battery/no-start tests. Alternative to a
        new service: explicitly widen electrical_testing_general scope text to name immobilizer/keys/security.
      fee_rationale: >-
        Scan for immobilizer/security codes + antenna/key verification; aligns with the $179.95 no_start/electrical diagnostic
        tier. Chris to set.
    # source: engine-lubrication-oil
    - op: catalog.service.propose
      name: Extend oil_pressure_light_testing.concern_categories to include 'noise' (scope change, NOT a new service)
      demand_evidence: >-
        §8 NO-FIT row: oil-STARVATION that a customer leads with as a NOISE (a lifter tick escalating to a rod knock — dossier
        §3.7/§3.8) must reach the noise subcategories engine_ticking_or_tapping / deep_knocking_from_the_engine. DB-verified
        oil_pressure_light_testing.concern_categories = [warning_light, leak, performance] — 'noise' is absent, and NO current
        service reaches engine knock/tick noise, so a knock-led oil-starvation utterance DEAD-ENDS at Stage 2. Adding 'noise'
        to this service's concern_categories routes those cases to the mechanical oil-pressure test that would actually catch
        a failing pump / worn bearings. Left as a proposal because concern_categories edits change Stage-1 candidate reach
        across the catalog.
      fee_rationale: No new fee — same $179.95 oil_pressure_light_testing service; only its Stage-2 subcategory reach widens.
    # source: engine-lubrication-oil
    - op: catalog.service.propose
      name: Oil change / routine maintenance booking (non-diagnostic)
      demand_evidence: >-
        High-frequency routine oil-change lines collide with the oil vocabulary in the Stage-1 keyword union: tkc-011 ('RESET
        OIL MAINT LIGHT (Not due yet)'), tkc-054 ('Inspection and Oil Change'), tkc-285 ('Inspection, emission and oil change
        15 off web coup'), tkc-246 ('I am in need of an oil change.'), plus many mixed lines pairing 'oil change' with a real
        symptom. A dedicated non-diagnostic path stops maintenance requests from competing with the oil-leak diagnostic and
        lets the wizard skip symptom questions.
      fee_rationale: No diagnostic fee — routine maintenance / booking flow; price per Jeff's standard oil-change menu, set by Chris.
    # source: exhaust-emissions
    - op: catalog.service.propose
      name: State Safety / Emissions Inspection
      demand_evidence: >
        Tekmetric corpus contains explicit state inspection/emissions requests that are NOT the $39.99 diagnostic exhaust eval
        and carry no symptom: e.g. 'State Inspection and Emissions Already have a current emissions sticker. Just need the
        inspection.' (real-concerns-tekmetric-labeled-v2.json:4440) and 'MAKE SURE NO EXHAUST LEAKS' (:10701). Today these
        null-route to an advisor with no catalog path.
      fee_rationale: >
        State-set or shop-set flat inspection fee (jurisdiction-dependent; not a diagnostic hourly). If Jeff's is a licensed
        inspection station, this is a bookable service, not a diagnosis — needs its own catalog entry so the wizard stops
        treating an inspection request as a fault to diagnose.
    # source: hybrid-ev-high-voltage
    - op: catalog.service.propose
      name: hybrid_ev_high_voltage_testing
      demand_evidence: >
        THIN + honestly labeled: the 500-line Tekmetric corpus has exactly TWO hybrid/EV lines (the CEL "service high voltage
        charging system" concern + a Tesla brake-caliper work-order) and 0 BEV concerns; Jeff's is an ICE-dominant US shop.
        This is a "be-ready" proposal, not a build-now mandate. If the shop declines EV/HV work, the five proposed hybrid/EV
        subcategories + the EVSE (§3.5) and degradation (§3.6) cases route to ADVISOR instead.
      fee_rationale: >
        If offered, price in line with the other scan-based diagnostics (check_engine_light_testing / no_start_testing $179.95
        tier), reflecting HV-trained-tech time + equipment; a plain 12V test on a hybrid stays under the existing battery_test
        (FREE) / charging_starting_testing ($89.95) because the low-cost, rule-out-first no-power cause is the 12V aux (§3.1).
        Chris to set the final fee and confirm the shop will service HV vehicles at all. SAFETY: this service is
        HV-trained-tech-only; the classifier's role ends at routing.
    # source: manual-trans-clutch
    - op: catalog.service.propose
      name: Route manual-trans fluid leak (gear oil OR clutch hydraulic brake fluid) to a bookable service
      demand_evidence: >-
        FM-11 (manual gearbox gear-oil leak) maps to leak/thick_dark_brown_puddle_gear_or_differential_oil and FM-12 (clutch
        hydraulic leak) maps to leak/clear_yellow_or_light_brown_puddle_brake_fluid, but the 'leak' category is unreachable by
        transmission_testing (concern_categories=['performance']); no service cleanly books a manual-trans fluid leak.
        Options: (a) add 'leak' to transmission_testing.concern_categories, or (b) add a trans-fluid-leak service.
      fee_rationale: Reuse transmission_testing fee ($179.95) if scope-extended; new service fee is Chris's call.
    # source: suspension-ride-alignment
    - op: catalog.service.propose
      name: Driveline / CV / differential / U-joint / mount diagnosis
      demand_evidence: >-
        Corpus: 'Clunking noise when putting car into drive from park/turning left'; forum 'transmission made a loud CLUNK as
        I accelerated'; 'roar and clicking/tapping'; 'sounds like a wheel bearing'; 'Diff carrier bushing torn'. These
        currently mis-route into suspension_steering_check or awd_4x4_testing with no matching test.
      fee_rationale: >-
        Sits between suspension_steering_check ($89.95) and the $179.95 diagnostic tier; road-test + lift inspection of
        U-joints/CV/diff/mounts. Chris sets the fee. Pairs with the proposed driveline_clunk_on_shift_or_acceleration
        subcategory.
    # source: wheels-tires-tpms-bearings
    - op: catalog.service.propose
      name: tire_sales_consultation
      demand_evidence: >-
        Recurring, unmet demand in the corpus with NO bookable service: tkc-138 ("4 NEW TIRES AND ALIGNMENT, would like entry
        level tire"), tka-125 ("TIRE REPLACEMENT"), tka-169 ("TIRE REPLACE IF NEEDED CHECK CONDITION OF REMAINING"), tka-112
        ("CHECK CONDITION OF WINTER TIRES ... MOUNT AND BALANCE"), tkc-159 (tire protection plan), plus every
        dry_rot_sidewall_cracking case and non-repairable bulge/cut (§3.3/§3.4). Today `tire_repair` explicitly excludes
        worn/aged/new-tire requests and `tpms_testing` is a sensor scan, so `just_want_new_tires` +
        `dry_rot_sidewall_cracking` fall through to a bare advisor hand-off with no structured flow.
        `customer_request_type=just_get_new_tires` already exists at the FACT level — the gap is the SERVICE/route.
      fee_rationale: >-
        Advisor-quote route, NOT a diagnostic fee (there is no symptom to diagnose). Gather size / driving style / budget tier
        / mileage (mirrors the existing just_want_new_tires question set 744-750) and hand off to a tire quote. Whether this
        is a $0 "tire consultation" booking type or folds into an existing quote flow is a business/pricing decision —
        Chris-gated. Do NOT build speculatively.

