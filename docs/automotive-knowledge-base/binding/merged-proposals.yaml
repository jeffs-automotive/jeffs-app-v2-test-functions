  # ==================================================================
  # stage3.slot.other  (3)
  # ==================================================================
  "stage3.slot.other":
    # source: body-glass-water-leaks-keys
    - op: stage3.slot.guidance.add
      slot: warning_light_named
      guidance: >-
        Capture the immobilizer/anti-theft dash light in the customer's own words as free text. Recognize these nicknames as
        valid warning_light_named text (do NOT invent an enum): 'security light', 'theft light', 'anti-theft light', 'key
        light', 'car-with-a-key symbol'.
      literal_cues:
        - security light
        - theft light
        - anti-theft light
        - antitheft light
        - key light
        - car with a key symbol
        - key not recognized light
    # source: body-glass-water-leaks-keys
    - op: stage3.slot.guidance.add
      slot: accessory_affected
      guidance: >-
