  # ==================================================================
  # stage2.subcategory.propose  (27)
  # ==================================================================
  "stage2.subcategory.propose":
    # source: router-no-start-power
    - op: stage2.subcategory.propose
      category: performance
      name: cranks_but_wont_fire
      description: >
        The engine TURNS OVER at normal speed but never catches / fires — a bare cranks-but-won't-start concern with no
        cold/hot/fill-up timing and no security or hybrid cue. This is the fuel/spark/ crank-cam no-start (no_start_testing)
        that today drops into a NULL subcategory. Distinct from slow_crank_sluggish_start (engine spins SLOWLY =
        battery/starter), wont_crank_just_clicks (NO rotation, clicking), hard_to_start_when_cold/_hot (timing-specific), and
        the immobilizer no-start (named security light + normal battery). Route: no_start_testing. examples:
          - "TOW IN. CRANKS BUT WILL NOT START"
          - "cranks and cranks but wont fire up, turns over normal speed"
          - "intermitent no start, turns over but doesnt catch"
      why_existing_insufficient: >
        no_start_testing has NO subcategory for a bare crank-no-fire; the corpus routes it to a null subcat (tka-170 "CRANKS
        BUT WILL NOT START", tkc-172 "intermitent no start", tka-061 "NO CRANK NO START", tkc-276, plus "TOW IN NO START ...
        battery seems ok"). Both fuel-system-evap (§7/§8) and engine-controls-driveability flagged this NO-FIT but declined to
        propose it per-system; the no-start router aggregates the demand and surfaces it. Chris-gated (changes the Stage-2
        label space).
    # source: adas-driver-assist
    - op: stage2.subcategory.propose
      category: warning_light
      name: adas_driver_assist_warning_or_malfunction
      description: >
        A dash MESSAGE or icon about a DRIVER-ASSIST feature — lane-departure / lane-keep assist, forward-collision warning or
        automatic emergency braking (AEB), ADAPTIVE / radar cruise control (NOT plain set-speed cruise), blind-spot warning,
        rear cross-traffic, or parking sensors / park assist — OR the assist feature behaving wrongly (falsely activating, or
        unavailable/disabled). Typical wording: "Front Radar Obstruction", "Driving Aids Unavailable", "Lane Keep Assist
        Unavailable", "Pre-Collision System: Service Required", "Adaptive Cruise Unavailable", "Blind Spot System Error", or a
        small-car-with-sensor-beams icon. Common causes: (1) sensor blocked by snow/ice/mud/road-spray (often self-clears
        after cleaning); (2) calibration / relearn lost after a windshield replacement, wheel alignment, suspension work,
        bumper/sensor R&R, collision, OR a battery replacement / dead-battery power loss (steering-angle / camera relearn);
        (3) a genuine camera/radar/module electrical fault or stored ADAS trouble code; (4) false "phantom" activation (car
        brakes itself / tugs the wheel / warns with nothing ahead). The base vehicle almost always still steers and brakes
        normally; only the ASSIST is affected. Route the shop to a code scan (warning_light_general); when a calibration
        trigger (windshield / alignment / suspension / bumper / collision / battery power-loss) is present, FLAG that
        OEM-specified ADAS calibration or relearn may be required (sublet or in-house per shop policy). DISTINCT from
        check_engine_light (engine-outline icon / "check engine" wording — not an assist feature). DISTINCT from
        multiple_warning_lights_at_once (that is a charging/alternator voltage cascade with dim lights + hard cranking; route
        HERE when the multiple messages are ALL driver-assist features). DISTINCT from accessory_doesnt_work (a screen/part
        simply dead with no assist/warning framing, e.g. a black backup-camera display; AND a plain set-speed "cruise control"
        that quit on a car with NO adaptive/radar feature and no assist message). DISTINCT from airbag_srs_light (SRS/airbag
        icon = passive restraint, not active collision-avoidance).
      examples:
        - message says front radar obstruction, driving aids unavailable
        - pre-collision system problem, the car braked itself for no reason
        - just got a new windshield and now the lane assist light is on
        - adaptive cruise control stopped working and there's a warning about it
        - blind spot light on the mirror stays lit all the time now
        - lane departure warning keeps flashing even when i'm in my lane
      routes_to_service: warning_light_general
      chris_gated: true
      why_existing_insufficient: >
        Live sweep returned zero ADAS-referencing subcategories; the warning_light category's 12 slugs are all classic named
        lights (engine/ABS/traction/airbag/battery/oil/temp/TPMS/brake). ADAS complaints currently mis-route to
        check_engine_light, multiple_warning_lights_at_once (wrong root cause), or accessory_doesnt_work.
        warning_light_general is the correct SERVICE but has no subcategory to receive the pick.
    # source: air-induction-forced-induction
    - op: stage2.subcategory.propose
      category: performance
      name: turbo_or_boost_power_problem
      description: >-
        Forced-induction / boost-specific power problems: a turbo or supercharger that whistles, whines, or surges AND is down
        on power under load, 'went into limp mode', or 'wont build boost'. Covers boost/ charge-air leaks,
        wastegate/actuator/boost-solenoid faults, and underboost/overboost. Differs from generic low_power (which spans cats,
        fuel, trans) by the boost-specific cues (whistle-under-boost, spool, wastegate, intercooler pipe) and from
        high_pitched_whining_under_the_hood (which also holds belt/PS/alternator whine with no power complaint).
      examples:
        - turbo whistles and the car has no power under boost, threw a check engine light
        - went into limp mode on the highway, wont build boost anymore
        - they said i have a cracked pipe somewhere, it loses power and whooshes when i accelerate
      why_existing_insufficient: >-
        Boost symptoms currently split three ways (low_power / hesitation / whining) so no single customer boost utterance
        routes cleanly, and the whine subcategory is framed for belt/PS/alternator. README names forced induction as a known
        catalog coverage gap. LOW current corpus volume — propose, do not assume; Chris decides whether to add the subcategory
        or keep folding into low_power + CEL.
    # source: airbag-srs-restraints
    - op: stage2.subcategory.propose
      category: electrical
      name: seat_belt_or_restraint_hardware
      description: >-
        A physical seat-belt / restraint-hardware complaint with NO dashboard warning light: a belt that won't retract or is
        stuck extended, a buckle that won't latch or won't release, frayed/cut webbing, or a persistent seat-belt chime/buzzer
        with no telltale. Distinct from airbag_srs_light (which is a dashboard SRS light / electronic restraint fault) and
        from accessory_doesnt_work (a dead powered accessory).
      examples:
        - seat belt won't pull out, it's stuck and won't come across me, no dash light
        - the buckle won't click / latch anymore, no warning light
        - seat belt chime keeps going off but no light on the dash
      why_existing_insufficient: >-
        airbag_srs_light requires a dash telltale; accessory_doesnt_work is for powered accessories on a fuse/circuit. A
        purely mechanical restraint-hardware complaint routes to neither and currently dead-ends at advisor. Corpus demand is
        THIN (seat belt appears only as an SRS-light trigger, never as a standalone hardware complaint), so this is
        propose-only pending Chris confirming volume before any question set is authored; category=electrical chosen because
        the airbag_srs_testing service already reaches it (no restraints category exists).
    # source: automatic-transmission
    - op: stage2.subcategory.propose
      gated: true
      category: performance
      name: harsh_delayed_or_no_shift
      description: >-
