    # source: suspension-ride-alignment
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: after_a_recent_accident_or_impact
      rule: >-
        When the customer ties a vague front-end symptom to a fresh curb/pothole/collision and asks to 'make sure nothing is
        bent', the recent-impact situational bucket OVERRIDES the suspension symptom keyword (taxonomy priority-order rule).
      discriminating_fact: recent_action = hit_pothole_or_curb / accident_or_impact + no discrete symptom named
    # source: wheels-tires-tpms-bearings
    - op: stage1.hedge.add
      category_a: tire_repair
      category_b: tpms_testing
      rule: >-
        Physical tire evidence the customer can SEE or feel (nail/screw/bulge/cut, a tire that is low or going flat) ->
        tire_repair. A dashboard TPMS/low-pressure LIGHT as the customer's lead clue, with no confirmed low or damaged tire ->
        tpms_testing. If a nail/flat AND the light are both stated, the physical damage wins (tire_repair) and the light is
