  # ==================================================================
  # stage2.description  (36)
  # ==================================================================
  "stage2.description":
    # source: abs-traction-stability
    - op: stage2.description.revise
      subcat_slug: abs_anti_lock_brake_light
      text: >
        (APPEND to current description) Also route here for an UNEXPECTED ANTI-LOCK ACTIVATION FEEL from a degrading
        wheel-speed sensor: the pedal pulses, kicks back, or grinds ONLY in the last few feet as the car creeps to a stop on
        DRY, warm pavement (no ice to justify real anti-lock), often with the ABS light on. Distinguish from a warped-rotor
        complaint (brakes pulsating_or_vibrating_pedal), which pulses at driving speed under firmer braking, not only at the
        final crawl to a stop.
      why: Captures FM-3, a common degraded-WSS signature that currently misroutes to a base-brake vibration subcat.
    # source: abs-traction-stability
    - op: stage2.description.revise
      subcat_slug: traction_control_stability_light
      text: >
        (APPEND) An 'AWD disabled' / 'no AWD' / 'hill-assist unavailable' message that appears ALONGSIDE a lit
        traction/stability (or ABS) telltale frequently rides along with the fault because these features share the
        wheel-speed-sensor network — treat such a message as corroboration for THIS subcategory, not a separate concern.
        CAVEAT: if the customer instead reports the AWD/4WD system itself not engaging ('AWD won't turn on', '4WD light on',
        '4x4 won't kick in') with NO ABS/traction/stability light named, that is an AWD-driveline complaint and belongs to
        awd_4x4_testing, not here.
      why: >-
        tekmetric 'abs / trac / no AWD message' + forum 'hill assist lights' co-illumination; caveat guards the
        awd_4x4_testing boundary.
    # source: air-induction-forced-induction
    - op: stage2.description.revise
      subcat_slug: high_pitched_whining_under_the_hood
      text: >-
        A continuous high-pitched whine, whirr, squeal, or whistle from the front/engine bay. Track the trigger: a serpentine
        belt squeal is worst COLD/DAMP; a power-steering whine rises when TURNING the wheel; an alternator whine rises with
        ELECTRICAL LOAD (headlights/blower); a turbocharger or supercharger whine/siren rises with ENGINE RPM UNDER LOAD
        (accelerating, climbing hills) and can turn into a whistle from a boost/charge-air leak. Distinct from
        humming_or_whirring_at_speed (wheel-bearing, tied to ROAD speed, not engine RPM) and from a power-steering whine that
        ONLY happens when turning (that belongs to steering/noise_when_turning_the_steering_wheel).
      why: >-
        Adds the forced-induction cause + the load-vs-steering-vs-electrical discriminator so a turbo whistle isn't defaulted
        to belt/PS.
    # source: air-induction-forced-induction
    - op: stage2.description.revise
      subcat_slug: low_power_or_wont_accelerate_normally
      text: >-
        SUSTAINED loss of power — the car feels weak, flat, or 'held back', struggles on hills, or won't go past a certain
        RPM/MPH, often with a gas-mileage drop. Causes include limp/reduced-power mode (computer-limited safe state), a
        turbo/boost fault (underboost, boost/charge-air leak, wastegate or actuator), clogged catalytic converter, failing
        fuel pump, bad mass airflow sensor, or a slipping transmission (engine revs without speed). A turbo/boost cause often
        adds a whistle or hiss ONLY under acceleration. Distinct from hesitation_or_lag_when_accelerating (a MOMENTARY pause,
        not constant weakness) and stalling_while_driving_under_load (engine actually dies).
      why: Names the forced-induction cause set + the accel-only whistle cue; keeps the hesitation/stall boundaries.
    # source: automatic-transmission
    - op: stage2.description.revise
      subcat_slug: low_power_or_wont_accelerate_normally
      text: >-
        Keep existing text; sharpen the trans-slip boundary: add that a rev/speed SPLIT (engine revs climb but the car doesn't
        gain speed) points to transmission slipping specifically, and the wizard should capture whether the engine over-revs
        vs stays low — this is the discriminator between a slipping transmission and an engine-side power loss (clogged cat,
        fuel pump, MAF).
      why: >-
        This subcat currently absorbs both engine low-power AND trans slip; the rev/speed split is the one cue that separates
        them (dossier D1).
    # source: body-electrical-accessories
    - op: stage2.description.revise
      subcat_slug: accessory_doesnt_work
      text: >-
        A specific electrical accessory does not work — one named load (or a small set on one shared circuit) that is dead or
        malfunctioning: horn, radio/infotainment, a power door lock/central locking/key fob, a power or heated seat, a
        power/heated mirror, a sunroof/moonroof or power liftgate, a 12V outlet/cigarette lighter, a dome/courtesy light, the
        rear defroster, or an exterior signal/marker function. Includes an accessory whose fuse keeps blowing. Use this when
        the customer points at a definite thing that stopped working. NOT power windows (window_inop_testing) and NOT
        wipers/washer (windshield_inop_testing) — those have dedicated services. NOT a named dashboard warning light.
      why: >-
        Original description under-specifies the non-window scope and the shared-circuit case; sharpening it against the two
        direct-service neighbors and the warning-light lane.
    # source: body-electrical-accessories
    - op: stage2.description.revise
      subcat_slug: multiple_random_electrical_glitches
      text: >-
        Several DIFFERENT electrical things act up at RANDOM, intermittently, over time — the radio resets one day, the locks
        click on their own another day, the gauges jump, lights or accessories drop out then come back — often worse in
        damp/rainy weather. The pattern (many unrelated systems, no fixed trigger) points at a shared ground/connector, water
        intrusion, or the body module rather than one dead part. NOT one specific accessory that is simply always dead
        (accessory_doesnt_work), NOT the whole car going dark and shutting off while driving
        (car_died_while_driving_electrical), and NOT lights that merely dim/flicker with engine RPM (charging system).
      why: >-
        Add the intermittent + weather-linked + multi-system signature and the three exclusion boundaries the corpus
        repeatedly confuses.
    # source: body-electrical-accessories
    - op: stage2.description.revise
      subcat_slug: electrical_buzzing
      text: >-
        An audible electrical BUZZ or HUM — often described as a beehive, a buzzing relay, or a hum with the key on —
        typically from behind the dash or under the hood, not tied to engine RPM. NOT a whine that rises with RPM
        (high_pitched_whining_under_the_hood / power steering), and NOT a click/buzz that changes when you adjust the
        heat/AC/airflow (that is a blend-door actuator → strange_noise_from_vents).
      why: Distinguish buzz from RPM-linked whine and from HVAC blend-door noise, the two nearest confusables.
    # source: body-glass-water-leaks-keys
    - op: stage2.description.revise
      subcat_slug: clear_odorless_puddle_water_or_ac_condensation
      text: >-
        Clear, odorless, water-like fluid seen as a puddle or drip UNDER the vehicle (typically A/C condensation from the
        evaporator drain, which is normal). This is for water OUTSIDE, on the ground. If the water is INSIDE the cabin — wet
        carpet, wet floor mat, damp headliner, water by the customer's feet — that is a body water-intrusion leak, not this;
        route to advisor (proposed water_leaking_inside_the_car).
      why: >-
        Corpus shows customers describe both under-car puddles (this slug) and inside-carpet wetness (a different, no-fit body
        problem). Without the INSIDE/OUTSIDE boundary the body leak is silently mis-labeled as harmless AC condensation.
    # source: body-glass-water-leaks-keys
    - op: stage2.description.revise
      subcat_slug: rattling_underneath_the_car
      text: >-
        A tinny/loose rattle from UNDERNEATH the vehicle at idle or over bumps (heat shield, exhaust hanger, loose bracket,
        skid plate). This is for underbody sources. A rattle from INSIDE the cabin — a door panel, dash trim, headliner, or a
        loose item in the trunk/cargo area — is a body/trim rattle, not this; route to advisor.
      why: >-
        Body/interior rattles (FM-3) have no home and are the nearest wrong bucket. Naming 'underneath only' keeps interior
        rattles out.
    # source: body-glass-water-leaks-keys
    - op: stage2.description.amend
      subcat_slug: accessory_doesnt_work
      defer_to: body-electrical-accessories
      amend_request: >-
        To the sibling's canonical accessory_doesnt_work description, ensure two additions are present: (1) the ELECTRIC
