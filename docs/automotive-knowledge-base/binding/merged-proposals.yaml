      discriminating_fact: onset_timing = over_bumps (suspension) vs when_braking (brakes)
    # source: suspension-ride-alignment
    - op: stage1.hedge.add
      category_a: suspension_steering_check
      category_b: awd_4x4_testing
      rule: >-
        A clunk triggered by BUMPS is suspension; a clunk on shift-into-gear / on-off throttle (no bump) is driveline
        (U-joint/diff/mount) — today partly awd_4x4_testing, otherwise the proposed driveline service. Hedge when the trigger
