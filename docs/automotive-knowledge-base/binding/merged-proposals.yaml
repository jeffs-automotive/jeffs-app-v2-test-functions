    # source: suspension-ride-alignment
    - op: stage2.subcategory.propose
      category: noise
      name: driveline_clunk_on_shift_or_acceleration
      description: >-
        A clunk, thud, or bang that happens when shifting into gear (park-to-drive/reverse), taking off from a stop, or
        lifting on/off the gas — NOT triggered by bumps. Points at driveline slack: worn U-joints, differential/carrier,
        CV/axle, or engine/transmission mounts. Distinct from noise/clunking_over_bumps (bump-triggered, suspension).
      examples:
        - clunking when I put it in drive from park
        - loud clunk when I take off from a stop
        - clunk when I get on and off the gas
      why_existing_insufficient: >-
        clunking_over_bumps is explicitly bump-triggered (onset_timing=over_bumps); there is no home for
        shift/throttle-triggered clunk, so those corpus lines contaminate suspension routing.
    # source: suspension-ride-alignment
    - op: stage2.subcategory.propose
      category: warning_light
      name: suspension_service_message
      reached_via_service: warning_light_general
      description: >-
        A dashboard 'service suspension' / 'air suspension' warning message on electronic or AIR-RIDE vehicles, often with the
        ride-height compressor cycling / airing up at random. Distinct from mechanical suspension noise/ride complaints (no
        light) AND from a broken coil/leaf spring on a conventional car (a low corner with NO dash message -> that is
        suspension_steering_check, dossier 3k).
      examples:
        - service suspension message keeps popping up
        - air compressor keeps running and airing up the suspension at random
        - air ride light on and the back end won't stay up
      why_existing_insufficient: >-
        2 strong air-ride corpus lines ('SUSPENSION FAULT/SERVICE messages ... air compressor coming on and airing up at
        random'; 'POPPING NOISE ... from the air suspension') describe air/electronic-suspension dash messages with no catalog
        home; today they fall into general warning-light with no matching test. (The 'sitting low on one corner' corpus line
        is NOT evidence here -- on a conventional car that is a broken spring routed to suspension_steering_check.)

