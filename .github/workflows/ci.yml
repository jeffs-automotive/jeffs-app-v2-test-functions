name: CI

# PLAN-01 Phase 3B — CI gate that blocks merges if lint/typecheck/tests fail.
# Triggers:
#   - pull_request to main  → required check on the merge
#   - push to main          → catches direct pushes / merge commits
#
# Layout:
#   quick-check  — runs lint + typecheck (fastest signal; everything depends on it)
#   vitest       — runs scheduler-app/ unit + component tests
#   deno-test    — runs supabase/functions/ Deno tests
#   pgtap        — runs Postgres pgTAP suite against local Supabase
#
# Playwright is added in PLAN-01 Phase 4 once playwright.config.ts + the
# wizard-happy-path spec exist.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # playwright-smoke can also be triggered manually (e.g., post-deploy
  # against a Vercel preview URL).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-check:
    name: Quick check (lint + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'scheduler-app/package-lock.json'
      - name: Install
        run: cd scheduler-app && npm ci
      - name: Typecheck
        run: cd scheduler-app && npm run typecheck
      - name: Lint
        run: cd scheduler-app && npm run lint

  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    needs: [quick-check]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'scheduler-app/package-lock.json'
      - name: Install
        run: cd scheduler-app && npm ci
      - name: Vitest
        run: cd scheduler-app && npm run test

  deno-test:
    name: Deno tests
    runs-on: ubuntu-latest
    needs: [quick-check]
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Deno test
        # --node-modules-dir=auto creates ./node_modules on demand so
        # `npm:@supabase/supabase-js` resolves; required since the
        # webhook handlers import via npm: specifier.
        run: |
          if find supabase/functions -name '*.test.ts' -print -quit | grep -q .; then
            deno test --allow-all --no-check --node-modules-dir=auto 'supabase/functions/**/*.test.ts'
          else
            echo 'No supabase/functions/**/*.test.ts found — Phase 4 will populate.'
          fi

  pgtap:
    name: pgTAP
    runs-on: ubuntu-latest
    needs: [quick-check]
    # pgTAP has 5 pre-existing stale-schema failures (CLN-9 in
    # docs/scheduler/DEFERRED-AUDIT-ITEMS.md). continue-on-error so they
    # don't block PR merges while we audit + repair them.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          # Pin to the version that matches local dev (per
          # .claude/memory/scheduler/scheduler_system_architecture.md project
          # orientation). The supabase/setup-cli action requires an exact
          # semver string — `2.x` is rejected.
          version: 2.98.2
      - name: Start local Supabase
        run: supabase start
      - name: Run pgTAP
        run: |
          if [ -d supabase/tests ] && [ -n "$(find supabase/tests -name '*.sql' -print -quit)" ]; then
            supabase test db
          else
            echo 'No supabase/tests/*.sql found — Phase 4 will populate.'
          fi
      - name: Stop Supabase
        run: supabase stop
        if: always()

  admin-app:
    name: Admin-app (typecheck + lint + vitest)
    runs-on: ubuntu-latest
    # Independent of scheduler-app quick-check — admin-app is a separate Next.js
    # app with its own lockfile. Hermetic: the Vitest unit/component tests mock
    # Supabase / Sentry / fetch, so no secrets or network are needed. The
    # Playwright E2E (admin-app/e2e/*.spec.ts) is intentionally NOT run here —
    # its authed setup needs the live test Supabase project + SERVICE_ROLE secret
    # (see admin-app/playwright.config.ts). Run E2E locally, or add a
    # secrets-gated job later (mirrors playwright-smoke below).
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'admin-app/package-lock.json'
      - name: Install
        run: cd admin-app && npm ci
      - name: Typecheck
        run: cd admin-app && npm run typecheck
      - name: Lint
        run: cd admin-app && npm run lint
      - name: Vitest
        run: cd admin-app && npm run test

  qteklink-app:
    name: QTekLink-app (typecheck + lint + vitest)
    runs-on: ubuntu-latest
    # Separate Next.js app with its own lockfile. Hermetic: the Vitest unit + *.contract.test.ts
    # suites mock Supabase / fetch and import the shared `test-kit/` fixtures (committed at the
    # repo root, so they're checked out here with no cross-repo token), so no secrets/network.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'qteklink-app/package-lock.json'
      - name: Install
        run: cd qteklink-app && npm ci
      - name: Typecheck
        run: cd qteklink-app && npm run typecheck
      - name: Lint
        run: cd qteklink-app && npm run lint
      - name: Vitest
        run: cd qteklink-app && npm run test

  playwright-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: [quick-check]
    # /book-v2 Server Components require real Supabase connectivity; a
    # stub-env Next.js build crashes the page. Smoke only runs on manual
    # dispatch against a real preview URL via PLAYWRIGHT_BASE_URL secret
    # (or when env vars are wired into the repo for production use).
    # Tracked as CLN-10 in DEFERRED-AUDIT-ITEMS.md.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'scheduler-app/package-lock.json'
      - name: Install
        run: cd scheduler-app && npm ci
      - name: Install Playwright browsers
        run: cd scheduler-app && npx playwright install --with-deps chromium
      - name: Build Next.js (smoke needs a production build)
        run: cd scheduler-app && npm run build
        env:
          # Stub env so the build succeeds. Smoke test doesn't exercise
          # secrets — it just renders the greeting card.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-stub-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-stub-service-role
          AI_GATEWAY_API_KEY: ci-stub-gateway-key
      - name: Start Next.js in background
        run: cd scheduler-app && npm run start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-stub-anon-key
      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000/book-v2 > /dev/null && exit 0
            sleep 2
          done
          echo "Server did not come up in time"; exit 1
      - name: Run Playwright smoke
        run: cd scheduler-app && npx playwright test wizard-smoke --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: scheduler-app/playwright-report/
          retention-days: 7
